<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>撰写内容 // NodeWeave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.editor-page{max-width:920px;margin:0 auto;padding:82px 24px 110px}
.editor-head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:22px}
.editor-head h1{font-family:var(--font-display);font-size:24px;color:var(--cyan);text-shadow:var(--glow-cyan);margin:0}
.editor-head p{margin:8px 0 0;color:var(--text-mute);font-size:13px}
.editor-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;box-shadow:0 20px 80px rgba(0,0,0,.22)}
.form-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.form-group{margin-bottom:16px}
.form-group label{display:flex;align-items:center;justify-content:space-between;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:all .2s}
.form-group textarea{min-height:280px;resize:vertical;font-family:var(--font-mono);font-size:13px;line-height:1.75}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,240,255,.08)}
.hint{font-size:11px;color:var(--text-mute);margin-top:5px;line-height:1.7}
.tag-box{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.tag-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border:1px solid rgba(0,240,255,.18);background:rgba(0,240,255,.06);border-radius:999px;color:var(--cyan);font-family:var(--font-mono);font-size:11px}
.tag-pill button{background:none;color:var(--magenta);font-size:13px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.tool-btn{padding:7px 10px;background:var(--surface-2);border:1px solid var(--border);border-radius:5px;color:var(--text-dim);font-family:var(--font-mono);font-size:12px}
.tool-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.section{border:1px solid var(--border);background:rgba(0,240,255,.025);border-radius:10px;padding:16px;margin:16px 0}
.section-title{font-family:var(--font-display);font-size:13px;color:var(--cyan);margin-bottom:12px}
.check-row{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.check-row label{display:flex;align-items:center;gap:8px;color:var(--text-dim);font-size:13px;cursor:pointer}
.check-row input{accent-color:var(--cyan)}
.datetime-panel{display:none;margin-top:10px;padding:14px;background:var(--bg);border:1px solid var(--border);border-radius:8px}
.datetime-panel.show{display:block}
.dt-presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.dt-preset{padding:8px 12px;border:1px solid var(--border);background:var(--surface-2);border-radius:6px;color:var(--text-dim);font-family:var(--font-mono);font-size:12px}
.dt-preset.active,.dt-preset:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,240,255,.08)}
.dt-custom{display:grid;grid-template-columns:1fr 88px 88px;gap:10px}
.dt-selected{display:none;margin-top:10px;color:var(--green);font-family:var(--font-mono);font-size:12px}
.dt-selected.show{display:block}
.upload-zone{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.file-chip{display:none;padding:11px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-size:12px}
.file-chip.show{display:flex;align-items:center;justify-content:space-between;gap:12px}
.file-chip button{background:none;color:var(--magenta);font-size:16px}
.message{display:none;margin-top:14px;padding:10px 12px;border-radius:8px;font-size:13px}
.message.show{display:block}
.message.ok{background:rgba(127,255,0,.1);color:var(--green);border:1px solid rgba(127,255,0,.22)}
.message.err{background:rgba(255,0,60,.1);color:var(--magenta);border:1px solid rgba(255,0,60,.22)}
.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:18px}
@media(max-width:760px){.form-row,.dt-custom,.upload-zone{grid-template-columns:1fr}.editor-head{display:block}.editor-card{padding:18px}}
</style>
</head>
<body>
<div class="bg-grid"></div><div class="bg-scanlines"></div><div class="bg-glow"></div>

<header class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <span class="logo-mark">◈</span>
      <span class="logo-text">Node<span class="x">Weave</span></span>
      <span class="logo-sub">// EDITOR</span>
    </a>
    <nav class="nav-links">
      <a href="index.html">动态</a>
      <a href="boards.html">论坛</a>
      <a href="blog.html">博客</a>
      <a href="board.html?board=qa">问答</a>
    </nav>
    <div class="nav-actions" data-auth-actions>
      <a class="btn-ghost" href="login.html">登录</a>
      <a class="btn-primary" href="login.html?tab=register">注册</a>
    </div>
  </div>
</header>

<main class="editor-page">
  <div class="editor-head">
    <div>
      <h1 id="editorTitle">撰写内容</h1>
      <p>帖子、博客、问答悬赏统一从这里发布。内容提交后会进入社区流。</p>
    </div>
    <a class="btn-ghost" href="boards.html">← 板块广场</a>
  </div>

  <section class="editor-card">
    <div class="form-row">
      <div class="form-group">
        <label for="postType">类型</label>
        <select id="postType">
          <option value="post">帖子</option>
          <option value="blog">博客</option>
        </select>
      </div>
      <div class="form-group">
        <label for="postBoard">板块</label>
        <select id="postBoard"><option value="">加载中...</option></select>
      </div>
    </div>

    <div class="form-group" id="bountyGroup" style="display:none">
      <label for="bountyAmount">问答悬赏 <span>论坛币</span></label>
      <input id="bountyAmount" type="number" min="0" step="1" placeholder="可选，例如 20">
      <div class="hint">设置悬赏会立即冻结对应论坛币；采纳回答后转给答主。</div>
    </div>

    <div class="form-group">
      <label for="postTitle">标题 <span id="titleCount">0 / 200</span></label>
      <input id="postTitle" maxlength="200" placeholder="写一个清楚、具体的标题">
    </div>

    <div class="form-group">
      <label for="tagInput">标签 <span>最多 5 个</span></label>
      <input id="tagInput" placeholder="输入标签后按 Enter，例如 AI / Cloudflare / 教程">
      <div class="tag-box" id="tagBox"></div>
    </div>

    <div class="form-group">
      <label for="postContent">正文 <span>支持 Markdown</span></label>
      <div class="toolbar">
        <button class="tool-btn" type="button" data-wrap="**">加粗</button>
        <button class="tool-btn" type="button" data-wrap="`">代码</button>
        <button class="tool-btn" type="button" data-prefix="> ">引用</button>
        <button class="tool-btn" type="button" data-prefix="- ">列表</button>
        <button class="tool-btn" type="button" id="btnInlineImage">插入图片</button>
      </div>
      <input id="imageUpload" type="file" accept="image/*" style="display:none">
      <textarea id="postContent" placeholder="分享技术、记录思考，或者把问题讲清楚。"></textarea>
    </div>

    <div class="section">
      <div class="section-title">隐藏内容</div>
      <div class="check-row">
        <label><input type="checkbox" id="hiddenReplyOnly"> 回复后可见</label>
        <label><input type="checkbox" id="hiddenTimed"> 定时可见</label>
        <label><input type="checkbox" id="aiGenerated"> AI 辅助生成</label>
      </div>
      <div class="datetime-panel" id="hiddenTimeWrap">
        <div class="dt-presets" id="dtPresets">
          <button class="dt-preset" type="button" data-offset="3600000">1 小时后</button>
          <button class="dt-preset" type="button" data-offset="21600000">6 小时后</button>
          <button class="dt-preset" type="button" data-offset="86400000">24 小时后</button>
          <button class="dt-preset" type="button" data-custom="1">自定义</button>
        </div>
        <div class="dt-custom" id="dtCustom" style="display:none">
          <input id="hiddenDate" type="date">
          <input id="hiddenHour" type="number" min="0" max="23" placeholder="时">
          <input id="hiddenMinute" type="number" min="0" max="59" placeholder="分">
        </div>
        <div class="dt-selected" id="dtSelected"></div>
      </div>
      <div class="form-group" id="hiddenContentWrap" style="display:none;margin:0">
        <textarea id="hiddenContent" placeholder="这里写回复后或定时后才可见的内容..." style="min-height:90px"></textarea>
      </div>
    </div>

    <div class="section">
      <div class="section-title">附件</div>
      <div class="upload-zone">
        <div>
          <input type="file" id="attachFile">
          <button class="btn-ghost" type="button" id="btnPickFile">选择本地文件</button>
          <div class="hint">支持图片、压缩包、文档等，单文件最大 20MB。也可以直接粘贴外链。</div>
        </div>
        <div class="file-chip" id="fileChip"><span id="fileChipText"></span><button type="button" id="btnClearFile">×</button></div>
      </div>
      <div class="form-row" style="margin-top:12px">
        <div class="form-group" style="margin:0">
          <label for="attachUrl">附件外链</label>
          <input id="attachUrl" placeholder="https://...">
        </div>
        <div class="form-group" style="margin:0">
          <label for="attachName">附件名</label>
          <input id="attachName" placeholder="可选">
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary" id="btnPublish" type="button">发布</button>
      <button class="btn-ghost" id="btnDraft" type="button">保存草稿</button>
      <span class="hint" id="loginHint">正在检查登录态...</span>
    </div>
    <div class="message" id="formMessage"></div>
  </section>
</main>

<script src="script.js"></script>
<script>
let currentUser = null;
let editId = new URLSearchParams(location.search).get('edit');
let tags = [];
let selectedVisibleAfter = null;
let selectedFile = null;
let uploadedAttachment = null;

const $ = (id) => document.getElementById(id);
const apiJson = (...args) => window.NodeWeave.apiJson(...args);
const esc = (value) => window.NodeWeave.escapeHtml(value);

function showMessage(text, ok) {
  const el = $('formMessage');
  el.textContent = text;
  el.className = 'message show ' + (ok ? 'ok' : 'err');
}

function updateBountyVisibility() {
  $('bountyGroup').style.display = $('postBoard').value === 'qa' ? '' : 'none';
}

function renderTags() {
  $('tagBox').innerHTML = tags.map((tag, index) =>
    `<span class="tag-pill">#${esc(tag)} <button type="button" onclick="removeTag(${index})">×</button></span>`
  ).join('');
}

function removeTag(index) {
  tags.splice(index, 1);
  renderTags();
}

function addTag(raw) {
  const tag = String(raw || '').trim().replace(/^#/, '').slice(0, 24);
  if (!tag || tags.includes(tag) || tags.length >= 5) return;
  tags.push(tag);
  renderTags();
}

async function requireLogin() {
  currentUser = await window.NodeWeave.currentUser(true);
  if (!currentUser) {
    $('loginHint').innerHTML = '请先登录后发布内容。';
    location.href = 'login.html?redirect=' + encodeURIComponent('editor.html' + location.search);
    return false;
  }
  $('loginHint').textContent = `当前账号：${currentUser.display_name || currentUser.username} · 论坛币 ${currentUser.coins || 0}`;
  return true;
}

async function loadBoards() {
  const select = $('postBoard');
  const json = await apiJson('/api/boards').catch(() => null);
  const boards = json?.code === 0 ? json.data : [];
  if (!boards.length) {
    select.innerHTML = '<option value="general">综合讨论</option>';
    return;
  }
  select.innerHTML = boards.map(board =>
    `<option value="${esc(board.slug)}">${esc((board.icon || '') + ' ' + board.name)}</option>`
  ).join('');
  const targetBoard = new URLSearchParams(location.search).get('board');
  if (targetBoard) select.value = targetBoard;
  updateBountyVisibility();
}

async function loadEditPost() {
  if (!editId) return;
  $('editorTitle').textContent = '编辑内容';
  $('btnPublish').textContent = '保存修改';
  $('btnDraft').style.display = 'none';
  const json = await apiJson('/api/posts/' + encodeURIComponent(editId));
  if (json.code !== 0) {
    showMessage(json.msg || '无法加载帖子', false);
    return;
  }
  const post = json.data;
  $('postType').value = post.type || 'post';
  $('postBoard').value = post.board_id || 'general';
  $('postTitle').value = post.title || '';
  $('postContent').value = post.content || '';
  $('hiddenContent').value = post.hidden_content || '';
  $('aiGenerated').checked = !!post.is_ai_generated;
  $('attachUrl').value = post.attachment_url || '';
  $('attachName').value = post.attachment_name || '';
  tags = post.tags || [];
  if (post.visibility === 'reply') $('hiddenReplyOnly').checked = true;
  if (post.visibility === 'timed') {
    $('hiddenTimed').checked = true;
    selectedVisibleAfter = post.visible_after || null;
  }
  renderTags();
  refreshHiddenPanel();
  updateBountyVisibility();
}

function refreshHiddenPanel() {
  const showHidden = $('hiddenReplyOnly').checked || $('hiddenTimed').checked;
  $('hiddenContentWrap').style.display = showHidden ? '' : 'none';
  $('hiddenTimeWrap').classList.toggle('show', $('hiddenTimed').checked);
}

function updateCustomDateTime() {
  const date = $('hiddenDate').value;
  if (!date) return;
  const hour = Math.max(0, Math.min(23, parseInt($('hiddenHour').value || '0', 10)));
  const minute = Math.max(0, Math.min(59, parseInt($('hiddenMinute').value || '0', 10)));
  const value = new Date(date + 'T' + String(hour).padStart(2, '0') + ':' + String(minute).padStart(2, '0') + ':00');
  selectedVisibleAfter = value.getTime();
  $('dtSelected').textContent = '将在 ' + value.toLocaleString('zh-CN') + ' 后可见';
  $('dtSelected').classList.add('show');
}

function applyEditorWrap(before, after) {
  const ta = $('postContent');
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const selected = ta.value.slice(start, end) || '文本';
  ta.value = ta.value.slice(0, start) + before + selected + (after ?? before) + ta.value.slice(end);
  ta.focus();
}

function applyEditorPrefix(prefix) {
  const ta = $('postContent');
  const start = ta.selectionStart;
  ta.value = ta.value.slice(0, start) + prefix + ta.value.slice(start);
  ta.focus();
}

function setFile(file) {
  selectedFile = file || null;
  uploadedAttachment = null;
  if (!file) {
    $('fileChip').classList.remove('show');
    $('fileChipText').textContent = '';
    $('attachFile').value = '';
    return;
  }
  const mb = file.size / 1024 / 1024;
  $('fileChipText').textContent = `${file.name} · ${mb >= 1 ? mb.toFixed(2) + ' MB' : (file.size / 1024).toFixed(1) + ' KB'}`;
  $('fileChip').classList.add('show');
  $('attachName').value = $('attachName').value || file.name;
}

async function uploadSelectedFile() {
  if (!selectedFile) return null;
  const form = new FormData();
  form.append('file', selectedFile);
  const response = await window.NodeWeave.api('/api/attachments/upload', { method: 'POST', body: form });
  const json = await response.json();
  if (json.code !== 0) throw new Error(json.msg || '附件上传失败');
  uploadedAttachment = json.data;
  return uploadedAttachment;
}

async function uploadInlineImage(file) {
  const form = new FormData();
  form.append('file', file);
  const response = await window.NodeWeave.api('/api/attachments/upload', { method: 'POST', body: form });
  const json = await response.json();
  if (json.code !== 0) throw new Error(json.msg || '图片上传失败');
  const ta = $('postContent');
  const insert = `\n![${file.name}](${json.data.url})\n`;
  const start = ta.selectionStart;
  ta.value = ta.value.slice(0, start) + insert + ta.value.slice(start);
}

async function publish() {
  if (!currentUser && !(await requireLogin())) return;
  const title = $('postTitle').value.trim();
  const content = $('postContent').value.trim();
  if (!title) return showMessage('请输入标题', false);
  if (!content) return showMessage('请输入正文内容', false);

  $('btnPublish').disabled = true;
  $('btnPublish').textContent = selectedFile ? '上传附件中...' : (editId ? '保存中...' : '发布中...');
  try {
    const attachment = await uploadSelectedFile();
    const body = {
      title,
      content,
      type: $('postType').value,
      board_id: $('postBoard').value || 'general',
      tags,
      is_ai_generated: $('aiGenerated').checked,
      hidden_content: $('hiddenContent').value.trim(),
      visibility: 'public',
      attachment_url: attachment?.url || $('attachUrl').value.trim(),
      attachment_name: attachment?.file_name || $('attachName').value.trim(),
      attachment_size: attachment?.file_size || (selectedFile ? selectedFile.size : 0),
      bounty: parseInt($('bountyAmount').value || '0', 10) || 0,
    };
    if ($('hiddenReplyOnly').checked) body.visibility = 'reply';
    if ($('hiddenTimed').checked) {
      if (!selectedVisibleAfter || selectedVisibleAfter <= Date.now()) throw new Error('请选择晚于当前时间的可见时间');
      body.visibility = 'timed';
      body.visible_after = selectedVisibleAfter;
    }
    const url = editId ? '/api/posts/' + encodeURIComponent(editId) : '/api/posts';
    const json = await apiJson(url, { method: editId ? 'PUT' : 'POST', body: JSON.stringify(body) });
    if (json.code !== 0) throw new Error(json.msg || '发布失败');
    localStorage.removeItem('nodeweave_draft');
    showMessage(editId ? '保存成功' : '发布成功，正在跳转...', true);
    const postId = editId || json.data.id;
    setTimeout(() => location.href = 'post.html?id=' + encodeURIComponent(postId), 700);
  } catch (error) {
    showMessage(error.message || '网络错误，请重试', false);
  } finally {
    $('btnPublish').disabled = false;
    $('btnPublish').textContent = editId ? '保存修改' : '发布';
  }
}

function saveDraft() {
  const draft = {
    title: $('postTitle').value,
    content: $('postContent').value,
    type: $('postType').value,
    board_id: $('postBoard').value,
    tags,
    saved_at: Date.now(),
  };
  localStorage.setItem('nodeweave_draft', JSON.stringify(draft));
  showMessage('草稿已保存到本机浏览器', true);
}

function restoreDraft() {
  if (editId) return;
  const raw = localStorage.getItem('nodeweave_draft');
  if (!raw) return;
  try {
    const draft = JSON.parse(raw);
    if (!$('postTitle').value) $('postTitle').value = draft.title || '';
    if (!$('postContent').value) $('postContent').value = draft.content || '';
    if (draft.type) $('postType').value = draft.type;
    if (draft.board_id) $('postBoard').value = draft.board_id;
    tags = Array.isArray(draft.tags) ? draft.tags : [];
    renderTags();
    updateBountyVisibility();
  } catch (error) {}
}

function applyUrlPreset() {
  if (editId) return;
  const params = new URLSearchParams(location.search);
  const type = params.get('type');
  const board = params.get('board');
  if (type === 'blog') {
    $('postType').value = 'blog';
    if ([...$('postBoard').options].some(option => option.value === 'blog')) {
      $('postBoard').value = 'blog';
    }
  }
  if (board && [...$('postBoard').options].some(option => option.value === board)) {
    $('postBoard').value = board;
  }
  updateBountyVisibility();
}

document.addEventListener('DOMContentLoaded', async () => {
  await requireLogin();
  await loadBoards();
  applyUrlPreset();
  restoreDraft();
  await loadEditPost();

  $('postBoard').addEventListener('change', updateBountyVisibility);
  $('postTitle').addEventListener('input', () => $('titleCount').textContent = $('postTitle').value.length + ' / 200');
  $('tagInput').addEventListener('keydown', (event) => {
    if (event.key !== 'Enter') return;
    event.preventDefault();
    addTag(event.target.value);
    event.target.value = '';
  });
  $('hiddenReplyOnly').addEventListener('change', refreshHiddenPanel);
  $('hiddenTimed').addEventListener('change', refreshHiddenPanel);
  $('dtPresets').addEventListener('click', (event) => {
    const button = event.target.closest('.dt-preset');
    if (!button) return;
    document.querySelectorAll('.dt-preset').forEach(item => item.classList.remove('active'));
    button.classList.add('active');
    $('dtCustom').style.display = button.dataset.custom ? '' : 'none';
    if (button.dataset.offset) {
      selectedVisibleAfter = Date.now() + parseInt(button.dataset.offset, 10);
      $('dtSelected').textContent = '将在 ' + new Date(selectedVisibleAfter).toLocaleString('zh-CN') + ' 后可见';
      $('dtSelected').classList.add('show');
    }
  });
  ['hiddenDate', 'hiddenHour', 'hiddenMinute'].forEach(id => $(id).addEventListener('input', updateCustomDateTime));
  document.querySelectorAll('.tool-btn[data-wrap]').forEach(button => button.addEventListener('click', () => applyEditorWrap(button.dataset.wrap)));
  document.querySelectorAll('.tool-btn[data-prefix]').forEach(button => button.addEventListener('click', () => applyEditorPrefix(button.dataset.prefix)));
  $('btnPickFile').addEventListener('click', () => $('attachFile').click());
  $('attachFile').addEventListener('change', (event) => setFile(event.target.files[0]));
  $('btnClearFile').addEventListener('click', () => setFile(null));
  $('btnInlineImage').addEventListener('click', () => $('imageUpload').click());
  $('imageUpload').addEventListener('change', async (event) => {
    const file = event.target.files[0];
    if (!file) return;
    showMessage('图片上传中...', true);
    try {
      await uploadInlineImage(file);
      showMessage('图片已插入正文', true);
    } catch (error) {
      showMessage(error.message || '图片上传失败', false);
    } finally {
      event.target.value = '';
    }
  });
  $('btnPublish').addEventListener('click', publish);
  $('btnDraft').addEventListener('click', saveDraft);
