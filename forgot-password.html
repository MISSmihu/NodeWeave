<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密码找回 // NodeWeave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.fp-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:32px 28px;text-align:center;position:relative;z-index:1}
.fp-card h2{font-family:var(--font-display);font-size:20px;color:var(--cyan);margin-bottom:8px;text-shadow:var(--glow-cyan)}
.fp-card p{color:var(--text-dim);font-size:14px;margin-bottom:24px}
.fp-card .form-group{margin-bottom:16px;text-align:left}
.fp-card label{display:block;font-family:var(--font-mono);font-size:12px;color:var(--text-dim);margin-bottom:6px}
.fp-card input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:14px;outline:none}
.fp-card input:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,240,255,.08)}
.fp-card .btn-primary{width:100%;padding:12px;font-family:var(--font-display);font-size:14px;margin-top:8px}
.fp-card .back-link{display:inline-block;margin-top:16px;font-family:var(--font-mono);font-size:12px;color:var(--text-mute);text-decoration:none}
.fp-card .back-link:hover{color:var(--cyan)}
.success-msg{display:none;color:var(--green);font-size:14px;margin-top:12px}
.error-msg{display:none;color:var(--magenta);font-size:13px;margin-top:8px}
.error-msg.show{display:block}
.success-msg.show{display:block}
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:16px;left:16px;z-index:100;font-family:var(--font-mono);font-size:13px;color:var(--text-mute);text-decoration:none">← 返回</a>
<div class="bg-grid"></div>
<div class="bg-scanlines"></div>
<div class="bg-glow"></div>

<div class="auth-page">
  <div class="fp-card">
    <h2>密码找回</h2>
    <p>输入注册邮箱，我们将发送重置链接。</p>

    <!-- Step 1: Enter email -->
    <div id="stepEmail">
      <div class="form-group">
        <label>注册邮箱</label>
        <input type="email" id="resetEmail" placeholder="your@email.com" required>
      </div>
      <div class="cf-turnstile" data-sitekey="" id="fpTurnstile" style="margin-bottom:12px"></div>
      <p class="error-msg" id="fpError"></p>
      <button class="btn-primary" id="sendBtn">发送重置链接</button>
    </div>

    <!-- Step 2: Reset with token -->
    <div id="stepReset" style="display:none">
      <div class="form-group">
        <label>新密码</label>
        <input type="password" id="newPassword" placeholder="8-72位新密码" minlength="8" maxlength="72" required>
      </div>
      <p class="error-msg" id="resetError"></p>
      <p class="success-msg" id="resetSuccess"></p>
      <button class="btn-primary" id="resetBtn">重置密码</button>
    </div>

    <a href="login.html" class="back-link">← 返回登录</a>
  </div>
</div>

<script>
const token = new URLSearchParams(location.search).get('token');
if (token) {
  document.getElementById('stepEmail').style.display = 'none';
  document.getElementById('stepReset').style.display = '';
}

// Load Turnstile site key
fetch('/api/site-config/public').then(r=>r.json()).then(json=>{
  if(json.code===0&&json.data.turnstile_site_key){
    document.getElementById('fpTurnstile').dataset.sitekey=json.data.turnstile_site_key;
  }
}).catch(()=>{});

document.getElementById('sendBtn').addEventListener('click', async () => {
  const email = document.getElementById('resetEmail').value.trim();
  const ttoken = turnstile.getResponse(document.getElementById('fpTurnstile'));
  const errEl = document.getElementById('fpError');
  errEl.classList.remove('show');
  if(!email){errEl.textContent='请输入邮箱';errEl.classList.add('show');return}
  if(!ttoken){errEl.textContent='请完成人机验证';errEl.classList.add('show');return}

  try{
    const res = await fetch('/api/auth/forgot-password',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,turnstile_token:ttoken})
    });
    const json = await res.json();
    if(json.code===0){
      document.getElementById('stepEmail').innerHTML='<p style="color:var(--green);margin-top:24px">📬 如果该邮箱已注册，重置链接已发送。<br/>请查收邮件（1小时内有效）。</p>';
    }else{
      errEl.textContent=json.msg;errEl.classList.add('show');
      turnstile.reset(document.getElementById('fpTurnstile'));
    }
  }catch(ex){
    errEl.textContent='网络错误，请稍后重试';errEl.classList.add('show');
  }
});

document.getElementById('resetBtn').addEventListener('click', async () => {
  const pwd = document.getElementById('newPassword').value;
  const errEl = document.getElementById('resetError');
  const okEl = document.getElementById('resetSuccess');
  errEl.classList.remove('show');okEl.classList.remove('show');
  if(pwd.length<8||pwd.length>72){errEl.textContent='密码长度须为8-72位';errEl.classList.add('show');return}

  try{
    const res = await fetch('/api/auth/reset-password',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token,pwd})
    });
    const json = await res.json();
    if(json.code===0){
      okEl.textContent='密码已重置！正在跳转...';okEl.classList.add('show');
      setTimeout(()=>{location.href='login.html'},2000);
    }else{
      errEl.textContent=json.msg;errEl.classList.add('show');
    }
  }catch(ex){
    errEl.textContent='网络错误，请稍后重试';errEl.classList.add('show');
  }
});
</script>
</body>
</html>
