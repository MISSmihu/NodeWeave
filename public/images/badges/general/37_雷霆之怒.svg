<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#151008"/>
      <stop offset="100%" stop-color="#0a0805"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#fff8dc"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#3a2a1a" stroke-width="6"/>
  <!-- Storm clouds -->
  <ellipse cx="70" cy="55" rx="30" ry="15" fill="none" stroke="#8899aa" stroke-width="1" opacity="0.4"/>
  <ellipse cx="110" cy="50" rx="35" ry="18" fill="none" stroke="#8899aa" stroke-width="1" opacity="0.4"/>
  <ellipse cx="130" cy="55" rx="25" ry="12" fill="none" stroke="#8899aa" stroke-width="1" opacity="0.35"/>
  <ellipse cx="90" cy="45" rx="28" ry="14" fill="none" stroke="#7788aa" stroke-width="0.8" opacity="0.3"/>
  <!-- Main lightning bolt -->
  <path d="M105,40 L90,80 L105,80 L88,145 L115,85 L100,85 L115,40 Z" fill="url(#gold)" filter="url(#bigGlow)" opacity="0.8"/>
  <path d="M105,40 L90,80 L105,80 L88,145 L115,85 L100,85 L115,40 Z" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)"/>
  <!-- Branch arcs -->
  <path d="M95,65 L80,75 L72,70" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <path d="M110,90 L125,100 L135,95" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <path d="M92,110 L78,120 L70,118" fill="none" stroke="#ffd700" stroke-width="0.8" filter="url(#glow)" opacity="0.3"/>
  <!-- Electric sparks at tip -->
  <circle cx="88" cy="145" r="3" fill="#ffd700" filter="url(#bigGlow)" opacity="0.6"/>
  <line x1="88" y1="148" x2="82" y2="155" stroke="#ffd700" stroke-width="0.8" filter="url(#glow)" opacity="0.4"/>
  <line x1="88" y1="148" x2="95" y2="155" stroke="#ffd700" stroke-width="0.8" filter="url(#glow)" opacity="0.4"/>
  <text x="100" y="170" text-anchor="middle" fill="#ffd700" font-size="11" font-family="Arial" filter="url(#glow)">雷霆之怒</text>
</svg>