<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#0a0202"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="50%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#4a1a1a" stroke-width="6"/>
  <!-- Thumbs up shape -->
  <!-- Palm/base -->
  <rect x="55" y="95" width="80" height="50" rx="6" fill="none" stroke="url(#red)" stroke-width="3" filter="url(#glow)"/>
  <rect x="55" y="95" width="80" height="50" rx="6" fill="#ff4444" opacity="0.08"/>
  <!-- Thumb (up) -->
  <path d="M80,95 Q78,75 78,55 Q78,42 90,42 Q98,42 98,55 L98,75 Q98,80 105,80 L120,80 Q130,80 130,90 L130,95" fill="none" stroke="url(#red)" stroke-width="3" filter="url(#glow)"/>
  <path d="M80,95 Q78,75 78,55 Q78,42 90,42 Q98,42 98,55 L98,75 Q98,80 105,80 L120,80 Q130,80 130,90 L130,95" fill="#ff4444" opacity="0.08"/>
  <!-- Finger details -->
  <line x1="95" y1="110" x2="125" y2="110" stroke="#ff4444" stroke-width="0.8" filter="url(#glow)" opacity="0.3"/>
  <line x1="95" y1="120" x2="125" y2="120" stroke="#ff4444" stroke-width="0.8" filter="url(#glow)" opacity="0.3"/>
  <line x1="95" y1="130" x2="125" y2="130" stroke="#ff4444" stroke-width="0.8" filter="url(#glow)" opacity="0.3"/>
  <!-- Cuff/wrist -->
  <rect x="60" y="138" width="70" height="10" rx="2" fill="none" stroke="#ff6b6b" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <!-- Floating heart particles -->
  <path d="M50,55 Q46,50 50,46 Q54,50 50,55" fill="#ff6b6b" opacity="0.6" filter="url(#glow)"/>
  <path d="M150,50 Q146,45 150,41 Q154,45 150,50" fill="#ff4444" opacity="0.5" filter="url(#glow)"/>
  <path d="M40,75 Q36,70 40,66 Q44,70 40,75" fill="#ff6b6b" opacity="0.4" filter="url(#glow)"/>
  <path d="M160,70 Q156,65 160,61 Q164,65 160,70" fill="#ff4444" opacity="0.4" filter="url(#glow)"/>
  <path d="M45,40 Q41,35 45,31 Q49,35 45,40" fill="#ff6b6b" opacity="0.5" filter="url(#glow)"/>
  <path d="M155,40 Q151,35 155,31 Q159,35 155,40" fill="#ff4444" opacity="0.5" filter="url(#glow)"/>
  <text x="100" y="168" text-anchor="middle" fill="#ff4444" font-size="11" font-family="Arial" filter="url(#glow)">点赞狂魔</text>
</svg>