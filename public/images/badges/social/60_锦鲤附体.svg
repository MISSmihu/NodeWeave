<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0805"/>
      <stop offset="100%" stop-color="#0a0402"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="koiGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="50%" stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#4a2010" stroke-width="6"/>
  <!-- Water ripples background -->
  <ellipse cx="100" cy="110" rx="70" ry="20" fill="none" stroke="#ff8c00" stroke-width="0.5" opacity="0.15" filter="url(#glow)"/>
  <ellipse cx="100" cy="115" rx="55" ry="15" fill="none" stroke="#ffd700" stroke-width="0.5" opacity="0.12" filter="url(#glow)"/>
  <!-- Koi fish body (curved) -->
  <path d="M50,100 Q45,75 70,65 Q100,55 130,70 Q150,80 145,105 Q140,130 110,135 Q80,138 65,125 Q55,115 50,100 Z" fill="none" stroke="url(#koiGold)" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M50,100 Q45,75 70,65 Q100,55 130,70 Q150,80 145,105 Q140,130 110,135 Q80,138 65,125 Q55,115 50,100 Z" fill="#ff8c00" opacity="0.06"/>
  <!-- Koi tail -->
  <path d="M50,100 Q35,90 25,75 Q35,85 45,90" fill="none" stroke="#ff4444" stroke-width="2" filter="url(#glow)" opacity="0.7"/>
  <path d="M50,100 Q35,110 25,125 Q35,115 45,110" fill="none" stroke="#ff8c00" stroke-width="2" filter="url(#glow)" opacity="0.7"/>
  <!-- Koi head/eye -->
  <circle cx="135" cy="85" r="4" fill="none" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="135" cy="85" r="1.5" fill="#ffd700" opacity="0.6"/>
  <!-- Koi mouth -->
  <path d="M145,92 Q150,95 148,98" fill="none" stroke="#ff4444" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <!-- Koi whiskers -->
  <path d="M148,98 Q155,102 160,108" fill="none" stroke="#ffd700" stroke-width="0.8" filter="url(#glow)" opacity="0.4"/>
  <path d="M148,98 Q155,105 158,112" fill="none" stroke="#ffd700" stroke-width="0.8" filter="url(#glow)" opacity="0.3"/>
  <!-- Koi scales/spots -->
  <ellipse cx="80" cy="95" rx="8" ry="5" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <ellipse cx="100" cy="100" rx="8" ry="5" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <ellipse cx="120" cy="100" rx="8" ry="5" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <!-- Red spot on back -->
  <ellipse cx="95" cy="80" rx="10" ry="6" fill="#ff4444" opacity="0.25" filter="url(#glow)"/>
  <!-- Fins -->
  <path d="M85,130 Q90,140 95,135" fill="none" stroke="#ff8c00" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <path d="M110,130 Q115,140 120,135" fill="none" stroke="#ff8c00" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <!-- Water splash -->
  <circle cx="40" cy="70" r="2" fill="#00bfff" opacity="0.3" filter="url(#glow)"/>
  <circle cx="35" cy="80" r="1.5" fill="#00bfff" opacity="0.2" filter="url(#glow)"/>
  <text x="100" y="170" text-anchor="middle" fill="#ff8c00" font-size="11" font-family="Arial" filter="url(#glow)">锦鲤附体</text>
</svg>