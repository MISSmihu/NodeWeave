<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#050a15"/>
      <stop offset="100%" stop-color="#020510"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="christmasRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff0033"/>
      <stop offset="100%" stop-color="#cc0019"/>
    </linearGradient>
    <linearGradient id="santaGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00cc44"/>
      <stop offset="100%" stop-color="#009933"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#2a2a3a" stroke-width="6"/>
  <!-- Snowflakes background -->
  <text x="40" y="55" fill="#fff" font-size="14" opacity="0.4" filter="url(#glow)">❄</text>
  <text x="155" y="50" fill="#fff" font-size="12" opacity="0.35" filter="url(#glow)">❄</text>
  <text x="35" y="90" fill="#fff" font-size="10" opacity="0.3" filter="url(#glow)">❄</text>
  <text x="160" y="85" fill="#fff" font-size="14" opacity="0.35" filter="url(#glow)">❄</text>
  <text x="50" y="140" fill="#fff" font-size="12" opacity="0.3" filter="url(#glow)">❄</text>
  <text x="150" y="145" fill="#fff" font-size="10" opacity="0.25" filter="url(#glow)">❄</text>
  <!-- Santa hat main (red triangle, curved) -->
  <path d="M50,130 Q55,80 100,40 Q120,60 130,90 Q135,110 130,125 Q90,140 50,130 Z" fill="none" stroke="url(#christmasRed)" stroke-width="3" filter="url(#glow)"/>
  <path d="M50,130 Q55,80 100,40 Q120,60 130,90 Q135,110 130,125 Q90,140 50,130 Z" fill="#ff0033" opacity="0.1"/>
  <!-- White fur trim at bottom -->
  <path d="M48,128 Q60,135 90,138 Q110,138 130,128 L130,138 Q110,148 90,148 Q60,145 48,138 Z" fill="none" stroke="#fff" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  <path d="M48,128 Q60,135 90,138 Q110,138 130,128 L130,138 Q110,148 90,148 Q60,145 48,138 Z" fill="#fff" opacity="0.1"/>
  <!-- Fur bumps -->
  <circle cx="60" cy="133" r="4" fill="none" stroke="#fff" stroke-width="0.8" filter="url(#glow)" opacity="0.5"/>
  <circle cx="80" cy="138" r="4" fill="none" stroke="#fff" stroke-width="0.8" filter="url(#glow)" opacity="0.5"/>
  <circle cx="100" cy="139" r="4" fill="none" stroke="#fff" stroke-width="0.8" filter="url(#glow)" opacity="0.5"/>
  <circle cx="120" cy="135" r="4" fill="none" stroke="#fff" stroke-width="0.8" filter="url(#glow)" opacity="0.5"/>
  <!-- Pom pom at tip -->
  <circle cx="100" cy="40" r="10" fill="none" stroke="#fff" stroke-width="2" filter="url(#glow)"/>
  <circle cx="100" cy="40" r="10" fill="#fff" opacity="0.15"/>
  <!-- Green decorative stripes -->
  <line x1="80" y1="65" x2="85" y2="70" stroke="url(#santaGreen)" stroke-width="2" filter="url(#glow)" opacity="0.5"/>
  <line x1="95" y1="60" x2="100" y2="65" stroke="url(#santaGreen)" stroke-width="2" filter="url(#glow)" opacity="0.5"/>
  <line x1="110" y1="75" x2="115" y2="80" stroke="url(#santaGreen)" stroke-width="2" filter="url(#glow)" opacity="0.5"/>
  <!-- Holly leaf -->
  <path d="M70,150 Q65,155 68,162 Q75,160 75,153 Z" fill="none" stroke="url(#santaGreen)" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <circle cx="78" cy="160" r="2" fill="#ff0033" filter="url(#glow)" opacity="0.6"/>
  <text x="100" y="170" text-anchor="middle" fill="#ff0033" font-size="11" font-family="Arial" filter="url(#glow)">圣诞老人</text>
</svg>