<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1505"/>
      <stop offset="100%" stop-color="#0a0802"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="mooncakeGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffcc33"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#5a4a1a" stroke-width="6"/>
  <!-- Mooncake outer circle -->
  <circle cx="100" cy="95" r="50" fill="none" stroke="url(#mooncakeGold)" stroke-width="3" filter="url(#glow)"/>
  <circle cx="100" cy="95" r="50" fill="#ffd700" opacity="0.06"/>
  <!-- Mooncake scalloped edge -->
  <circle cx="100" cy="45" r="6" fill="none" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <circle cx="135" cy="60" r="6" fill="none" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <circle cx="150" cy="95" r="6" fill="none" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <circle cx="135" cy="130" r="6" fill="none" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <circle cx="100" cy="145" r="6" fill="none" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <circle cx="65" cy="130" r="6" fill="none" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <circle cx="50" cy="95" r="6" fill="none" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <circle cx="65" cy="60" r="6" fill="none" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <!-- Center pattern -->
  <circle cx="100" cy="95" r="25" fill="none" stroke="url(#mooncakeGold)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="100" cy="95" r="25" fill="#daa520" opacity="0.08"/>
  <!-- Inner pattern lines -->
  <line x1="100" y1="70" x2="100" y2="120" stroke="#ffd700" stroke-width="0.8" filter="url(#glow)" opacity="0.4"/>
  <line x1="75" y1="95" x2="125" y2="95" stroke="#ffd700" stroke-width="0.8" filter="url(#glow)" opacity="0.4"/>
  <line x1="82" y1="77" x2="118" y2="113" stroke="#ffd700" stroke-width="0.6" filter="url(#glow)" opacity="0.3"/>
  <line x1="118" y1="77" x2="82" y2="113" stroke="#ffd700" stroke-width="0.6" filter="url(#glow)" opacity="0.3"/>
  <!-- Jade rabbit silhouette -->
  <ellipse cx="100" cy="95" rx="10" ry="12" fill="#ffd700" opacity="0.3" filter="url(#glow)"/>
  <circle cx="96" cy="88" r="3" fill="#ffd700" opacity="0.2"/>
  <circle cx="104" cy="88" r="3" fill="#ffd700" opacity="0.2"/>
  <ellipse cx="95" cy="80" rx="2" ry="5" fill="#ffd700" opacity="0.25" filter="url(#glow)"/>
  <ellipse cx="105" cy="80" rx="2" ry="5" fill="#ffd700" opacity="0.25" filter="url(#glow)"/>
  <!-- Moon glow -->
  <circle cx="150" cy="50" r="12" fill="none" stroke="#fff8dc" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <circle cx="150" cy="50" r="12" fill="#fff8dc" opacity="0.1"/>
  <text x="100" y="170" text-anchor="middle" fill="#ffd700" font-size="11" font-family="Arial" filter="url(#glow)">中秋团圆</text>
</svg>