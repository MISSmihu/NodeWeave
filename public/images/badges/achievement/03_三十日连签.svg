<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1025"/>
      <stop offset="100%" stop-color="#0a0510"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#6c3483"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <!-- Diamond shape -->
  <polygon points="100,30 160,75 160,130 100,170 40,130 40,75" fill="none" stroke="url(#gold)" stroke-width="3" filter="url(#glow)"/>
  <polygon points="100,42 150,80 150,125 100,158 50,125 50,80" fill="url(#purple)" opacity="0.3"/>
  <polygon points="100,42 150,80 150,125 100,158 50,125 50,80" fill="none" stroke="url(#gold)" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <!-- Inner facets -->
  <line x1="100" y1="42" x2="100" y2="158" stroke="#ffd700" stroke-width="0.5" opacity="0.3"/>
  <line x1="50" y1="80" x2="150" y2="125" stroke="#ffd700" stroke-width="0.5" opacity="0.3"/>
  <line x1="150" y1="80" x2="50" y2="125" stroke="#ffd700" stroke-width="0.5" opacity="0.3"/>
  <!-- Number 30 -->
  <text x="100" y="108" text-anchor="middle" fill="url(#gold)" font-size="32" font-weight="bold" font-family="Arial" filter="url(#glow)">30</text>
  <!-- Sparkles -->
  <circle cx="100" cy="30" r="2" fill="#ffd700" filter="url(#glow)" opacity="0.8"/>
  <circle cx="160" cy="75" r="1.5" fill="#9b59b6" filter="url(#glow)" opacity="0.7"/>
  <circle cx="40" cy="130" r="1.5" fill="#ffd700" filter="url(#glow)" opacity="0.6"/>
  <text x="100" y="185" text-anchor="middle" fill="#ffd700" font-size="10" font-family="Arial" filter="url(#glow)">三十日连签</text>
</svg>