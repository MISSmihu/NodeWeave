<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1505"/>
      <stop offset="100%" stop-color="#0a0a02"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="warmGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#5a4a1a" stroke-width="6"/>
  <!-- House shape -->
  <path d="M100,40 L150,80 L150,140 L50,140 L50,80 Z" fill="none" stroke="url(#warmGold)" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M100,40 L150,80 L150,140 L50,140 L50,80 Z" fill="#ffd700" opacity="0.08"/>
  <!-- Roof -->
  <path d="M100,40 L155,82 L45,82 Z" fill="none" stroke="url(#warmGold)" stroke-width="2" filter="url(#glow)"/>
  <!-- Door -->
  <rect x="82" y="100" width="36" height="40" rx="2" fill="none" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Door number plate -->
  <rect x="90" y="110" width="20" height="12" rx="2" fill="none" stroke="#ffe066" stroke-width="1" filter="url(#glow)"/>
  <text x="100" y="120" text-anchor="middle" fill="#ffe066" font-size="9" font-weight="bold" font-family="Arial" filter="url(#glow)">365</text>
  <!-- Door knob -->
  <circle cx="110" cy="122" r="2" fill="#ffd700" filter="url(#glow)" opacity="0.8"/>
  <!-- Window -->
  <rect x="58" y="88" width="16" height="16" rx="1" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.6"/>
  <line x1="66" y1="88" x2="66" y2="104" stroke="#ffd700" stroke-width="0.5" opacity="0.4"/>
  <line x1="58" y1="96" x2="74" y2="96" stroke="#ffd700" stroke-width="0.5" opacity="0.4"/>
  <!-- Ivy decorations -->
  <path d="M50,140 Q45,135 48,130 Q52,132 50,140" fill="#2ecc71" opacity="0.6" filter="url(#glow)"/>
  <path d="M55,140 Q52,132 55,128 Q58,131 55,140" fill="#27ae60" opacity="0.5" filter="url(#glow)"/>
  <path d="M150,140 Q155,135 152,130 Q148,132 150,140" fill="#2ecc71" opacity="0.6" filter="url(#glow)"/>
  <path d="M145,140 Q148,132 145,128 Q142,131 145,140" fill="#27ae60" opacity="0.5" filter="url(#glow)"/>
  <!-- Chimney -->
  <rect x="120" y="48" width="12" height="22" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <text x="100" y="165" text-anchor="middle" fill="#ffd700" font-size="11" font-family="Arial" filter="url(#glow)">永久居民</text>
</svg>