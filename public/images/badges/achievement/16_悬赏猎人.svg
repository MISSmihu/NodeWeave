<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1005"/>
      <stop offset="100%" stop-color="#0a0802"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="orangeGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8c00"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#5a3a0a" stroke-width="6"/>
  <!-- Crosshair outer ring -->
  <circle cx="100" cy="95" r="50" fill="none" stroke="url(#orangeGold)" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="100" cy="95" r="35" fill="none" stroke="url(#orangeGold)" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <circle cx="100" cy="95" r="20" fill="none" stroke="url(#orangeGold)" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <!-- Crosshair lines -->
  <line x1="100" y1="35" x2="100" y2="65" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)"/>
  <line x1="100" y1="125" x2="100" y2="155" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)"/>
  <line x1="40" y1="95" x2="70" y2="95" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)"/>
  <line x1="130" y1="95" x2="160" y2="95" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Center coin symbol -->
  <circle cx="100" cy="95" r="12" fill="none" stroke="#ffd700" stroke-width="2" filter="url(#glow)"/>
  <text x="100" y="100" text-anchor="middle" fill="#ffd700" font-size="14" font-weight="bold" font-family="Arial" filter="url(#glow)">$</text>
  <!-- Target texture -->
  <circle cx="100" cy="95" r="50" fill="url(#orangeGold)" opacity="0.03"/>
  <text x="100" y="170" text-anchor="middle" fill="#ff8c00" font-size="11" font-family="Arial" filter="url(#glow)">悬赏猎人</text>
</svg>