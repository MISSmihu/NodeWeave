<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1510"/>
      <stop offset="100%" stop-color="#0a0505"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="flame" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#ff4500"/>
      <stop offset="50%" stop-color="#ff6a00"/>
      <stop offset="100%" stop-color="#ffaa00"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b4513"/>
      <stop offset="50%" stop-color="#5a2d0c"/>
      <stop offset="100%" stop-color="#8b4513"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#border)" stroke-width="6"/>
  <!-- Flame shape -->
  <path d="M100,35 C115,55 145,70 145,100 C145,125 125,140 100,140 C75,140 55,125 55,100 C55,70 85,55 100,35 Z" fill="none" stroke="url(#flame)" stroke-width="3" filter="url(#glow)"/>
  <path d="M100,50 C110,65 130,75 130,100 C130,118 118,128 100,128 C82,128 70,118 70,100 C70,75 90,65 100,50 Z" fill="url(#flame)" opacity="0.2"/>
  <!-- Inner flame -->
  <path d="M100,70 C108,80 118,88 118,102 C118,112 110,118 100,118 C90,118 82,112 82,102 C82,88 92,80 100,70 Z" fill="url(#flame)" opacity="0.4"/>
  <!-- Number 7 -->
  <text x="100" y="108" text-anchor="middle" fill="#ffcc00" font-size="36" font-weight="bold" font-family="Arial" filter="url(#glow)">7</text>
  <!-- Sparks -->
  <circle cx="80" cy="40" r="2" fill="#ff6a00" filter="url(#glow)" opacity="0.8"/>
  <circle cx="120" cy="35" r="1.5" fill="#ffaa00" filter="url(#glow)" opacity="0.7"/>
  <circle cx="65" cy="50" r="1" fill="#ff4500" filter="url(#glow)" opacity="0.6"/>
  <circle cx="135" cy="45" r="1.5" fill="#ff6a00" filter="url(#glow)" opacity="0.7"/>
  <circle cx="50" cy="65" r="1" fill="#ffaa00" filter="url(#glow)" opacity="0.5"/>
  <circle cx="150" cy="60" r="1" fill="#ff4500" filter="url(#glow)" opacity="0.6"/>
  <text x="100" y="170" text-anchor="middle" fill="#ff6a00" font-size="11" font-family="Arial" filter="url(#glow)">七日连签</text>
</svg>