<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#150a20"/>
      <stop offset="100%" stop-color="#0a0510"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bf55ec"/>
      <stop offset="100%" stop-color="#8e44ad"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#3a1a5a" stroke-width="6"/>
  <!-- Graduation cap -->
  <polygon points="100,50 155,75 100,95 45,75" fill="none" stroke="url(#purple)" stroke-width="2.5" filter="url(#glow)"/>
  <polygon points="100,50 155,75 100,95 45,75" fill="url(#purple)" opacity="0.15"/>
  <!-- Cap top -->
  <rect x="80" y="45" width="40" height="8" rx="2" fill="none" stroke="#bf55ec" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Tassel string -->
  <line x1="145" y1="75" x2="155" y2="110" stroke="#bf55ec" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Tassel end -->
  <line x1="155" y1="110" x2="150" y2="120" stroke="#bf55ec" stroke-width="1.5" filter="url(#glow)"/>
  <line x1="155" y1="110" x2="155" y2="122" stroke="#bf55ec" stroke-width="1.5" filter="url(#glow)"/>
  <line x1="155" y1="110" x2="160" y2="120" stroke="#bf55ec" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Number 10 -->
  <text x="100" y="88" text-anchor="middle" fill="#bf55ec" font-size="28" font-weight="bold" font-family="Arial" filter="url(#glow)">10</text>
  <!-- Academic ribbon -->
  <path d="M65,95 L80,130 L100,115 L120,130 L135,95" fill="none" stroke="#8e44ad" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <text x="100" y="150" text-anchor="middle" fill="#bf55ec" font-size="11" font-family="Arial" filter="url(#glow)">答疑专家</text>
</svg>