<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#150a20"/>
      <stop offset="100%" stop-color="#0a0515"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="darkGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#8b6914"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8e44ad"/>
      <stop offset="100%" stop-color="#6c3483"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#3a2a4a" stroke-width="6"/>
  <!-- Castle main body -->
  <rect x="60" y="80" width="80" height="60" fill="none" stroke="url(#darkGold)" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="60" y="80" width="80" height="60" fill="url(#purple)" opacity="0.1"/>
  <!-- Gothic spires -->
  <path d="M70,80 L70,45 L80,55 L80,45 L85,65 L85,80" fill="none" stroke="url(#darkGold)" stroke-width="1.5" filter="url(#glow)"/>
  <path d="M115,80 L115,65 L120,45 L125,45 L130,80" fill="none" stroke="url(#darkGold)" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Central tall spire -->
  <path d="M95,80 L95,35 L100,25 L105,35 L105,80" fill="none" stroke="url(#darkGold)" stroke-width="2" filter="url(#glow)"/>
  <polygon points="100,25 97,35 103,35" fill="#b8860b" opacity="0.5" filter="url(#glow)"/>
  <!-- Gate -->
  <path d="M85,140 L85,115 Q100,105 115,115 L115,140" fill="none" stroke="#8b6914" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Windows -->
  <circle cx="80" cy="100" r="5" fill="none" stroke="#b8860b" stroke-width="1" filter="url(#glow)" opacity="0.6"/>
  <circle cx="120" cy="100" r="5" fill="none" stroke="#b8860b" stroke-width="1" filter="url(#glow)" opacity="0.6"/>
  <!-- 3 year number -->
  <text x="100" y="108" text-anchor="middle" fill="#b8860b" font-size="16" font-weight="bold" font-family="Arial" filter="url(#glow)">3年</text>
  <!-- Crenellations -->
  <rect x="60" y="75" width="8" height="8" fill="none" stroke="#8b6914" stroke-width="0.8" opacity="0.5"/>
  <rect x="76" y="75" width="8" height="8" fill="none" stroke="#8b6914" stroke-width="0.8" opacity="0.5"/>
  <rect x="116" y="75" width="8" height="8" fill="none" stroke="#8b6914" stroke-width="0.8" opacity="0.5"/>
  <rect x="132" y="75" width="8" height="8" fill="none" stroke="#8b6914" stroke-width="0.8" opacity="0.5"/>
  <text x="100" y="165" text-anchor="middle" fill="#b8860b" font-size="11" font-family="Arial" filter="url(#glow)">三朝元老</text>
</svg>