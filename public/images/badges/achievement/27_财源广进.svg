<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1505"/>
      <stop offset="100%" stop-color="#0a0a02"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffec8b"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#5a4a1a" stroke-width="6"/>
  <!-- Vault door -->
  <circle cx="100" cy="95" r="48" fill="none" stroke="url(#gold)" stroke-width="3" filter="url(#glow)"/>
  <circle cx="100" cy="95" r="42" fill="none" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <circle cx="100" cy="95" r="48" fill="#ffd700" opacity="0.06"/>
  <!-- Vault handle -->
  <circle cx="100" cy="95" r="18" fill="none" stroke="url(#gold)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="100" cy="95" r="5" fill="#ffd700" filter="url(#glow)" opacity="0.5"/>
  <!-- Vault bolts -->
  <line x1="55" y1="70" x2="62" y2="75" stroke="#ffd700" stroke-width="2" filter="url(#glow)" opacity="0.6"/>
  <line x1="55" y1="120" x2="62" y2="115" stroke="#ffd700" stroke-width="2" filter="url(#glow)" opacity="0.6"/>
  <line x1="145" y1="70" x2="138" y2="75" stroke="#ffd700" stroke-width="2" filter="url(#glow)" opacity="0.6"/>
  <line x1="145" y1="120" x2="138" y2="115" stroke="#ffd700" stroke-width="2" filter="url(#glow)" opacity="0.6"/>
  <!-- Number 10000 -->
  <text x="100" y="100" text-anchor="middle" fill="url(#gold)" font-size="18" font-weight="bold" font-family="Arial" filter="url(#glow)">10000</text>
  <!-- Stacked coins at bottom -->
  <ellipse cx="75" cy="152" rx="10" ry="4" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <ellipse cx="75" cy="148" rx="10" ry="4" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <ellipse cx="100" cy="155" rx="10" ry="4" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <ellipse cx="100" cy="151" rx="10" ry="4" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <ellipse cx="100" cy="147" rx="10" ry="4" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <ellipse cx="125" cy="152" rx="10" ry="4" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <text x="100" y="175" text-anchor="middle" fill="#ffd700" font-size="11" font-family="Arial" filter="url(#glow)">财源广进</text>
</svg>