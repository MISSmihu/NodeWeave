<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1a10"/>
      <stop offset="100%" stop-color="#050a08"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="neonGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc66"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#1a3a2a" stroke-width="6"/>
  <!-- Folder shape -->
  <path d="M50,55 L50,145 Q50,150 55,150 L145,150 Q150,150 150,145 L150,70 L105,70 L95,55 Z" fill="none" stroke="url(#neonGreen)" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M50,55 L50,145 Q50,150 55,150 L145,150 Q150,150 150,145 L150,70 L105,70 L95,55 Z" fill="#00ff88" opacity="0.08"/>
  <!-- Checkmark -->
  <path d="M72,100 L90,120 L132,72" fill="none" stroke="#00ff88" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Data line decorations -->
  <line x1="60" y1="80" x2="90" y2="80" stroke="#00ff88" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="88" x2="85" y2="88" stroke="#00ff88" stroke-width="1" opacity="0.25"/>
  <line x1="60" y1="130" x2="90" y2="130" stroke="#00ff88" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="138" x2="85" y2="138" stroke="#00ff88" stroke-width="1" opacity="0.25"/>
  <!-- Corner data dots -->
  <circle cx="60" cy="80" r="1.5" fill="#00ff88" opacity="0.5"/>
  <circle cx="60" cy="88" r="1.5" fill="#00ff88" opacity="0.4"/>
  <circle cx="60" cy="130" r="1.5" fill="#00ff88" opacity="0.5"/>
  <circle cx="60" cy="138" r="1.5" fill="#00ff88" opacity="0.4"/>
  <text x="100" y="170" text-anchor="middle" fill="#00ff88" font-size="11" font-family="Arial" filter="url(#glow)">完美档案</text>
</svg>