<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a15"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a4a6a"/>
      <stop offset="50%" stop-color="#2a2a3a"/>
      <stop offset="100%" stop-color="#4a4a6a"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00fff5"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <!-- Metal border -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#border)" stroke-width="6"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#333350" stroke-width="1"/>
  <!-- Neon ring -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="url(#neon)" stroke-width="2" filter="url(#glow)" opacity="0.6"/>
  <!-- Triangle symbol -->
  <polygon points="100,45 140,125 60,125" fill="none" stroke="url(#neon)" stroke-width="3" filter="url(#glow)"/>
  <polygon points="100,55 130,120 70,120" fill="url(#neon)" opacity="0.15"/>
  <!-- Circuit lines -->
  <line x1="60" y1="100" x2="40" y2="100" stroke="#00fff5" stroke-width="1" opacity="0.4" filter="url(#glow)"/>
  <line x1="140" y1="100" x2="160" y2="100" stroke="#00fff5" stroke-width="1" opacity="0.4" filter="url(#glow)"/>
  <line x1="100" y1="45" x2="100" y2="30" stroke="#00fff5" stroke-width="1" opacity="0.4" filter="url(#glow)"/>
  <circle cx="40" cy="100" r="2" fill="#00fff5" opacity="0.6"/>
  <circle cx="160" cy="100" r="2" fill="#00fff5" opacity="0.6"/>
  <circle cx="100" cy="30" r="2" fill="#00fff5" opacity="0.6"/>
  <!-- Text -->
  <text x="100" y="170" text-anchor="middle" fill="#00fff5" font-size="11" font-family="Arial" filter="url(#glow)">初来乍到</text>
</svg>