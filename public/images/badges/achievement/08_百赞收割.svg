<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1005"/>
      <stop offset="100%" stop-color="#0a0802"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="orangeGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8c00"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#8b6508" stroke-width="6"/>
  <!-- Multi-layer stars -->
  <polygon points="100,35 110,65 140,68 115,88 125,118 100,100 75,118 85,88 60,68 90,65" fill="none" stroke="#ff8c00" stroke-width="2" filter="url(#glow)" opacity="0.5"/>
  <polygon points="100,45 112,72 145,75 120,93 130,120 100,105 70,120 80,93 55,75 88,72" fill="none" stroke="url(#orangeGold)" stroke-width="2.5" filter="url(#glow)"/>
  <polygon points="100,55 110,78 135,80 115,95 122,115 100,103 78,115 85,95 65,80 90,78" fill="url(#orangeGold)" opacity="0.15"/>
  <!-- Star rays -->
  <line x1="100" y1="35" x2="100" y2="25" stroke="#ffd700" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
  <line x1="140" y1="68" x2="152" y2="60" stroke="#ffd700" stroke-width="1" opacity="0.5" filter="url(#glow)"/>
  <line x1="60" y1="68" x2="48" y2="60" stroke="#ffd700" stroke-width="1" opacity="0.5" filter="url(#glow)"/>
  <line x1="125" y1="118" x2="138" y2="130" stroke="#ffd700" stroke-width="1" opacity="0.4" filter="url(#glow)"/>
  <line x1="75" y1="118" x2="62" y2="130" stroke="#ffd700" stroke-width="1" opacity="0.4" filter="url(#glow)"/>
  <!-- Number 100 -->
  <text x="100" y="98" text-anchor="middle" fill="#ffd700" font-size="24" font-weight="bold" font-family="Arial" filter="url(#glow)">100</text>
  <text x="100" y="170" text-anchor="middle" fill="#ff8c00" font-size="11" font-family="Arial" filter="url(#glow)">百赞收割</text>
</svg>