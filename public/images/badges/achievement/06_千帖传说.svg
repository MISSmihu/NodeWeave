<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1505"/>
      <stop offset="100%" stop-color="#0a0a02"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="30%" stop-color="#ffec8b"/>
      <stop offset="70%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#goldDark)" stroke-width="6"/>
  <!-- Crown base -->
  <path d="M55,110 L55,85 L70,95 L85,70 L100,90 L115,70 L130,95 L145,85 L145,110 Z" fill="url(#gold)" filter="url(#glow)" opacity="0.8"/>
  <path d="M55,110 L145,110 L140,120 L60,120 Z" fill="url(#goldDark)"/>
  <!-- Crown band -->
  <rect x="60" y="108" width="80" height="8" rx="2" fill="url(#goldDark)" stroke="#ffd700" stroke-width="1"/>
  <!-- Gems -->
  <circle cx="75" cy="112" r="3" fill="#e74c3c" filter="url(#glow)"/>
  <circle cx="100" cy="112" r="4" fill="#3498db" filter="url(#glow)"/>
  <circle cx="125" cy="112" r="3" fill="#2ecc71" filter="url(#glow)"/>
  <!-- Crown tips -->
  <circle cx="55" cy="83" r="3" fill="#ffd700" filter="url(#glow)"/>
  <circle cx="85" cy="68" r="3" fill="#ffd700" filter="url(#glow)"/>
  <circle cx="115" cy="68" r="3" fill="#ffd700" filter="url(#glow)"/>
  <circle cx="145" cy="83" r="3" fill="#ffd700" filter="url(#glow)"/>
  <!-- Light rays -->
  <line x1="100" y1="55" x2="100" y2="40" stroke="#ffd700" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
  <line x1="85" y1="60" x2="75" y2="48" stroke="#ffd700" stroke-width="1" opacity="0.4" filter="url(#glow)"/>
  <line x1="115" y1="60" x2="125" y2="48" stroke="#ffd700" stroke-width="1" opacity="0.4" filter="url(#glow)"/>
  <!-- Number -->
  <text x="100" y="105" text-anchor="middle" fill="#fff8dc" font-size="18" font-weight="bold" font-family="Arial" filter="url(#glow)">千帖</text>
  <!-- Particles -->
  <circle cx="45" cy="50" r="1.5" fill="#ffd700" filter="url(#glow)" opacity="0.5"/>
  <circle cx="155" cy="55" r="1" fill="#ffd700" filter="url(#glow)" opacity="0.4"/>
  <circle cx="35" cy="90" r="1" fill="#ffd700" filter="url(#glow)" opacity="0.6"/>
  <circle cx="165" cy="85" r="1.5" fill="#ffd700" filter="url(#glow)" opacity="0.5"/>
  <circle cx="50" cy="140" r="1" fill="#ffd700" filter="url(#glow)" opacity="0.3"/>
  <circle cx="150" cy="135" r="1" fill="#ffd700" filter="url(#glow)" opacity="0.4"/>
  <text x="100" y="170" text-anchor="middle" fill="#ffd700" font-size="11" font-family="Arial" filter="url(#glow)">千帖传说</text>
</svg>