<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0a15"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="silver" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#e0e0e8"/>
      <stop offset="80%" stop-color="#a0a0b0"/>
      <stop offset="100%" stop-color="#606070"/>
    </radialGradient>
    <linearGradient id="silverRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e0e8"/>
      <stop offset="50%" stop-color="#9090a0"/>
      <stop offset="100%" stop-color="#e0e0e8"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#silverRing)" stroke-width="6"/>
  <!-- Diamond/rhombus shape -->
  <polygon points="100,30 165,100 100,170 35,100" fill="url(#silver)" opacity="0.35" filter="url(#glow)"/>
  <polygon points="100,30 165,100 100,170 35,100" fill="none" stroke="url(#silverRing)" stroke-width="3" filter="url(#glow)"/>
  <!-- Inner diamond -->
  <polygon points="100,45 150,100 100,155 50,100" fill="none" stroke="#c0c0cc" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <polygon points="100,45 150,100 100,155 50,100" fill="#fff" opacity="0.04"/>
  <!-- Mirror reflection facets -->
  <line x1="100" y1="45" x2="100" y2="155" stroke="#fff" stroke-width="0.8" opacity="0.3"/>
  <line x1="50" y1="100" x2="150" y2="100" stroke="#fff" stroke-width="0.8" opacity="0.3"/>
  <line x1="100" y1="45" x2="50" y2="100" stroke="#e0e0e8" stroke-width="0.5" opacity="0.4"/>
  <line x1="100" y1="45" x2="150" y2="100" stroke="#e0e0e8" stroke-width="0.5" opacity="0.4"/>
  <line x1="50" y1="100" x2="100" y2="155" stroke="#e0e0e8" stroke-width="0.5" opacity="0.4"/>
  <line x1="150" y1="100" x2="100" y2="155" stroke="#e0e0e8" stroke-width="0.5" opacity="0.4"/>
  <!-- Intricate patterns -->
  <circle cx="100" cy="100" r="22" fill="none" stroke="#c0c0cc" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <circle cx="100" cy="100" r="15" fill="none" stroke="#fff" stroke-width="0.8" filter="url(#glow)" opacity="0.3"/>
  <!-- Center star/symbol -->
  <polygon points="100,85 103,95 113,95 105,102 108,112 100,106 92,112 95,102 87,95 97,95" fill="#fff" opacity="0.3" filter="url(#glow)"/>
  <!-- Corner decorative dots -->
  <circle cx="100" cy="30" r="3" fill="#fff" filter="url(#glow)" opacity="0.6"/>
  <circle cx="165" cy="100" r="3" fill="#fff" filter="url(#glow)" opacity="0.6"/>
  <circle cx="100" cy="170" r="3" fill="#fff" filter="url(#glow)" opacity="0.6"/>
  <circle cx="35" cy="100" r="3" fill="#fff" filter="url(#glow)" opacity="0.6"/>
  <!-- Shine highlight -->
  <ellipse cx="78" cy="75" rx="15" ry="10" fill="#fff" opacity="0.1"/>
  <!-- Sparkles -->
  <circle cx="55" cy="60" r="1" fill="#fff" filter="url(#glow)" opacity="0.5"/>
  <circle cx="145" cy="60" r="1" fill="#fff" filter="url(#glow)" opacity="0.5"/>
  <text x="100" y="185" text-anchor="middle" fill="#e0e0e8" font-size="11" font-family="Arial" filter="url(#glow)">白银勋章</text>
</svg>