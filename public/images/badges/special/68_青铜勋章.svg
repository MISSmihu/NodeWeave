<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#0a0805"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bronze" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="40%" stop-color="#cd7f32"/>
      <stop offset="80%" stop-color="#8b5a2b"/>
      <stop offset="100%" stop-color="#5a3a1a"/>
    </radialGradient>
    <linearGradient id="bronzeRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cd7f32"/>
      <stop offset="50%" stop-color="#a0651e"/>
      <stop offset="100%" stop-color="#cd7f32"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#bronzeRing)" stroke-width="6"/>
  <!-- Outer decorative ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#cd7f32" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#8b5a2b" stroke-width="0.8" opacity="0.4"/>
  <!-- Main medal -->
  <circle cx="100" cy="100" r="65" fill="url(#bronze)" opacity="0.4" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="65" fill="none" stroke="url(#bronzeRing)" stroke-width="3" filter="url(#glow)"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="55" fill="none" stroke="#a0651e" stroke-width="1" opacity="0.5"/>
  <!-- Roman decorative dots -->
  <circle cx="100" cy="45" r="2" fill="#8b5a2b" opacity="0.6"/>
  <circle cx="135" cy="65" r="2" fill="#8b5a2b" opacity="0.6"/>
  <circle cx="155" cy="100" r="2" fill="#8b5a2b" opacity="0.6"/>
  <circle cx="135" cy="135" r="2" fill="#8b5a2b" opacity="0.6"/>
  <circle cx="100" cy="155" r="2" fill="#8b5a2b" opacity="0.6"/>
  <circle cx="65" cy="135" r="2" fill="#8b5a2b" opacity="0.6"/>
  <circle cx="45" cy="100" r="2" fill="#8b5a2b" opacity="0.6"/>
  <circle cx="65" cy="65" r="2" fill="#8b5a2b" opacity="0.6"/>
  <!-- Central C engraving -->
  <path d="M115,80 Q90,80 90,100 Q90,120 115,120" fill="none" stroke="#5a3a1a" stroke-width="4" filter="url(#glow)" opacity="0.6"/>
  <path d="M115,80 Q90,80 90,100 Q90,120 115,120" fill="none" stroke="#d4a574" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <!-- Decorative laurel hint -->
  <path d="M70,120 Q60,130 65,140" fill="none" stroke="#a0651e" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <path d="M130,120 Q140,130 135,140" fill="none" stroke="#a0651e" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <!-- Highlight -->
  <ellipse cx="80" cy="75" rx="12" ry="8" fill="#fff" opacity="0.08"/>
  <text x="100" y="172" text-anchor="middle" fill="#cd7f32" font-size="11" font-family="Arial" filter="url(#glow)">青铜勋章</text>
</svg>