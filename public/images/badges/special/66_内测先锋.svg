<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#100520"/>
      <stop offset="100%" stop-color="#080210"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bf55ec"/>
      <stop offset="50%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#8e44ad"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#9b59b6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#bf55ec" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#3a1a4a" stroke-width="6"/>
  <!-- Flask neck -->
  <rect x="92" y="40" width="16" height="30" fill="none" stroke="url(#purple)" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Flask opening -->
  <rect x="88" y="38" width="24" height="6" rx="2" fill="none" stroke="url(#purple)" stroke-width="2" filter="url(#glow)"/>
  <!-- Flask body -->
  <path d="M92,70 L70,120 Q65,140 100,140 Q135,140 130,120 L108,70 Z" fill="none" stroke="url(#purple)" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Liquid -->
  <path d="M78,105 Q70,140 100,140 Q130,140 122,105 Q110,115 100,112 Q90,108 78,105 Z" fill="url(#liquid)"/>
  <!-- Bubbles in liquid -->
  <circle cx="90" cy="120" r="3" fill="none" stroke="#bf55ec" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <circle cx="110" cy="125" r="2.5" fill="none" stroke="#bf55ec" stroke-width="0.8" filter="url(#glow)" opacity="0.4"/>
  <circle cx="100" cy="132" r="2" fill="none" stroke="#bf55ec" stroke-width="0.8" filter="url(#glow)" opacity="0.4"/>
  <circle cx="85" cy="132" r="1.5" fill="#bf55ec" opacity="0.3" filter="url(#glow)"/>
  <circle cx="115" cy="118" r="1.5" fill="#bf55ec" opacity="0.3" filter="url(#glow)"/>
  <!-- Vapor bubbles rising -->
  <circle cx="96" cy="60" r="2" fill="none" stroke="#bf55ec" stroke-width="0.8" filter="url(#glow)" opacity="0.4"/>
  <circle cx="104" cy="50" r="1.5" fill="none" stroke="#bf55ec" stroke-width="0.8" filter="url(#glow)" opacity="0.3"/>
  <!-- Alpha text on flask -->
  <text x="100" y="125" text-anchor="middle" fill="url(#purple)" font-size="16" font-weight="bold" font-family="Arial" filter="url(#glow)">Alpha</text>
  <!-- Measurement marks -->
  <line x1="100" y1="85" x2="106" y2="85" stroke="#bf55ec" stroke-width="0.8" opacity="0.4"/>
  <line x1="100" y1="95" x2="106" y2="95" stroke="#bf55ec" stroke-width="0.8" opacity="0.3"/>
  <line x1="100" y1="105" x2="106" y2="105" stroke="#bf55ec" stroke-width="0.8" opacity="0.2"/>
  <!-- Sparkles -->
  <circle cx="50" cy="60" r="1.5" fill="#bf55ec" filter="url(#glow)" opacity="0.5"/>
  <circle cx="150" cy="55" r="1.5" fill="#bf55ec" filter="url(#glow)" opacity="0.5"/>
  <text x="100" y="170" text-anchor="middle" fill="#bf55ec" font-size="11" font-family="Arial" filter="url(#glow)">内测先锋</text>
</svg>