<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#050a1a"/>
      <stop offset="100%" stop-color="#020510"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00bfff"/>
      <stop offset="100%" stop-color="#1e90ff"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#1a2a4a" stroke-width="6"/>
  <!-- Cute gopher body -->
  <ellipse cx="100" cy="110" rx="38" ry="35" fill="none" stroke="url(#blue)" stroke-width="2.5" filter="url(#glow)"/>
  <ellipse cx="100" cy="110" rx="38" ry="35" fill="#00bfff" opacity="0.06"/>
  <!-- Head -->
  <circle cx="100" cy="80" r="25" fill="none" stroke="url(#blue)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="100" cy="80" r="25" fill="#00bfff" opacity="0.06"/>
  <!-- Ears -->
  <circle cx="78" cy="65" r="8" fill="none" stroke="#00bfff" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <circle cx="78" cy="65" r="4" fill="#00bfff" opacity="0.15"/>
  <circle cx="122" cy="65" r="8" fill="none" stroke="#00bfff" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <circle cx="122" cy="65" r="4" fill="#00bfff" opacity="0.15"/>
  <!-- Eyes -->
  <circle cx="90" cy="75" r="5" fill="none" stroke="#00bfff" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
  <circle cx="110" cy="75" r="5" fill="none" stroke="#00bfff" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
  <circle cx="91" cy="75" r="2.5" fill="#00bfff" opacity="0.5"/>
  <circle cx="111" cy="75" r="2.5" fill="#00bfff" opacity="0.5"/>
  <!-- Nose -->
  <ellipse cx="100" cy="85" rx="4" ry="3" fill="#00bfff" opacity="0.4" filter="url(#glow)"/>
  <!-- Mouth -->
  <path d="M95,90 Q100,95 105,90" fill="none" stroke="#00bfff" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <!-- Buck teeth -->
  <rect x="95" y="88" width="4" height="5" rx="1" fill="#00bfff" opacity="0.3" filter="url(#glow)"/>
  <rect x="101" y="88" width="4" height="5" rx="1" fill="#00bfff" opacity="0.3" filter="url(#glow)"/>
  <!-- Arms/paws -->
  <path d="M65,100 Q58,105 55,100" fill="none" stroke="#00bfff" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <path d="M135,100 Q142,105 145,100" fill="none" stroke="#00bfff" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <!-- Go text -->
  <text x="100" y="120" text-anchor="middle" fill="#00bfff" font-size="18" font-weight="bold" font-family="Arial" filter="url(#glow)">Go</text>
  <text x="100" y="165" text-anchor="middle" fill="#00bfff" font-size="11" font-family="Arial" filter="url(#glow)">Go地鼠</text>
</svg>