<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1505"/>
      <stop offset="100%" stop-color="#0a0a02"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffec8b"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#4a3a1a" stroke-width="6"/>
  <!-- Robot head -->
  <rect x="65" y="55" width="70" height="55" rx="8" fill="none" stroke="url(#gold)" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="65" y="55" width="70" height="55" rx="8" fill="#ffd700" opacity="0.06"/>
  <!-- Robot antenna -->
  <line x1="100" y1="55" x2="100" y2="38" stroke="#ffd700" stroke-width="2" filter="url(#glow)"/>
  <circle cx="100" cy="35" r="4" fill="#ffd700" filter="url(#glow)" opacity="0.6"/>
  <!-- Robot eyes -->
  <circle cx="82" cy="78" r="8" fill="none" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="82" cy="78" r="4" fill="#ffd700" opacity="0.4" filter="url(#glow)"/>
  <circle cx="118" cy="78" r="8" fill="none" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="118" cy="78" r="4" fill="#ffd700" opacity="0.4" filter="url(#glow)"/>
  <!-- Robot mouth -->
  <rect x="80" y="92" width="40" height="6" rx="2" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <line x1="88" y1="92" x2="88" y2="98" stroke="#ffd700" stroke-width="0.5" opacity="0.3"/>
  <line x1="96" y1="92" x2="96" y2="98" stroke="#ffd700" stroke-width="0.5" opacity="0.3"/>
  <line x1="104" y1="92" x2="104" y2="98" stroke="#ffd700" stroke-width="0.5" opacity="0.3"/>
  <line x1="112" y1="92" x2="112" y2="98" stroke="#ffd700" stroke-width="0.5" opacity="0.3"/>
  <!-- Neural network connections -->
  <!-- Input nodes -->
  <circle cx="45" cy="80" r="3" fill="#ffd700" filter="url(#glow)" opacity="0.5"/>
  <circle cx="45" cy="95" r="3" fill="#ffd700" filter="url(#glow)" opacity="0.5"/>
  <circle cx="45" cy="110" r="3" fill="#ffd700" filter="url(#glow)" opacity="0.5"/>
  <!-- Hidden layer -->
  <circle cx="65" cy="75" r="2.5" fill="#ffec8b" filter="url(#glow)" opacity="0.4"/>
  <circle cx="65" cy="95" r="2.5" fill="#ffec8b" filter="url(#glow)" opacity="0.4"/>
  <circle cx="65" cy="115" r="2.5" fill="#ffec8b" filter="url(#glow)" opacity="0.4"/>
  <!-- Output nodes -->
  <circle cx="155" cy="85" r="3" fill="#ffd700" filter="url(#glow)" opacity="0.5"/>
  <circle cx="155" cy="105" r="3" fill="#ffd700" filter="url(#glow)" opacity="0.5"/>
  <!-- Connections left -->
  <line x1="48" y1="80" x2="62" y2="75" stroke="#ffd700" stroke-width="0.5" opacity="0.3"/>
  <line x1="48" y1="80" x2="62" y2="95" stroke="#ffd700" stroke-width="0.5" opacity="0.2"/>
  <line x1="48" y1="95" x2="62" y2="75" stroke="#ffd700" stroke-width="0.5" opacity="0.2"/>
  <line x1="48" y1="95" x2="62" y2="95" stroke="#ffd700" stroke-width="0.5" opacity="0.3"/>
  <line x1="48" y1="95" x2="62" y2="115" stroke="#ffd700" stroke-width="0.5" opacity="0.2"/>
  <line x1="48" y1="110" x2="62" y2="95" stroke="#ffd700" stroke-width="0.5" opacity="0.2"/>
  <line x1="48" y1="110" x2="62" y2="115" stroke="#ffd700" stroke-width="0.5" opacity="0.3"/>
  <!-- Connections right -->
  <line x1="135" y1="78" x2="152" y2="85" stroke="#ffd700" stroke-width="0.5" opacity="0.3"/>
  <line x1="135" y1="78" x2="152" y2="105" stroke="#ffd700" stroke-width="0.5" opacity="0.2"/>
  <line x1="135" y1="95" x2="152" y2="85" stroke="#ffd700" stroke-width="0.5" opacity="0.2"/>
  <line x1="135" y1="95" x2="152" y2="105" stroke="#ffd700" stroke-width="0.5" opacity="0.3"/>
  <!-- Robot body hint -->
  <rect x="78" y="110" width="44" height="15" rx="3" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <text x="100" y="145" text-anchor="middle" fill="#ffd700" font-size="11" font-family="Arial" filter="url(#glow)">AI驯兽师</text>
</svg>