<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1005"/>
      <stop offset="100%" stop-color="#0a0802"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="orangeBrown" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8c00"/>
      <stop offset="50%" stop-color="#cd853f"/>
      <stop offset="100%" stop-color="#8b4513"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#3a2a1a" stroke-width="6"/>
  <!-- Owl body -->
  <ellipse cx="100" cy="115" rx="35" ry="40" fill="none" stroke="url(#orangeBrown)" stroke-width="2.5" filter="url(#glow)"/>
  <ellipse cx="100" cy="115" rx="35" ry="40" fill="#ff8c00" opacity="0.06"/>
  <!-- Owl head -->
  <circle cx="100" cy="72" r="28" fill="none" stroke="url(#orangeBrown)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="100" cy="72" r="28" fill="#cd853f" opacity="0.06"/>
  <!-- Ear tufts -->
  <path d="M76,52 L70,35 L85,50" fill="none" stroke="#ff8c00" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <path d="M124,52 L130,35 L115,50" fill="none" stroke="#ff8c00" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <!-- Big eyes -->
  <circle cx="86" cy="70" r="12" fill="none" stroke="#ff8c00" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="86" cy="70" r="12" fill="#cd853f" opacity="0.08"/>
  <circle cx="114" cy="70" r="12" fill="none" stroke="#ff8c00" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="114" cy="70" r="12" fill="#cd853f" opacity="0.08"/>
  <!-- Pupils -->
  <circle cx="86" cy="70" r="6" fill="#ff8c00" opacity="0.4" filter="url(#glow)"/>
  <circle cx="114" cy="70" r="6" fill="#ff8c00" opacity="0.4" filter="url(#glow)"/>
  <circle cx="86" cy="70" r="3" fill="#8b4513" opacity="0.5"/>
  <circle cx="114" cy="70" r="3" fill="#8b4513" opacity="0.5"/>
  <!-- Beak -->
  <path d="M96,80 L100,90 L104,80 Z" fill="#cd853f" opacity="0.4" filter="url(#glow)"/>
  <!-- Branch lines (Git branches) -->
  <path d="M55,140 L85,140 L100,125 L115,140 L145,140" fill="none" stroke="#ff8c00" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <!-- Branch dots -->
  <circle cx="85" cy="140" r="3" fill="#ff8c00" filter="url(#glow)" opacity="0.5"/>
  <circle cx="100" cy="125" r="3" fill="#cd853f" filter="url(#glow)" opacity="0.5"/>
  <circle cx="115" cy="140" r="3" fill="#ff8c00" filter="url(#glow)" opacity="0.5"/>
  <!-- Wing feather details -->
  <path d="M65,100 Q60,110 65,120" fill="none" stroke="#8b4513" stroke-width="1" filter="url(#glow)" opacity="0.3"/>
  <path d="M135,100 Q140,110 135,120" fill="none" stroke="#8b4513" stroke-width="1" filter="url(#glow)" opacity="0.3"/>
  <text x="100" y="168" text-anchor="middle" fill="#ff8c00" font-size="11" font-family="Arial" filter="url(#glow)">Git猫头鹰</text>
</svg>