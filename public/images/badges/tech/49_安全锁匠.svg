<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#0a0202"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#4a1a1a" stroke-width="6"/>
  <!-- Padlock body -->
  <rect x="65" y="85" width="70" height="60" rx="8" fill="none" stroke="url(#gold)" stroke-width="3" filter="url(#glow)"/>
  <rect x="65" y="85" width="70" height="60" rx="8" fill="#ffd700" opacity="0.05"/>
  <!-- Lock shackle -->
  <path d="M80,85 L80,65 Q80,45 100,45 Q120,45 120,65 L120,85" fill="none" stroke="url(#gold)" stroke-width="3" filter="url(#glow)"/>
  <!-- Keyhole -->
  <circle cx="100" cy="105" r="10" fill="none" stroke="url(#red)" stroke-width="2" filter="url(#glow)"/>
  <path d="M100,110 L100,130" stroke="#ff4444" stroke-width="3" filter="url(#glow)"/>
  <path d="M95,125 L105,125" stroke="#ff4444" stroke-width="2" filter="url(#glow)" opacity="0.7"/>
  <!-- Red warning aura -->
  <circle cx="100" cy="115" r="48" fill="none" stroke="#ff4444" stroke-width="1" filter="url(#glow)" opacity="0.3"/>
  <!-- Encryption symbols -->
  <text x="50" y="60" fill="#ff4444" font-size="10" font-family="monospace" opacity="0.4" filter="url(#glow)">#</text>
  <text x="145" y="65" fill="#ff4444" font-size="10" font-family="monospace" opacity="0.4" filter="url(#glow)">@</text>
  <text x="45" y="160" fill="#ff4444" font-size="9" font-family="monospace" opacity="0.3" filter="url(#glow)">{ }</text>
  <text x="148" y="155" fill="#ff4444" font-size="9" font-family="monospace" opacity="0.3" filter="url(#glow)">*</text>
  <text x="100" y="165" text-anchor="middle" fill="#ff4444" font-size="11" font-family="Arial" filter="url(#glow)">安全锁匠</text>
</svg>