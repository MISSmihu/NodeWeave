<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#151505"/>
      <stop offset="100%" stop-color="#0a0a02"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="yellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffec8b"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#3a3a1a" stroke-width="6"/>
  <!-- Shuriken (throwing star) -->
  <polygon points="100,40 115,85 160,70 120,100 160,130 115,115 100,160 85,115 40,130 80,100 40,70 85,85" fill="none" stroke="url(#yellow)" stroke-width="2.5" filter="url(#glow)"/>
  <polygon points="100,40 115,85 160,70 120,100 160,130 115,115 100,160 85,115 40,130 80,100 40,70 85,85" fill="#ffd700" opacity="0.05"/>
  <!-- Inner shuriken -->
  <polygon points="100,58 110,88 140,78 115,100 140,122 110,112 100,142 90,112 60,122 85,100 60,78 90,88" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <!-- Center circle -->
  <circle cx="100" cy="100" r="18" fill="none" stroke="url(#yellow)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="18" fill="#ffd700" opacity="0.08"/>
  <!-- JS text -->
  <text x="100" y="106" text-anchor="middle" fill="url(#yellow)" font-size="16" font-weight="bold" font-family="Arial" filter="url(#glow)">JS</text>
  <!-- Shadow/speed effect -->
  <path d="M80,100 L65,100" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.2"/>
  <path d="M85,90 L72,82" fill="none" stroke="#ffd700" stroke-width="0.8" filter="url(#glow)" opacity="0.15"/>
  <path d="M85,110 L72,118" fill="none" stroke="#ffd700" stroke-width="0.8" filter="url(#glow)" opacity="0.15"/>
  <text x="100" y="175" text-anchor="middle" fill="#ffd700" font-size="11" font-family="Arial" filter="url(#glow)">JS忍者</text>
</svg>