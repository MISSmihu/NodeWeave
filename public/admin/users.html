<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户管理 // NodeWeave ADMIN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
.admin-layout{display:flex;min-height:100vh;padding-top:60px}
.admin-sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);padding:20px 0;position:fixed;top:60px;bottom:0;left:0}
.admin-sidebar a{display:block;padding:10px 20px;color:var(--text-dim);font-family:var(--font-mono);font-size:13px;text-decoration:none}
.admin-sidebar a:hover,.admin-sidebar a.active{color:var(--cyan);background:rgba(0,240,255,.05)}
.admin-main{margin-left:200px;flex:1;padding:24px;max-width:1100px}
.admin-main h2{font-family:var(--font-display);font-size:20px;color:var(--cyan);margin-bottom:20px}
.search-bar{display:flex;gap:10px;margin-bottom:20px}
.search-bar input{flex:1;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:14px;outline:none}
.search-bar input:focus{border-color:var(--cyan)}
.search-bar button{padding:10px 20px;background:var(--cyan);color:var(--bg);border:none;border-radius:4px;font-family:var(--font-display);font-size:13px;cursor:pointer}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:12px}
.result-card .row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.result-card .user-info{display:flex;align-items:center;gap:12px}
.result-card .user-avatar{width:40px;height:40px;border-radius:50%;background:var(--bg);border:2px solid var(--cyan);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:18px}
.result-card .user-name{color:var(--text);font-size:14px}
.result-card .user-meta{font-size:11px;color:var(--text-mute);margin-top:2px}
.result-card .tag{display:inline-block;padding:2px 8px;border-radius:3px;font-family:var(--font-mono);font-size:10px;margin-left:4px}
.tag-banned{background:rgba(255,0,60,.1);color:var(--magenta)}
.tag-admin{background:rgba(0,240,255,.1);color:var(--cyan)}
.actions-bar{display:flex;gap:8px;flex-wrap:wrap}
.actions-bar button{padding:6px 14px;border-radius:3px;font-family:var(--font-mono);font-size:11px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-dim)}
.actions-bar button:hover{border-color:var(--cyan);color:var(--cyan)}
.actions-bar .btn-danger{color:var(--magenta);border-color:var(--magenta)}
.actions-bar .btn-role{color:var(--green);border-color:rgba(127,255,0,.35)}
.admin-edit-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.admin-edit-grid label{display:block;font-family:var(--font-mono);font-size:10px;color:var(--text-mute);margin-bottom:5px}
.admin-edit-grid input,.admin-edit-grid textarea{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;outline:none}
.admin-edit-grid input[type="color"]{height:38px;padding:4px;cursor:pointer;background:linear-gradient(135deg,rgba(0,240,255,.08),rgba(157,0,255,.05)),var(--bg)}
.admin-edit-grid input[type="color"]::-webkit-color-swatch-wrapper{padding:0}
.admin-edit-grid input[type="color"]::-webkit-color-swatch{border:0;border-radius:3px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.18)}
.admin-edit-grid input[type="color"]::-moz-color-swatch{border:0;border-radius:3px}
.admin-edit-grid textarea{min-height:72px;resize:vertical}
.admin-edit-grid .full{grid-column:1/-1}
.admin-edit-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.admin-edit-actions button{padding:7px 12px;border:1px solid var(--border);background:transparent;border-radius:4px;color:var(--text-dim);font-family:var(--font-mono);font-size:11px;cursor:pointer}
.admin-edit-actions button:hover{border-color:var(--cyan);color:var(--cyan)}
.ban-records{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.ban-records h4{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-bottom:8px}
.ban-records .record{font-size:12px;color:var(--text-mute);padding:4px 0}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;width:90%;max-width:400px}
.modal h3{font-family:var(--font-display);color:var(--magenta);margin-bottom:16px}
.modal label{display:block;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-bottom:4px}
.modal select,.modal input,.modal textarea{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;outline:none;margin-bottom:12px}
.modal textarea{min-height:60px;resize:vertical}
.modal .btns{display:flex;gap:8px;justify-content:flex-end}
.modal .btns button{padding:8px 16px;border-radius:4px;font-family:var(--font-mono);font-size:12px;cursor:pointer}
.modal .btn-cancel{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.modal .btn-confirm{background:var(--magenta);border:none;color:#fff}
@media(max-width:760px){.admin-edit-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="bg-grid"></div><div class="bg-scanlines"></div><div class="bg-glow"></div>
<header class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo"><span class="logo-mark">◈</span><span class="logo-text">Node<span class="x">Weave</span></span><span class="logo-sub">// ADMIN</span></a>
    <div class="nav-actions"><a href="../index.html" class="btn-ghost">返回首页</a></div>
  </div>
</header>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <a href="site-config.html">站点配置</a><a href="invite-codes.html">邀请码管理</a>
    <a href="moderation.html">内容审核</a><a href="users.html" class="active">用户管理</a>
    <a href="ai-config.html">AI审核配置</a>
  </aside>
  <main class="admin-main">
    <h2>用户管理</h2>
    <div class="search-bar">
      <input type="text" id="searchId" placeholder="输入用户ID或用户名搜索...">
      <button onclick="searchUser()">搜索</button>
    </div>
    <div id="searchResult"></div>
  </main>
</div>
<div class="modal-overlay" id="banModal">
  <div class="modal">
    <h3>封禁/禁言用户</h3>
    <label>操作类型</label>
    <select id="banType"><option value="mute">禁言（有时间限制）</option><option value="ban">永久封号</option></select>
    <label>禁言天数（仅禁言）</label>
    <input type="number" id="banDays" value="7" min="1" max="365">
    <label>封禁原因</label>
    <textarea id="banReason" placeholder="填写封禁原因..."></textarea>
    <div class="btns">
      <button class="btn-cancel" onclick="closeBanModal()">取消</button>
      <button class="btn-confirm" onclick="confirmBan()">确认</button>
    </div>
  </div>
</div>
<script src="../script.js"></script>
<script>
let banTargetId = null;
let adminUser = null;

async function searchUser() {
  const q = document.getElementById('searchId').value.trim();
  if (!q) return;
  try {
    let userId = q;
    if (!q.startsWith('u_')) {
      const u = await fetch('/api/users/' + q);
      if (!u.ok) { userId = q; } else { userId = q; }
    }
    const res = await fetch('/api/users/' + userId);
    const json = await res.json();
    if (json.code !== 0) { document.getElementById('searchResult').innerHTML = '<p style="color:var(--text-mute)">用户未找到</p>'; return; }
    const u = json.data;
    userId = u.id;
    const banned = u.role === 'banned' || u.role === 'deleted';
    const initials = (u.display_name||u.username||'?').substring(0,2).toUpperCase();
    const canEditProfile = adminUser && ['owner', 'admin', 'moderator'].includes(adminUser.role);
    const canEditAssets = adminUser && adminUser.role === 'owner';
    document.getElementById('searchResult').innerHTML =
      '<div class="result-card">' +
        '<div class="row">' +
          '<div class="user-info">' +
            '<div class="user-avatar" style="color:' + (u.avatar_color||'#00f0ff') + '">' + initials + '</div>' +
            '<div>' +
              '<div class="user-name">' + h(u.display_name||u.username) +
                (banned?'<span class="tag tag-banned">'+(u.role==='deleted'?'已注销':'已封号')+'</span>':'') +
                (u.role==='admin'||u.role==='owner'?'<span class="tag tag-admin">'+u.role+'</span>':'') +
              '</div>' +
              '<div class="user-meta">@' + h(u.username) + ' · 声望 ' + (u.reputation || 0) + ' · 经验 ' + (u.exp || 0) + ' · ' + u.post_count + '帖 · ' + u.comment_count + '评</div>' +
            '</div>' +
          '</div>' +
          '<div class="actions-bar">' +
            (banned && canBanUsers() ? '<button onclick="unbanUser(\'' + userId + '\')">解除封禁</button>' :
             (u.role!=='owner'? roleButtons(u) : '') +
             (canBanUsers() && u.role!=='admin'&&u.role!=='owner'?'<button class="btn-danger" onclick="openBanModal(\'' + userId + '\')">封禁/禁言</button>':'')) +
          '</div>' +
        '</div>' +
        renderAdminEditPanel(u, userId, canEditProfile, canEditAssets) +
        '<div class="ban-records" id="banRecords_' + userId + '"><span style="color:var(--text-mute);font-size:12px">加载封禁记录...</span></div>' +
      '</div>';
    loadBans(userId);
  } catch(e) { document.getElementById('searchResult').innerHTML = '<p style="color:var(--text-mute)">搜索失败</p>'; }
}

async function loadBans(userId) {
  try {
    const res = await fetch('/api/admin/bans?user_id=' + userId);
    const json = await res.json();
    const container = document.getElementById('banRecords_' + userId);
    if (!json.data.bans.length) { container.innerHTML = '<h4>封禁记录</h4><p style="color:var(--text-mute);font-size:12px">无封禁记录</p>'; return; }
    container.innerHTML = '<h4>封禁记录</h4>' + json.data.bans.map(b =>
      '<div class="record">' + (b.type==='ban'?'🔒 封号':'🔇 禁言') + ' · ' +
      h(b.reason||'无原因') + ' · 操作者: ' + h(b.banned_by_name) +
      (b.banned_until?' · 至 ' + new Date(b.banned_until).toLocaleDateString('zh-CN'):' · 永久') +
      ' · ' + new Date(b.created_at).toLocaleString('zh-CN') +
      '</div>'
    ).join('');
  } catch(e) {}
}

function openBanModal(userId) { banTargetId = userId; document.getElementById('banModal').classList.add('show'); }
function closeBanModal() { document.getElementById('banModal').classList.remove('show'); banTargetId = null; }

function roleButtons(user) {
  if (!adminUser || adminUser.role !== 'owner') return '';
  const id = user.id;
  let html = '';
  if (user.role !== 'admin') html += `<button class="btn-role" onclick="setRole('${h(id)}','admin')">任命管理员</button>`;
  if (user.role !== 'moderator') html += `<button class="btn-role" onclick="setRole('${h(id)}','moderator')">任命版主</button>`;
  if (user.role !== 'member') html += `<button onclick="setRole('${h(id)}','member')">恢复会员</button>`;
  return html;
}

function renderAdminEditPanel(user, userId, canEditProfile, canEditAssets) {
  if (!canEditProfile && !canEditAssets) return '';
  return `
    <div class="admin-edit-grid">
      ${canEditProfile ? `
        <div><label>昵称</label><input id="editDisplayName" maxlength="24" value="${a(user.display_name || '')}"></div>
        <div><label>头像颜色</label><input id="editAvatarColor" type="color" value="${a(user.avatar_color || '#00f0ff')}"></div>
        <div><label>角色</label><input value="${a(user.role || 'member')}" readonly></div>
        <div class="full"><label>简介</label><textarea id="editBio" maxlength="500">${h(user.bio || '')}</textarea></div>
      ` : ''}
      ${canEditAssets ? `
        <div><label>论坛币</label><input id="editCoins" type="number" min="0" value="${Number(user.coins || 0)}"></div>
        <div><label>声望</label><input id="editReputation" type="number" min="0" value="${Number(user.reputation || 0)}"></div>
        <div><label>经验</label><input id="editExp" type="number" min="0" value="${Number(user.exp || 0)}"></div>
        <div><label>等级</label><input value="${user.level ? a('Lv' + user.level.level + ' ' + user.level.name) : '自动计算'}" readonly></div>
      ` : ''}
    </div>
    <div class="admin-edit-actions">
      ${canEditProfile ? `<button type="button" onclick="saveAdminProfile('${h(userId)}')">保存资料</button>` : ''}
      ${canEditAssets ? `<button type="button" onclick="saveAssets('${h(userId)}')">保存资产</button>` : ''}
      <a class="btn-ghost" href="../profile.html?id=${encodeURIComponent(userId)}" style="padding:6px 12px">查看主页</a>
    </div>`;
}

async function setRole(userId, role) {
  if (!confirm('确定把该用户角色改为 ' + role + '？')) return;
  try {
    const res = await fetch('/api/users/' + encodeURIComponent(userId) + '/role', {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ role }),
    });
    const json = await res.json();
    if (json.code!==0) { alert(json.msg || '操作失败'); return; }
    searchUser();
  } catch(e) { alert('操作失败'); }
}

async function saveAdminProfile(userId) {
  try {
    const res = await fetch('/api/users/' + encodeURIComponent(userId) + '/admin-profile', {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        display_name: document.getElementById('editDisplayName')?.value || '',
        bio: document.getElementById('editBio')?.value || '',
        avatar_color: document.getElementById('editAvatarColor')?.value || '#00f0ff',
      }),
    });
    const json = await res.json();
    if (json.code !== 0) { alert(json.msg || '保存失败'); return; }
    alert('资料已保存');
    searchUser();
  } catch(e) { alert('保存失败'); }
}

async function saveAssets(userId) {
  try {
    const res = await fetch('/api/users/' + encodeURIComponent(userId) + '/assets', {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        coins: document.getElementById('editCoins')?.value || 0,
        reputation: document.getElementById('editReputation')?.value || 0,
        exp: document.getElementById('editExp')?.value || 0,
      }),
    });
    const json = await res.json();
    if (json.code !== 0) { alert(json.msg || '保存失败'); return; }
    alert('资产已保存');
    searchUser();
  } catch(e) { alert('保存失败'); }
}

async function confirmBan() {
  const type = document.getElementById('banType').value;
  const days = document.getElementById('banDays').value;
  const reason = document.getElementById('banReason').value.trim();
  try {
    const res = await fetch('/api/admin/bans', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ user_id: banTargetId, type, reason, duration_days: type==='mute'?+days:null }),
    });
    const json = await res.json();
    if (json.code!==0) { alert(json.msg); return; }
    closeBanModal(); searchUser();
  } catch(e) { alert('操作失败'); }
}

async function unbanUser(userId) {
  if (!confirm('确定解除对该用户的封禁/禁言？')) return;
  try {
    const bansRes = await fetch('/api/admin/bans?user_id=' + userId);
    const bansJson = await bansRes.json();
    if (bansJson.code===0 && bansJson.data.bans.length) {
      for (const b of bansJson.data.bans) {
        await fetch('/api/admin/bans/' + b.id, { method:'DELETE' });
      }
    }
    searchUser();
  } catch(e) { alert('操作失败'); }
}

function h(s) { const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function a(s) { return h(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

function canBanUsers() {
  return adminUser && ['owner', 'admin'].includes(adminUser.role);
}

document.addEventListener('DOMContentLoaded', async () => {
  if (!window.NodeWeave) return;
  adminUser = await window.NodeWeave.currentUser(true);
  if (!adminUser || !['owner', 'admin', 'moderator'].includes(adminUser.role)) {
    location.href = '../login.html?redirect=' + encodeURIComponent('admin/users.html');
  }
});
</script>
</body>
</html>
