<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公告管理 // NodeWeave ADMIN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
.admin-layout{display:flex;min-height:100vh;padding-top:60px}
.admin-sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);padding:20px 0;position:fixed;top:60px;bottom:0;left:0;overflow-y:auto}
.admin-sidebar a{display:block;padding:10px 20px;color:var(--text-dim);font-family:var(--font-mono);font-size:13px;text-decoration:none}
.admin-sidebar a:hover,.admin-sidebar a.active{color:var(--cyan);background:rgba(0,240,255,.05)}
.admin-main{margin-left:200px;flex:1;padding:24px;max-width:1120px}
.admin-main h2{font-family:var(--font-display);font-size:20px;color:var(--cyan);margin-bottom:18px}
.grid{display:grid;grid-template-columns:420px 1fr;gap:16px}
.panel{border:1px solid var(--border);border-radius:12px;background:rgba(18,18,30,.76);padding:18px}
.panel h3{font-family:var(--font-display);font-size:15px;color:var(--text);margin-bottom:12px}
label{display:block;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin:10px 0 5px}
input,select,textarea{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);outline:none}
textarea{min-height:220px;resize:vertical;line-height:1.7}
input:focus,select:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,240,255,.08)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.checks{display:flex;gap:14px;flex-wrap:wrap;margin:12px 0;color:var(--text-dim);font-size:12px}
.checks label{display:flex;align-items:center;gap:6px;margin:0}
.checks input{width:auto}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.ann-list{display:grid;gap:10px}
.ann-card{border:1px solid var(--border);border-radius:10px;background:var(--bg);padding:14px}
.ann-meta{display:flex;gap:8px;flex-wrap:wrap;color:var(--text-mute);font-family:var(--font-mono);font-size:10px;margin-bottom:6px}
.ann-title{font-size:15px;color:var(--text);margin-bottom:6px}
.ann-content{color:var(--text-dim);font-size:13px;line-height:1.7;max-height:74px;overflow:hidden;white-space:pre-wrap}
.ann-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.ann-actions button{padding:6px 10px;border:1px solid var(--border);background:transparent;border-radius:6px;color:var(--text-dim);font-family:var(--font-mono);font-size:11px;cursor:pointer}
.ann-actions button:hover{border-color:var(--cyan);color:var(--cyan)}
.ann-actions .danger{border-color:rgba(255,0,60,.35);color:var(--magenta)}
.msg{display:none;margin-top:10px;padding:10px 12px;border-radius:8px;font-size:13px}
.msg.show{display:block}.msg.ok{background:rgba(127,255,0,.1);color:var(--green);border:1px solid rgba(127,255,0,.22)}.msg.err{background:rgba(255,0,60,.1);color:var(--magenta);border:1px solid rgba(255,0,60,.22)}
@media(max-width:920px){.grid{grid-template-columns:1fr}.admin-sidebar{position:static;width:auto}.admin-main{margin-left:0}.admin-layout{display:block}}
</style>
</head>
<body>
<div class="bg-grid"></div><div class="bg-scanlines"></div><div class="bg-glow"></div>
<header class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo"><span class="logo-mark">◈</span><span class="logo-text">Node<span class="x">Weave</span></span><span class="logo-sub">// ADMIN</span></a>
    <div class="nav-actions"><a href="../index.html" class="btn-ghost">返回首页</a></div>
  </div>
</header>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <a href="site-config.html">站点配置</a>
    <a href="invite-codes.html">邀请码管理</a>
    <a href="moderation.html">内容审核</a>
    <a href="announcements.html" class="active">公告管理</a>
    <a href="users.html">用户管理</a>
    <a href="ai-config.html">AI审核配置</a>
  </aside>
  <main class="admin-main">
    <h2>公告管理</h2>
    <section class="grid">
      <form class="panel" id="annForm">
        <h3 id="formTitle">发布公告</h3>
        <input type="hidden" id="annId">
        <label>标题</label>
        <input id="annTitle" maxlength="80" placeholder="例如：社区规则更新通知">
        <div class="row">
          <div><label>级别</label><select id="annLevel"><option value="info">普通公告</option><option value="warning">提醒</option><option value="critical">重要</option></select></div>
          <div><label>状态</label><select id="annStatus"><option value="published">发布</option><option value="hidden">隐藏</option></select></div>
        </div>
        <label>正文</label>
        <textarea id="annContent" maxlength="6000" placeholder="写公告正文..."></textarea>
        <div class="checks">
          <label><input type="checkbox" id="annPinned"> 置顶</label>
          <label><input type="checkbox" id="annNotify" checked> 发布时通知全体用户</label>
        </div>
        <div class="actions">
          <button class="btn-primary" type="submit">保存公告</button>
          <button class="btn-ghost" type="button" onclick="resetForm()">新建</button>
          <a class="btn-ghost" href="../announcements.html" target="_blank">前台预览</a>
        </div>
        <div class="msg" id="formMsg"></div>
      </form>
      <section class="panel">
        <h3>公告列表</h3>
        <div class="ann-list" id="annList"><div style="color:var(--text-mute)">加载中...</div></div>
      </section>
    </section>
  </main>
</div>
<script src="../script.js"></script>
<script>
let currentUser = null;
let announcementsCache = [];
const esc = (value) => window.NodeWeave.escapeHtml(value);
const apiJson = (...args) => window.NodeWeave.apiJson(...args);

async function guard() {
  currentUser = await window.NodeWeave.currentUser(true);
  if (!currentUser || !['owner','admin'].includes(currentUser.role)) {
    location.href = '../login.html?redirect=' + encodeURIComponent('admin/announcements.html');
    return false;
  }
  return true;
}

function showMsg(text, ok) {
  const el = document.getElementById('formMsg');
  el.textContent = text;
  el.className = 'msg show ' + (ok ? 'ok' : 'err');
}

async function loadAnnouncements() {
  const json = await apiJson('/api/announcements?all=1');
  const list = document.getElementById('annList');
  if (json.code !== 0) { list.innerHTML = '<div style="color:var(--text-mute)">加载失败</div>'; return; }
  const items = json.data.announcements || [];
  announcementsCache = items;
  if (!items.length) { list.innerHTML = '<div style="color:var(--text-mute)">暂无公告</div>'; return; }
  list.innerHTML = items.map(item => `<article class="ann-card">
    <div class="ann-meta"><span>${levelLabel(item.level)}</span><span>${item.status === 'published' ? '已发布' : '已隐藏'}</span>${item.pinned ? '<span>置顶</span>' : ''}<span>${new Date(item.created_at).toLocaleString('zh-CN')}</span></div>
    <div class="ann-title">${esc(item.title)}</div>
    <div class="ann-content">${esc(item.content)}</div>
    <div class="ann-actions">
      <button type="button" onclick="editAnnById('${esc(item.id)}')">编辑</button>
      <button type="button" onclick="toggleHidden('${esc(item.id)}')">${item.status === 'published' ? '隐藏' : '恢复发布'}</button>
    </div>
  </article>`).join('');
}

function editAnnById(id) {
  const item = announcementsCache.find(entry => entry.id === id);
  if (item) editAnn(item);
}

function editAnn(item) {
  document.getElementById('formTitle').textContent = '编辑公告';
  document.getElementById('annId').value = item.id;
  document.getElementById('annTitle').value = item.title || '';
  document.getElementById('annLevel').value = item.level || 'info';
  document.getElementById('annStatus').value = item.status || 'published';
  document.getElementById('annContent').value = item.content || '';
  document.getElementById('annPinned').checked = !!item.pinned;
  document.getElementById('annNotify').checked = false;
  scrollTo({ top: 0, behavior: 'smooth' });
}

function resetForm() {
  document.getElementById('formTitle').textContent = '发布公告';
  document.getElementById('annForm').reset();
  document.getElementById('annId').value = '';
  document.getElementById('annNotify').checked = true;
  document.getElementById('formMsg').className = 'msg';
}

async function toggleHidden(id) {
  const current = await apiJson('/api/announcements/' + encodeURIComponent(id));
  if (current.code !== 0) { alert(current.msg || '读取失败'); return; }
  const item = current.data;
  const nextStatus = item.status === 'published' ? 'hidden' : 'published';
  const json = await apiJson('/api/announcements/' + encodeURIComponent(id), {
    method: 'PUT',
    body: JSON.stringify({ title: item.title, content: item.content, level: item.level, pinned: !!item.pinned, status: nextStatus }),
  });
  if (json.code !== 0) { alert(json.msg || '操作失败'); return; }
  loadAnnouncements();
}

document.getElementById('annForm').addEventListener('submit', async event => {
  event.preventDefault();
  const id = document.getElementById('annId').value;
  const payload = {
    title: document.getElementById('annTitle').value,
    content: document.getElementById('annContent').value,
    level: document.getElementById('annLevel').value,
    status: document.getElementById('annStatus').value,
    pinned: document.getElementById('annPinned').checked,
    notify_all: document.getElementById('annNotify').checked,
  };
  const json = await apiJson(id ? '/api/announcements/' + encodeURIComponent(id) : '/api/announcements', {
    method: id ? 'PUT' : 'POST',
    body: JSON.stringify(payload),
  });
  if (json.code !== 0) { showMsg(json.msg || '保存失败', false); return; }
  showMsg(json.data?.message || '已保存', true);
  resetForm();
  loadAnnouncements();
});

function levelLabel(level) { return level === 'critical' ? '重要' : level === 'warning' ? '提醒' : '公告'; }
document.addEventListener('DOMContentLoaded', async () => { if (await guard()) loadAnnouncements(); });
</script>
</body>
</html>
