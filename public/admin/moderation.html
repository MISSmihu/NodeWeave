<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>内容审核 // NodeWeave ADMIN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
.admin-layout{display:flex;min-height:100vh;padding-top:60px}
.admin-sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);padding:20px 0;position:fixed;top:60px;bottom:0;left:0;overflow-y:auto}
.admin-sidebar a{display:block;padding:10px 20px;color:var(--text-dim);font-family:var(--font-mono);font-size:13px;text-decoration:none}
.admin-sidebar a:hover,.admin-sidebar a.active{color:var(--cyan);background:rgba(0,240,255,.05)}
.admin-main{margin-left:200px;flex:1;padding:24px;max-width:1100px}
.admin-main h2{font-family:var(--font-display);font-size:20px;color:var(--cyan);margin-bottom:20px}
.mode-tabs,.tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.mode-tabs button,.tabs button{padding:8px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-family:var(--font-mono);font-size:12px;cursor:pointer;transition:all .2s}
.mode-tabs button.active,.tabs button.active{color:var(--cyan);border-color:var(--cyan);background:rgba(0,240,255,.07)}
.review-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px 20px;margin-bottom:12px}
.review-item .meta{display:flex;gap:12px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--text-mute);margin-bottom:8px}
.review-item .item-type{display:inline-block;padding:2px 8px;border-radius:3px;font-family:var(--font-mono);font-size:10px;background:rgba(0,240,255,.1);color:var(--cyan)}
.review-item .title{font-size:15px;color:var(--text);margin-bottom:6px}
.review-item .excerpt{font-size:13px;color:var(--text-dim);line-height:1.5;margin-bottom:10px;max-height:80px;overflow:hidden}
.review-item .ai-badge{display:inline-block;padding:2px 8px;border-radius:3px;font-family:var(--font-mono);font-size:10px;margin-right:6px}
.ai-safe{background:rgba(127,255,0,.1);color:var(--green)}
.ai-sus{background:rgba(255,200,0,.1);color:#ffc800}
.ai-violation{background:rgba(255,0,60,.1);color:var(--magenta)}
.review-item .actions{display:flex;gap:8px;margin-top:8px}
.review-item .actions button{padding:6px 14px;border-radius:3px;font-family:var(--font-mono);font-size:11px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-dim);transition:all .2s}
.review-item .actions button:hover{border-color:var(--cyan);color:var(--cyan)}
.review-item .actions .btn-danger{color:var(--magenta);border-color:var(--magenta)}
.review-item .actions .btn-danger:hover{background:var(--magenta);color:#fff}
.review-item .actions .btn-success{color:var(--green);border-color:var(--green)}
.review-item .actions .btn-success:hover{background:var(--green);color:var(--bg)}
.report-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.report-card,.violation-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.report-card.pending{border-color:rgba(255,0,60,.28);box-shadow:0 0 28px rgba(255,0,60,.06)}
.report-meta,.violation-meta{display:flex;gap:9px;flex-wrap:wrap;color:var(--text-mute);font-size:11px;margin-bottom:8px}
.report-title,.violation-title{font-size:14px;color:var(--text);margin-bottom:7px}
.report-detail,.violation-detail{font-size:13px;color:var(--text-dim);line-height:1.65;white-space:pre-wrap}
.report-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.report-actions select,.report-actions input,.report-actions textarea{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;outline:none}
.report-actions textarea{grid-column:1/-1;min-height:62px;resize:vertical}
.report-actions button{padding:8px 10px;border:1px solid var(--border);background:transparent;border-radius:6px;color:var(--text-dim);font-family:var(--font-mono);font-size:11px;cursor:pointer}
.report-actions button:hover{border-color:var(--cyan);color:var(--cyan)}
.report-actions .danger{border-color:rgba(255,0,60,.36);color:var(--magenta)}
.report-actions .success{border-color:rgba(127,255,0,.36);color:var(--green)}
.violation-toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.violation-toolbar input{flex:1;min-width:220px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text)}
.violation-toolbar button{padding:10px 14px;border:1px solid var(--border);background:var(--surface-2);border-radius:7px;color:var(--text-dim);font-family:var(--font-mono);cursor:pointer}
.severity-minor{color:var(--cyan)}.severity-major{color:#ffd700}.severity-severe{color:var(--magenta)}
.empty-state{text-align:center;padding:40px;color:var(--text-mute)}
@media(max-width:860px){.report-grid{grid-template-columns:1fr}.admin-sidebar{position:static;width:auto}.admin-main{margin-left:0}.admin-layout{display:block}}
</style>
</head>
<body>
<div class="bg-grid"></div><div class="bg-scanlines"></div><div class="bg-glow"></div>
<header class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo"><span class="logo-mark">◈</span><span class="logo-text">Node<span class="x">Weave</span></span><span class="logo-sub">// ADMIN</span></a>
    <div class="nav-actions"><a href="../index.html" class="btn-ghost">返回首页</a></div>
  </div>
</header>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <a href="site-config.html">站点配置</a>
    <a href="invite-codes.html">邀请码管理</a>
    <a href="moderation.html" class="active">内容审核</a>
    <a href="users.html">用户管理</a>
    <a href="ai-config.html">AI审核配置</a>
  </aside>
  <main class="admin-main">
    <h2>内容审核</h2>
    <div class="mode-tabs">
      <button class="active" data-view="queue">审核队列</button>
      <button data-view="reports">举报工单</button>
      <button data-view="violations">违规记录</button>
    </div>
    <section id="queuePanel">
      <div class="tabs" data-filter="queue">
        <button class="active" data-status="pending">待审核</button>
        <button data-status="approved">已通过</button>
        <button data-status="rejected">已驳回</button>
        <button data-status="deleted">已删除</button>
      </div>
      <div id="queueList"></div>
    </section>
    <section id="reportsPanel" style="display:none">
      <div class="tabs" data-filter="reports">
        <button class="active" data-status="pending">待处理</button>
        <button data-status="resolved">已处理</button>
        <button data-status="dismissed">已驳回</button>
        <button data-status="all">全部</button>
      </div>
      <div id="reportsList" class="report-grid"></div>
    </section>
    <section id="violationsPanel" style="display:none">
      <div class="violation-toolbar">
        <input id="violationUserId" placeholder="按用户 ID 过滤，可留空查看全部">
        <button type="button" onclick="loadViolations()">查询</button>
      </div>
      <div id="violationsList" class="report-grid"></div>
    </section>
  </main>
</div>
<script>
let currentStatus = 'pending';
let currentView = 'queue';
let currentReportStatus = 'pending';

document.querySelectorAll('.mode-tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-tabs button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    document.getElementById('queuePanel').style.display = currentView === 'queue' ? '' : 'none';
    document.getElementById('reportsPanel').style.display = currentView === 'reports' ? '' : 'none';
    document.getElementById('violationsPanel').style.display = currentView === 'violations' ? '' : 'none';
    if (currentView === 'queue') loadQueue();
    if (currentView === 'reports') loadReports();
    if (currentView === 'violations') loadViolations();
  });
});

document.querySelectorAll('[data-filter="queue"] button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter="queue"] button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentStatus = btn.dataset.status;
    loadQueue();
  });
});

document.querySelectorAll('[data-filter="reports"] button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter="reports"] button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentReportStatus = btn.dataset.status;
    loadReports();
  });
});

async function loadQueue() {
  try {
    const res = await fetch('/api/admin/moderation/queue?status=' + currentStatus);
    const json = await res.json();
    if (json.code !== 0) return;
    const list = document.getElementById('queueList');
    if (!json.data.items.length) { list.innerHTML = '<div class="empty-state">📋 暂无审核项</div>'; return; }
    list.innerHTML = json.data.items.map(item => {
      const aiBadge = item.ai_verdict ?
        '<span class="ai-badge ai-' + (item.ai_verdict==='safe'?'safe':item.ai_verdict==='suspicious'?'sus':'violation') + '">AI: ' + item.ai_verdict + ' (' + item.ai_score + ')</span>' : '';
      const canAct = currentStatus === 'pending';
      return '<div class="review-item">' +
        '<div class="meta">' +
          '<span class="item-type">' + (item.item_type==='post'?'帖子':'评论') + '</span>' +
          '<span>作者: ' + h(item.author_name) + '</span>' +
          aiBadge +
          '<span>' + new Date(item.created_at).toLocaleString('zh-CN') + '</span>' +
        '</div>' +
        (item.title ? '<div class="title">' + h(item.title) + '</div>' : '') +
        '<div class="excerpt">' + h(item.excerpt || '') + '</div>' +
        (item.item_id ? '<div style="margin-top:4px"><a style="color:var(--cyan);font-size:12px" href="../post.html?id=' + encodeURIComponent(item.item_id) + '" target="_blank">打开内容</a></div>' : '') +
        (canAct ? '<div class="actions">' +
          '<button class="btn-success" onclick="act(\'' + item.id + '\',\'approve\')">通过</button>' +
          '<button onclick="act(\'' + item.id + '\',\'reject\')">驳回</button>' +
          '<button onclick="act(\'' + item.id + '\',\'delete\')">删除</button>' +
          '<button onclick="act(\'' + item.id + '\',\'pin\')">置顶</button>' +
          '<button onclick="act(\'' + item.id + '\',\'warn\')">警告</button>' +
        '</div>' : '<div style="color:var(--text-mute);font-size:11px;margin-top:4px">' + (item.result||'') + '</div>') +
      '</div>';
    }).join('');
  } catch(e) {}
}

async function loadReports() {
  try {
    const res = await fetch('/api/admin/moderation/reports?status=' + currentReportStatus);
    const json = await res.json();
    const list = document.getElementById('reportsList');
    if (json.code !== 0) { list.innerHTML = '<div class="empty-state">无法加载举报工单</div>'; return; }
    if (!json.data.items.length) { list.innerHTML = '<div class="empty-state">🛰 暂无举报工单</div>'; return; }
    list.innerHTML = json.data.items.map(item => renderReport(item)).join('');
  } catch(e) {
    document.getElementById('reportsList').innerHTML = '<div class="empty-state">无法加载举报工单</div>';
  }
}

function renderReport(item) {
  const pending = item.status === 'pending';
  const target = item.target_name ? '@' + item.target_name : (item.target_user_id || '未知用户');
  const link = item.item_type === 'profile'
    ? '../profile.html?id=' + encodeURIComponent(item.item_id)
    : '../post.html?id=' + encodeURIComponent(item.ref_post_id || item.item_id) + (item.item_type === 'comment' ? '#comment-' + encodeURIComponent(item.item_id) : '');
  return `<div class="report-card ${pending ? 'pending' : ''}">
    <div class="report-meta">
      <span class="item-type">${typeName(item.item_type)}</span>
      <span>举报人 @${h(item.reporter_name || item.reporter_id)}</span>
      <span>被举报 ${h(target)}</span>
      <span>${new Date(item.created_at).toLocaleString('zh-CN')}</span>
    </div>
    <div class="report-title">${h(item.reason)}</div>
    <div class="report-detail">${h(item.detail || '无补充说明')}</div>
    <div style="margin-top:8px"><a style="color:var(--cyan);font-size:12px" href="${link}" target="_blank">查看对象</a></div>
    ${pending ? `<div class="report-actions">
      <select id="act_${h(item.id)}">
        <option value="hide">隐藏内容 + 记违规</option>
        <option value="warn">警告 + 记违规</option>
        <option value="delete">删除内容 + 记违规</option>
        <option value="resolve">仅标记已处理</option>
        <option value="dismiss">驳回举报</option>
      </select>
      <select id="sev_${h(item.id)}">
        <option value="minor">轻微</option>
        <option value="major">严重</option>
        <option value="severe">恶劣</option>
      </select>
      <textarea id="note_${h(item.id)}" placeholder="处理说明 / 违规原因"></textarea>
      <button class="danger" type="button" onclick="resolveReport('${h(item.id)}')">执行处理</button>
      <button class="success" type="button" onclick="quickResolve('${h(item.id)}','dismiss')">驳回举报</button>
    </div>` : `<div class="report-meta" style="margin-top:10px">处理：${h(item.status)} · ${h(item.review_note || '')} ${item.reviewer_name ? '· @' + h(item.reviewer_name) : ''}</div>`}
  </div>`;
}

async function resolveReport(id) {
  const action = document.getElementById('act_' + id)?.value || 'resolve';
  const severity = document.getElementById('sev_' + id)?.value || 'minor';
  const note = document.getElementById('note_' + id)?.value || '';
  await sendReportAction(id, action, severity, note);
}

async function quickResolve(id, action) {
  await sendReportAction(id, action, 'minor', action === 'dismiss' ? '举报驳回，暂未发现明显违规' : '');
}

async function sendReportAction(id, action, severity, note) {
  if (!confirm('确定执行该处理？')) return;
  const res = await fetch('/api/admin/moderation/reports/' + encodeURIComponent(id) + '/resolve', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ action, severity, review_note: note, violation_reason: note }),
  });
  const json = await res.json();
  if (json.code !== 0) { alert(json.msg || '处理失败'); return; }
  loadReports();
}

async function loadViolations() {
  try {
    const userId = document.getElementById('violationUserId').value.trim();
    const res = await fetch('/api/admin/moderation/violations' + (userId ? '?user_id=' + encodeURIComponent(userId) : ''));
    const json = await res.json();
    const list = document.getElementById('violationsList');
    if (json.code !== 0) { list.innerHTML = '<div class="empty-state">无法加载违规记录</div>'; return; }
    if (!json.data.items.length) { list.innerHTML = '<div class="empty-state">🧾 暂无违规记录</div>'; return; }
    list.innerHTML = json.data.items.map(item => `
      <div class="violation-card">
        <div class="violation-meta">
          <span class="severity-${h(item.severity)}">${severityName(item.severity)}</span>
          <span>${typeName(item.item_type)}</span>
          <span>@${h(item.display_name || item.username || item.user_id)}</span>
          <span>${new Date(item.created_at).toLocaleString('zh-CN')}</span>
        </div>
        <div class="violation-title">${h(item.reason)}</div>
        <div class="violation-detail">记录人：@${h(item.created_by_name || item.created_by)}${item.item_id ? ' · 对象 ' + h(item.item_id) : ''}</div>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('violationsList').innerHTML = '<div class="empty-state">无法加载违规记录</div>';
  }
}

window.act = async function(id, action) {
  try {
    const res = await fetch('/api/admin/moderation/' + id + '/action', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({action}),
    });
    const json = await res.json();
    if (json.code !== 0) { alert(json.msg); return; }
    loadQueue();
  } catch(e) { alert('操作失败'); }
};

function h(s) { const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function typeName(type) { return type === 'post' ? '帖子' : type === 'comment' ? '评论' : type === 'profile' ? '资料' : '内容'; }
function severityName(value) { return value === 'severe' ? '恶劣违规' : value === 'major' ? '严重违规' : '轻微违规'; }
function openInitialView() {
  const view = new URLSearchParams(location.search).get('view') || 'queue';
  const btn = document.querySelector(`.mode-tabs button[data-view="${view}"]`);
  if (btn) btn.click();
  else loadQueue();
}
openInitialView();
</script>
</body>
</html>
