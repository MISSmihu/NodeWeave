<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI审核配置 // NodeWeave ADMIN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
.admin-layout{display:flex;min-height:100vh;padding-top:60px}
.admin-sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);padding:20px 0;position:fixed;top:60px;bottom:0;left:0}
.admin-sidebar a{display:block;padding:10px 20px;color:var(--text-dim);font-family:var(--font-mono);font-size:13px;text-decoration:none}
.admin-sidebar a:hover,.admin-sidebar a.active{color:var(--cyan);background:rgba(0,240,255,.05)}
.admin-main{margin-left:200px;flex:1;padding:24px;max-width:900px}
.admin-main h2{font-family:var(--font-display);font-size:20px;color:var(--cyan);margin-bottom:20px}
.page-section{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;margin-bottom:20px}
.page-section h3{font-family:var(--font-display);font-size:15px;color:var(--text);margin-bottom:16px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase}
.form-group select,.form-group input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:14px;outline:none}
.form-group select:focus,.form-group input:focus{border-color:var(--cyan)}
.form-row{display:flex;gap:12px}
.form-row .form-group{flex:1}
.range-row{display:flex;align-items:center;gap:10px}
.range-row span{font-family:var(--font-mono);font-size:12px;color:var(--text-dim)}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.toggle-row:last-child{border-bottom:none}
.toggle-row .info{flex:1}
.toggle-row .info .name{font-size:14px;color:var(--text)}
.toggle-row .info .desc{font-size:12px;color:var(--text-mute);margin-top:2px}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{display:none}
.toggle .slider{position:absolute;inset:0;background:var(--bg);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .2s}
.toggle .slider::after{content:'';position:absolute;width:18px;height:18px;left:2px;top:2px;background:var(--text-dim);border-radius:50%;transition:all .2s}
.toggle input:checked+.slider{background:var(--cyan);border-color:var(--cyan)}
.toggle input:checked+.slider::after{left:22px;background:var(--bg)}
.btn-primary{padding:10px 24px;background:var(--cyan);color:var(--bg);border:none;border-radius:4px;font-family:var(--font-display);font-size:14px;cursor:pointer;font-weight:700}
.btn-primary:hover{box-shadow:var(--glow-cyan)}
.msg{display:none;padding:8px 12px;border-radius:4px;font-size:13px;margin-top:12px}
.msg.show{display:block}
.msg-ok{background:rgba(127,255,0,.1);color:var(--green);border:1px solid rgba(127,255,0,.2)}
.msg-err{background:rgba(255,0,60,.1);color:var(--magenta);border:1px solid rgba(255,0,60,.2)}
</style>
</head>
<body>
<div class="bg-grid"></div><div class="bg-scanlines"></div><div class="bg-glow"></div>
<header class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo"><span class="logo-mark">◈</span><span class="logo-text">Node<span class="x">Weave</span></span><span class="logo-sub">// ADMIN</span></a>
    <div class="nav-actions"><a href="../index.html" class="btn-ghost">返回首页</a></div>
  </div>
</header>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <a href="site-config.html">站点配置</a><a href="invite-codes.html">邀请码管理</a>
    <a href="moderation.html">内容审核</a><a href="users.html">用户管理</a>
    <a href="ai-config.html" class="active">AI审核配置</a>
  </aside>
  <main class="admin-main">
    <h2>AI 智能审核配置</h2>
    <div class="page-section">
      <h3>审核开关</h3>
      <div class="toggle-row">
        <div class="info"><div class="name">启用 AI 审核</div><div class="desc">开启后所有用户内容将先经 AI 预审</div></div>
        <label class="toggle"><input type="checkbox" id="aiEnabled"><span class="slider"></span></label>
      </div>
    </div>
    <div class="page-section">
      <h3>模型与阈值</h3>
      <div class="form-group">
        <label>AI 供应商</label>
        <select id="aiProvider">
          <option value="glm">智谱 GLM（国产，推荐）</option>
          <option value="tongyi">通义千问（国产）</option>
          <option value="deepseek">DeepSeek（国产）</option>
          <option value="openai">OpenAI（海外）</option>
          <option value="claude">Claude（海外）</option>
        </select>
      </div>
      <div class="form-group">
        <label>模型名称</label>
        <input type="text" id="aiModel" placeholder="glm-4-flash">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>存疑阈值 (score >= 标记存疑)</label>
          <input type="number" id="aiThreshold" min="0" max="100" value="60">
        </div>
        <div class="form-group">
          <label>违规阈值 (score >= 自动拦截)</label>
          <input type="number" id="aiAutoBlock" min="0" max="100" value="80">
        </div>
      </div>
      <p style="font-size:12px;color:var(--text-mute);margin-top:8px">
        ⚠️ 使用海外供应商（OpenAI/Claude）需注意数据出境合规。推荐优先使用国产模型。
      </p>
      <button class="btn-primary" onclick="saveConfig()" style="margin-top:16px">保存配置</button>
      <div class="msg" id="saveMsg"></div>
    </div>
  </main>
</div>
<script>
async function loadConfig() {
  try {
    const res = await fetch('/api/admin/ai-config');
    const json = await res.json();
    if (json.code !== 0) return;
    const c = json.data;
    document.getElementById('aiEnabled').checked = c.enabled === 1;
    document.getElementById('aiProvider').value = c.provider || 'glm';
    document.getElementById('aiModel').value = c.model || 'glm-4-flash';
    document.getElementById('aiThreshold').value = c.threshold || 60;
    document.getElementById('aiAutoBlock').value = c.auto_block || 80;
  } catch(e) {}
}

async function saveConfig() {
  try {
    const res = await fetch('/api/admin/ai-config', {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        enabled: document.getElementById('aiEnabled').checked ? 1 : 0,
        provider: document.getElementById('aiProvider').value,
        model: document.getElementById('aiModel').value.trim(),
        threshold: +document.getElementById('aiThreshold').value,
        auto_block: +document.getElementById('aiAutoBlock').value,
      }),
    });
    const json = await res.json();
    const msg = document.getElementById('saveMsg');
    if (json.code !== 0) { msg.textContent = json.msg; msg.className = 'msg show msg-err'; }
    else { msg.textContent = '配置已保存'; msg.className = 'msg show msg-ok'; }
    setTimeout(() => msg.classList.remove('show'), 2000);
  } catch(e) {}
}
loadConfig();
</script>
</body>
</html>
