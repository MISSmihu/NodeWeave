<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成就徽章 // NodeWeave ADMIN</title>
<link rel="stylesheet" href="../style.css">
<style>
.admin-layout{display:flex;min-height:100vh;padding-top:60px}
.admin-sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);padding:20px 0;position:fixed;top:60px;bottom:0;left:0;overflow-y:auto}
.admin-sidebar a{display:block;padding:10px 20px;color:var(--text-dim);font-family:var(--font-mono);font-size:13px;text-decoration:none;transition:all .2s}
.admin-sidebar a:hover,.admin-sidebar a.active{color:var(--cyan);background:rgba(0,240,255,.05)}
.admin-main{margin-left:200px;flex:1;padding:24px 24px 100px;max-width:1280px}
.admin-main h2{font-family:var(--font-display);font-size:20px;color:var(--cyan);margin-bottom:10px}
.admin-lead{color:var(--text-dim);line-height:1.8;margin-bottom:20px;max-width:840px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:18px;box-shadow:0 18px 50px rgba(0,0,0,.18)}
.panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:16px}
.panel h3{font-family:var(--font-display);font-size:15px;color:var(--text);margin:0}
.panel p{color:var(--text-mute);font-size:12px;line-height:1.7;margin-top:6px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.toolbar input,.toolbar select,.form-grid input,.form-grid select,.form-grid textarea,.rule-grid input,.rule-grid select,.badge-grid input,.badge-grid select{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:9px 10px;outline:none;font-family:var(--font-mono);font-size:12px}
.toolbar input:focus,.toolbar select:focus,.form-grid input:focus,.form-grid select:focus,.form-grid textarea:focus,.rule-grid input:focus,.rule-grid select:focus,.badge-grid input:focus,.badge-grid select:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,240,255,.08)}
.toolbar input{min-width:260px}
.btn{padding:9px 14px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-family:var(--font-mono);font-size:12px;cursor:pointer;text-decoration:none}
.btn:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-primary{background:var(--cyan);color:var(--bg);border-color:var(--cyan);font-weight:700}
.btn-primary:hover{box-shadow:var(--glow-cyan);color:var(--bg)}
.btn-danger{border-color:rgba(255,0,60,.5);color:var(--magenta)}
.btn-danger:hover{border-color:var(--magenta);color:var(--magenta)}
.btn-owner{border-color:rgba(127,255,0,.45);color:var(--green)}
.btn-owner:hover{border-color:var(--green);color:var(--green)}
.status-msg{min-height:20px;font-size:12px;color:var(--text-mute);font-family:var(--font-mono)}
.status-msg.ok{color:var(--green)}.status-msg.err{color:var(--magenta)}
.form-grid{display:grid;grid-template-columns:1.1fr 1fr 1fr .8fr;gap:12px;align-items:end}
.form-grid label,.rule-grid label,.badge-grid label{display:block;font-family:var(--font-mono);font-size:10px;color:var(--text-mute);margin-bottom:5px}
.form-grid textarea{min-height:38px;resize:vertical}
.checkline{display:flex;align-items:center;gap:8px;color:var(--text-dim);font-size:12px;font-family:var(--font-mono);padding-bottom:9px}
.list{display:grid;gap:10px}
.rule-card,.badge-card,.owned-card{border:1px solid var(--border);border-radius:8px;background:rgba(10,10,15,.34);padding:14px}
.rule-top,.badge-top,.owned-card{display:flex;gap:12px;align-items:center;justify-content:space-between}
.identity{display:flex;align-items:center;gap:12px;min-width:0}
.badge-art{width:54px;height:54px;border-radius:14px;border:1px solid var(--border);background:radial-gradient(circle at 35% 25%,rgba(255,255,255,.16),transparent 34%),rgba(0,240,255,.06);object-fit:cover;flex-shrink:0;box-shadow:0 0 22px rgba(0,240,255,.08)}
.badge-fallback{width:54px;height:54px;border-radius:14px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;background:rgba(0,240,255,.06)}
.title-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.title-line b{font-size:14px;color:var(--text)}
.meta{font-family:var(--font-mono);font-size:11px;color:var(--text-mute);margin-top:4px}
.pill{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--border);border-radius:999px;padding:2px 8px;font-family:var(--font-mono);font-size:10px;color:var(--text-dim);background:rgba(0,240,255,.04)}
.pill.cyan{border-color:rgba(0,240,255,.34);color:var(--cyan)}
.pill.green{border-color:rgba(127,255,0,.34);color:var(--green)}
.pill.magenta{border-color:rgba(255,0,60,.34);color:var(--magenta)}
.rule-grid{display:grid;grid-template-columns:1fr 1fr .7fr .7fr 1fr;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.rule-grid .wide{grid-column:span 2}
.badge-grid{display:grid;grid-template-columns:1fr 1fr .7fr .7fr .7fr;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.card-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.empty{padding:28px;border:1px dashed var(--border);border-radius:8px;color:var(--text-mute);text-align:center;font-size:13px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.tabs button{padding:8px 12px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-family:var(--font-mono);cursor:pointer}
.tabs button.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,240,255,.06)}
@media(max-width:960px){.admin-sidebar{position:static;width:auto}.admin-layout{display:block}.admin-main{margin-left:0}.form-grid,.rule-grid,.badge-grid{grid-template-columns:1fr}.rule-grid .wide{grid-column:auto}.rule-top,.badge-top,.owned-card{align-items:flex-start;flex-direction:column}.card-actions{justify-content:flex-start}}
</style>
</head>
<body>
<div class="bg-grid"></div><div class="bg-scanlines"></div><div class="bg-glow"></div>
<header class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo"><span class="logo-mark" aria-hidden="true"></span><span class="logo-text">Node<span class="x">Weave</span></span><span class="logo-sub">// BADGE OPS</span></a>
    <div class="nav-actions"><a href="../index.html" class="btn-ghost">返回首页</a></div>
  </div>
</header>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <a href="site-config.html">站点配置</a>
    <a href="invite-codes.html">邀请码管理</a>
    <a href="moderation.html">内容审核</a>
    <a href="announcements.html">公告管理</a>
    <a href="users.html">用户管理</a>
    <a href="achievements.html" class="active">成就徽章</a>
    <a href="ai-config.html">AI审核配置</a>
  </aside>
  <main class="admin-main">
    <h2>成就与徽章管理</h2>
    <div class="admin-lead">这里控制达成条件、奖励论坛币、奖励徽章，并支持站长手动颁发或撤回。管理员可查看，只有站长能修改和颁发。</div>

    <section class="panel">
      <div class="panel-head">
        <div>
          <h3>手动颁发 / 撤回</h3>
          <p>输入用户 ID 或用户名，选择成就或徽章。颁发成就时默认同步发放论坛币和奖励徽章。</p>
        </div>
        <button class="btn btn-owner" onclick="syncCatalog()">同步种子</button>
      </div>
      <div class="form-grid">
        <div><label>用户 ID / 用户名</label><input id="targetUser" placeholder="例如 xiaomihu 或 u_xxx"></div>
        <div><label>类型</label><select id="grantKind" onchange="renderGrantOptions()"><option value="achievement">成就</option><option value="badge">徽章</option></select></div>
        <div><label>项目</label><select id="grantItem"></select></div>
        <div class="checkline"><input type="checkbox" id="awardRewards" checked><span>成就奖励同步发放</span></div>
        <div class="wide"><label>原因</label><textarea id="grantReason" placeholder="例如：活动奖励、人工补发、误删恢复"></textarea></div>
        <div><button class="btn btn-primary" onclick="grantItem()">确认颁发</button></div>
        <div><button class="btn btn-danger" onclick="revokeItem()">撤回所选</button></div>
        <div><button class="btn" onclick="loadOwned()">查看用户拥有</button></div>
      </div>
      <div class="status-msg" id="grantMsg"></div>
      <div class="list" id="ownedList" style="margin-top:14px"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <h3>成就规则</h3>
          <p>修改后立即影响之后的自动达成检查；不会强行删除已获得成就。</p>
        </div>
      </div>
      <div class="toolbar">
        <input id="achievementSearch" placeholder="搜索成就名称 / 条件 / 徽章" oninput="renderAchievements()">
        <select id="achievementCategory" onchange="renderAchievements()"><option value="">全部分类</option></select>
        <select id="achievementCondition" onchange="renderAchievements()"><option value="">全部条件</option></select>
      </div>
      <div class="list" id="achievementList"><div class="empty">加载中...</div></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <h3>徽章库存与商城</h3>
          <p>成就/限定徽章默认不可购买；普通徽章可配置价格与库存。库存 -1 表示不限量。</p>
        </div>
      </div>
      <div class="tabs" id="badgeTabs"></div>
      <div class="toolbar">
        <input id="badgeSearch" placeholder="搜索徽章名称 / 描述" oninput="renderBadges()">
      </div>
      <div class="list" id="badgeList"><div class="empty">加载中...</div></div>
    </section>
  </main>
</div>
<script src="../js/badge-image-map.js"></script>
<script src="../script.js"></script>
<script>
let adminUser = null;
let achievements = [];
let badges = [];
let conditionTypes = [];
let badgeTab = '';

const rarityText = { common:'普通', uncommon:'优秀', rare:'稀有', epic:'史诗', legendary:'传说' };
const categoryText = { achievement:'成就', general:'通用', tech:'技术', social:'社交', special:'限定', reputation:'声望' };
const conditionText = {
  account_exists:'注册账号', post_count:'发帖数量', blog_count:'博客数量', comment_count:'评论数量', reputation:'声望',
  signin_streak:'连续签到', received_likes:'获赞数量', followers_count:'粉丝数量', profile_complete:'资料完整',
  real_name_verified:'实名/手机', account_age_days:'注册天数', night_post_count:'深夜发帖', early_signin_count:'早起签到',
  accepted_answers:'采纳答案', bounty_accepted:'悬赏采纳', tips_received_total:'收到打赏', tips_sent_total:'发出打赏',
  five_star_ratings_received:'五星评分', accepted_reports:'有效举报', first_floor_count:'抢沙发'
};

async function loadAll() {
  const [achJson, badgeJson] = await Promise.all([
    NodeWeave.apiJson('/api/admin/achievements', { redirectOnAuth: true }),
    NodeWeave.apiJson('/api/admin/achievements/badges', { redirectOnAuth: true }),
  ]);
  if (achJson.code === 0) {
    achievements = achJson.data.achievements || [];
    conditionTypes = achJson.data.condition_types || [];
  }
  if (badgeJson.code === 0) badges = badgeJson.data.badges || [];
  buildFilters();
  renderGrantOptions();
  renderAchievements();
  renderBadgeTabs();
  renderBadges();
}

function buildFilters() {
  const cats = [...new Set(achievements.map(item => item.category || 'general'))];
  document.getElementById('achievementCategory').innerHTML = '<option value="">全部分类</option>' + cats.map(c => `<option value="${h(c)}">${h(categoryText[c] || c)}</option>`).join('');
  document.getElementById('achievementCondition').innerHTML = '<option value="">全部条件</option>' + conditionTypes.map(c => `<option value="${h(c)}">${h(conditionText[c] || c)}</option>`).join('');
}

function renderGrantOptions() {
  const kind = document.getElementById('grantKind').value;
  document.getElementById('awardRewards').disabled = kind !== 'achievement';
  const options = (kind === 'achievement' ? achievements : badges).map(item => {
    const label = kind === 'achievement'
      ? `${item.name} / ${conditionText[item.condition_type] || item.condition_type} ≥ ${item.condition_value}`
      : `${item.name} / ${categoryText[item.category] || item.category} / ${rarityText[item.rarity] || item.rarity}`;
    return `<option value="${h(item.id)}">${h(label)}</option>`;
  }).join('');
  document.getElementById('grantItem').innerHTML = options || '<option value="">暂无数据</option>';
}

function renderAchievements() {
  const keyword = document.getElementById('achievementSearch').value.trim().toLowerCase();
  const category = document.getElementById('achievementCategory').value;
  const condition = document.getElementById('achievementCondition').value;
  const filtered = achievements.filter(item => {
    const haystack = `${item.name} ${item.description} ${item.condition_label} ${item.condition_type} ${item.badge_name}`.toLowerCase();
    return (!keyword || haystack.includes(keyword)) && (!category || item.category === category) && (!condition || item.condition_type === condition);
  });
  document.getElementById('achievementList').innerHTML = filtered.length ? filtered.map(renderAchievementCard).join('') : '<div class="empty">没有匹配的成就</div>';
}

function renderAchievementCard(item) {
  return `
    <article class="rule-card" data-achievement="${h(item.id)}">
      <div class="rule-top">
        <div class="identity">
          ${badgeArt(item.badge_reward_id, item.icon)}
          <div>
            <div class="title-line"><b>${h(item.name)}</b><span class="pill cyan">${h(categoryText[item.category] || item.category || 'general')}</span><span class="pill green">已颁发 ${Number(item.awarded_count || 0)}</span></div>
            <div class="meta">${h(item.id)} · ${h(item.condition_label || item.description || '')}</div>
          </div>
        </div>
        <div class="card-actions">
          ${isOwner() ? `<button class="btn btn-primary" onclick="saveAchievement('${h(item.id)}')">保存规则</button>` : ''}
        </div>
      </div>
      <div class="rule-grid">
        <div><label>名称</label><input data-field="name" value="${a(item.name)}" ${ownerDisabled()}></div>
        <div><label>说明</label><input data-field="description" value="${a(item.description || '')}" ${ownerDisabled()}></div>
        <div><label>图标</label><input data-field="icon" value="${a(item.icon || '')}" ${ownerDisabled()}></div>
        <div><label>分类</label><input data-field="category" value="${a(item.category || 'general')}" ${ownerDisabled()}></div>
        <div><label>达成条件</label><select data-field="condition_type" ${ownerDisabled()}>${conditionTypes.map(t => `<option value="${h(t)}" ${item.condition_type===t?'selected':''}>${h(conditionText[t] || t)}</option>`).join('')}</select></div>
        <div><label>条件数值</label><input data-field="condition_value" type="number" min="1" value="${Number(item.condition_value || 1)}" ${ownerDisabled()}></div>
        <div><label>论坛币奖励</label><input data-field="coin_reward" type="number" min="0" value="${Number(item.coin_reward || 0)}" ${ownerDisabled()}></div>
        <div><label>奖励徽章 ID</label><input data-field="badge_reward_id" value="${a(item.badge_reward_id || '')}" ${ownerDisabled()}></div>
        <div class="wide"><label>达成提示</label><input data-field="condition_label" value="${a(item.condition_label || '')}" ${ownerDisabled()}></div>
      </div>
    </article>`;
}

function renderBadgeTabs() {
  const cats = ['', ...new Set(badges.map(item => item.category || 'general'))];
  document.getElementById('badgeTabs').innerHTML = cats.map(cat => `<button class="${cat===badgeTab?'active':''}" onclick="badgeTab='${h(cat)}';renderBadgeTabs();renderBadges()">${h(cat ? (categoryText[cat] || cat) : '全部')}</button>`).join('');
}

function renderBadges() {
  const keyword = document.getElementById('badgeSearch').value.trim().toLowerCase();
  const filtered = badges.filter(item => {
    const haystack = `${item.name} ${item.description} ${item.id}`.toLowerCase();
    return (!badgeTab || item.category === badgeTab) && (!keyword || haystack.includes(keyword));
  });
  document.getElementById('badgeList').innerHTML = filtered.length ? filtered.map(renderBadgeCard).join('') : '<div class="empty">没有匹配的徽章</div>';
}

function renderBadgeCard(item) {
  const purchasable = item.category !== 'achievement' && !Number(item.is_special);
  return `
    <article class="badge-card" data-badge="${h(item.id)}">
      <div class="badge-top">
        <div class="identity">
          ${badgeArt(item.id, item.icon)}
          <div>
            <div class="title-line"><b>${h(item.name)}</b><span class="pill cyan">${h(categoryText[item.category] || item.category)}</span><span class="pill">${h(rarityText[item.rarity] || item.rarity)}</span>${purchasable?'<span class="pill green">可购买</span>':'<span class="pill magenta">颁发/成就</span>'}</div>
            <div class="meta">${h(item.id)} · 已拥有 ${Number(item.owned_count || 0)} · ${h(item.description || '')}</div>
          </div>
        </div>
        <div class="card-actions">
          ${isOwner() ? `<button class="btn btn-primary" onclick="saveBadge('${h(item.id)}')">保存徽章</button>` : ''}
        </div>
      </div>
      <div class="badge-grid">
        <div><label>名称</label><input data-field="name" value="${a(item.name)}" ${ownerDisabled()}></div>
        <div><label>说明</label><input data-field="description" value="${a(item.description || '')}" ${ownerDisabled()}></div>
        <div><label>图标</label><input data-field="icon" value="${a(item.icon || '')}" ${ownerDisabled()}></div>
        <div><label>颜色</label><input data-field="color" value="${a(item.color || '#00f0ff')}" ${ownerDisabled()}></div>
        <div><label>稀有度</label><select data-field="rarity" ${ownerDisabled()}>${Object.keys(rarityText).map(r => `<option value="${h(r)}" ${item.rarity===r?'selected':''}>${h(rarityText[r])}</option>`).join('')}</select></div>
        <div><label>分类</label><select data-field="category" ${ownerDisabled()}>${['achievement','general','tech','social','special'].map(c => `<option value="${h(c)}" ${item.category===c?'selected':''}>${h(categoryText[c])}</option>`).join('')}</select></div>
        <div><label>价格</label><input data-field="price" type="number" min="0" value="${Number(item.price || 0)}" ${ownerDisabled()}></div>
        <div><label>库存</label><input data-field="quantity" type="number" min="-1" value="${Number(item.quantity ?? -1)}" ${ownerDisabled()}></div>
        <div><label>限定/特殊</label><select data-field="is_special" ${ownerDisabled()}><option value="0" ${Number(item.is_special)?'':'selected'}>否</option><option value="1" ${Number(item.is_special)?'selected':''}>是</option></select></div>
      </div>
    </article>`;
}

async function saveAchievement(id) {
  const card = document.querySelector(`[data-achievement="${cssEscape(id)}"]`);
  const body = collectFields(card);
  body.condition_value = Number(body.condition_value || 1);
  body.coin_reward = Number(body.coin_reward || 0);
  const json = await NodeWeave.apiJson('/api/admin/achievements/achievements/' + encodeURIComponent(id), { method:'PUT', body: JSON.stringify(body) });
  toast('grantMsg', json.code === 0 ? '成就规则已保存' : json.msg, json.code === 0);
  if (json.code === 0) await loadAll();
}

async function saveBadge(id) {
  const card = document.querySelector(`[data-badge="${cssEscape(id)}"]`);
  const body = collectFields(card);
  body.price = Number(body.price || 0);
  body.quantity = Number(body.quantity ?? -1);
  body.is_special = Number(body.is_special || 0);
  const json = await NodeWeave.apiJson('/api/admin/achievements/badges/' + encodeURIComponent(id), { method:'PUT', body: JSON.stringify(body) });
  toast('grantMsg', json.code === 0 ? '徽章配置已保存' : json.msg, json.code === 0);
  if (json.code === 0) await loadAll();
}

async function grantItem() {
  if (!isOwner()) return toast('grantMsg', '只有站长可以颁发', false);
  const kind = document.getElementById('grantKind').value;
  const itemId = document.getElementById('grantItem').value;
  const body = { kind, user_id: document.getElementById('targetUser').value.trim(), reason: document.getElementById('grantReason').value.trim(), award_rewards: document.getElementById('awardRewards').checked };
  if (kind === 'achievement') body.achievement_id = itemId; else body.badge_id = itemId;
  const json = await NodeWeave.apiJson('/api/admin/achievements/grant', { method:'POST', body: JSON.stringify(body) });
  toast('grantMsg', json.code === 0 ? json.data.message : json.msg, json.code === 0);
  if (json.code === 0) { await loadAll(); await loadOwned(); }
}

async function revokeItem() {
  if (!isOwner()) return toast('grantMsg', '只有站长可以撤回', false);
  if (!confirm('确定撤回该用户所选项目？')) return;
  const kind = document.getElementById('grantKind').value;
  const itemId = document.getElementById('grantItem').value;
  const body = { kind, user_id: document.getElementById('targetUser').value.trim(), reason: document.getElementById('grantReason').value.trim(), revoke_badge: true, restore_quantity: false };
  if (kind === 'achievement') body.achievement_id = itemId; else body.badge_id = itemId;
  const json = await NodeWeave.apiJson('/api/admin/achievements/revoke', { method:'POST', body: JSON.stringify(body) });
  toast('grantMsg', json.code === 0 ? json.data.message : json.msg, json.code === 0);
  if (json.code === 0) { await loadAll(); await loadOwned(); }
}

async function loadOwned() {
  const target = document.getElementById('targetUser').value.trim();
  if (!target) return toast('grantMsg', '先输入用户 ID 或用户名', false);
  const json = await NodeWeave.apiJson('/api/admin/achievements/user/' + encodeURIComponent(target), { redirectOnAuth: true });
  if (json.code !== 0) return toast('grantMsg', json.msg || '用户不存在', false);
  const user = json.data.user;
  const completedRows = (json.data.achievements || []).filter(item => Number(item.completed));
  const ownedBadges = json.data.badges || [];
  document.getElementById('ownedList').innerHTML = `
    <div class="owned-card">
      <div>
        <div class="title-line"><b>${h(user.display_name || user.username)}</b><span class="pill cyan">@${h(user.username)}</span><span class="pill green">${Number(user.coins || 0)} 币</span></div>
        <div class="meta">成就 ${completedRows.length} 个 · 装备徽章 ${ownedBadges.length} 个 · 声望 ${Number(user.reputation || 0)}</div>
      </div>
    </div>
    ${completedRows.slice(0, 12).map(item => `<div class="owned-card"><div class="identity">${badgeArt(item.badge_reward_id, item.icon)}<div><div class="title-line"><b>${h(item.name)}</b><span class="pill green">已完成</span></div><div class="meta">${h(item.condition_label || item.description || '')}</div></div></div></div>`).join('')}
    ${ownedBadges.slice(0, 12).map(item => `<div class="owned-card"><div class="identity">${badgeArt(item.id, item.icon)}<div><div class="title-line"><b>${h(item.name)}</b><span class="pill cyan">徽章</span></div><div class="meta">${h(item.description || '')}</div></div></div></div>`).join('')}`;
}

async function syncCatalog() {
  if (!isOwner()) return toast('grantMsg', '只有站长可以同步种子', false);
  const json = await NodeWeave.apiJson('/api/admin/achievements/sync', { method:'POST' });
  toast('grantMsg', json.code === 0 ? json.data.message : json.msg, json.code === 0);
  if (json.code === 0) await loadAll();
}

function collectFields(root) {
  const body = {};
  root.querySelectorAll('[data-field]').forEach(input => {
    body[input.dataset.field] = input.value;
  });
  return body;
}

function badgeArt(id, fallback) {
  if (window.badgeImageMap && id && window.badgeImageMap[id]) return `<img class="badge-art" src="../${window.badgeImageMap[id]}" alt="">`;
  return `<span class="badge-fallback">${h(fallback || '◈')}</span>`;
}

function isOwner() { return adminUser && adminUser.role === 'owner'; }
function ownerDisabled() { return isOwner() ? '' : 'disabled'; }
function cssEscape(value) { return String(value).replace(/["\\]/g, '\\$&'); }
function h(value) { return NodeWeave.escapeHtml(value == null ? '' : value); }
function a(value) { return h(value).replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
function toast(id, text, ok) { const el=document.getElementById(id); el.textContent=text||''; el.className='status-msg ' + (ok?'ok':'err'); }

document.addEventListener('DOMContentLoaded', async () => {
  adminUser = await NodeWeave.currentUser(true);
  if (!adminUser || !['owner','admin'].includes(adminUser.role)) {
    location.href = '../login.html?redirect=' + encodeURIComponent('admin/achievements.html');
    return;
  }
  await loadAll();
});
</script>
</body>
</html>
