<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日签到 // NodeWeave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.signin-page{max-width:500px;margin:0 auto;padding:80px 24px 100px}
.signin-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px 28px;text-align:center}
.signin-card .streak-badge{display:inline-block;padding:8px 20px;border-radius:20px;font-family:var(--font-display);font-size:13px;margin-bottom:16px}
.fire{background:linear-gradient(135deg,#ff4500,#ff8c00);color:#fff}
.signin-card .day-title{font-family:var(--font-display);font-size:28px;color:var(--cyan);text-shadow:var(--glow-cyan);margin-bottom:8px}
.signin-card .date{font-family:var(--font-mono);font-size:12px;color:var(--text-mute);margin-bottom:24px}
.signin-card .reward-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:20px}
.signin-card .reward-box .reward-num{font-family:var(--font-display);font-size:36px;color:var(--green)}
.signin-card .reward-box .reward-label{font-size:12px;color:var(--text-mute);margin-top:4px}
.signin-card .btn-signin{padding:14px 48px;background:var(--cyan);color:var(--bg);border:none;border-radius:6px;font-family:var(--font-display);font-size:16px;font-weight:700;cursor:pointer;transition:all .2s}
.signin-card .btn-signin:hover{box-shadow:var(--glow-cyan);transform:translateY(-1px)}
.signin-card .btn-signin.signed{background:var(--surface-2);color:var(--text-dim);cursor:default}
.signin-card .btn-signin.signed:hover{box-shadow:none;transform:none}
.stats-row{display:flex;gap:16px;margin-top:24px}
.stat-item{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.stat-item .stat-num{font-family:var(--font-display);font-size:18px;color:var(--cyan)}
.stat-item .stat-label{font-size:11px;color:var(--text-mute);margin-top:4px}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:24px}
.week-day{aspect-ratio:1;border-radius:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:var(--text-mute);background:var(--bg)}
.week-day.today{border-color:var(--cyan);color:var(--cyan);background:rgba(0,240,255,.08)}
.week-day.signed{background:rgba(127,255,0,.1);border-color:var(--green);color:var(--green)}
.streak-info{font-size:12px;color:var(--text-dim);margin-top:16px;line-height:1.8}
.streak-info span{color:var(--green);font-weight:700}
.msg{display:none;padding:8px 12px;border-radius:4px;font-size:13px;margin-top:12px}
.msg.show{display:block}
.msg-ok{background:rgba(127,255,0,.1);color:var(--green)}
.msg-err{background:rgba(255,0,60,.1);color:var(--magenta)}
</style>
</head>
<body>
<div class="bg-grid"></div><div class="bg-scanlines"></div><div class="bg-glow"></div>
<header class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-mark">◈</span><span class="logo-text">Node<span class="x">Weave</span></span><span class="logo-sub">// SIGNIN</span></a>
    <div class="nav-actions"><a href="index.html" class="btn-ghost" style="border:1px solid var(--border);padding:8px 16px">返回</a></div>
  </div>
</header>

<main class="signin-page">
  <div class="signin-card" id="signinCard">
    <div id="loading" style="padding:20px;color:var(--text-mute)">加载中...</div>
    <div id="content" style="display:none"></div>
    <div class="msg" id="msg"></div>
  </div>
</main>

<script>
async function init() {
  try {
    var res = await fetch('/api/signin');
    var json = await res.json();
    if (json.code !== 0) { document.getElementById('loading').textContent = '请先登录'; return; }
    var d = json.data;
    var signed = d.signed_today;
    var streak = d.streak;
    var today = new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric',weekday:'long'});

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = '';

    // 本周模拟（最近7天）
    var weekHtml = '';
    for (var i = 6; i >= 0; i--) {
      var di = new Date(); di.setDate(di.getDate() - i);
      var cls = i === 0 ? ' today' : '';
      if (signed && i === 0) cls = ' signed';
      weekHtml += '<div class="week-day' + cls + '">' + (['日','一','二','三','四','五','六'][di.getDay()]) + '</div>';
    }

    document.getElementById('content').innerHTML =
      '<div class="streak-badge' + (streak >= 7 ? ' fire' : '') + '" style="' + (streak<7?'background:var(--surface-2);color:var(--text-dim)':'') + '">' +
        (streak >= 30 ? '🔥 传奇连击 ' : streak >= 7 ? '🔥 连续签到 ' : '📅 当前连击 ') + streak + ' 天' +
      '</div>' +
      '<div class="day-title">' + (signed ? '✅ 已签到' : '每日签到') + '</div>' +
      '<div class="date">' + today + '</div>' +
      '<div class="reward-box">' +
        '<div class="reward-num">+' + d.next_reward + '</div>' +
        '<div class="reward-label">论坛币奖励' + (signed ? ' (下次)' : '') + '</div>' +
      '</div>' +
      (signed
        ? '<button class="btn-signin signed" disabled>今日已签到 ✅</button>'
        : '<button class="btn-signin" onclick="doSignin()">签到领币</button>') +
      '<div class="stats-row">' +
        '<div class="stat-item"><div class="stat-num">' + streak + '</div><div class="stat-label">连续签到</div></div>' +
        '<div class="stat-item"><div class="stat-num">' + d.total_signins + '</div><div class="stat-label">累计签到</div></div>' +
      '</div>' +
      '<div class="week-grid">' + weekHtml + '</div>' +
      '<div class="streak-info">' +
        '连续 <span>3</span> 天：+2 bonus · 连续 <span>7</span> 天：+4 bonus · 连续 <span>14</span> 天：+6 bonus · 连续 <span>30</span> 天：+10 bonus' +
      '</div>';
  } catch(e) { document.getElementById('loading').textContent = '加载失败'; }
}

async function doSignin() {
  var msg = document.getElementById('msg');
  try {
    var res = await fetch('/api/signin', { method:'POST' });
    var json = await res.json();
    if (json.code !== 0) { msg.textContent = json.msg; msg.className = 'msg show msg-err'; return; }
    msg.textContent = '🎉 ' + json.data.message;
    msg.className = 'msg show msg-ok';
    setTimeout(init, 1500);
  } catch(e) { msg.textContent = '网络错误'; msg.className = 'msg show msg-err'; }
}

init();
</script>
</body>
</html>
