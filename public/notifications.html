<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>消息中心 // NodeWeave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.notif-page{max-width:1280px;margin:0 auto;padding:42px 24px 96px}.notif-hero{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:22px;align-items:end;margin-bottom:22px}.notif-kicker{display:inline-flex;width:max-content;padding:6px 12px;border-radius:999px;background:rgba(124,58,237,.14);border:1px solid rgba(124,58,237,.25);color:#c4b5fd;font-size:12px;font-weight:850;letter-spacing:.08em}.notif-title{margin:14px 0 10px;color:#fff;font-family:var(--font-body);font-size:clamp(34px,5vw,56px);line-height:1.05;font-weight:900;letter-spacing:0}.notif-title span{background:linear-gradient(135deg,#a78bfa,#22d3ee,#f472b6);-webkit-background-clip:text;background-clip:text;color:transparent}.notif-desc{max-width:680px;margin:0;color:var(--text-dim);font-size:15px;line-height:1.8}.notif-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.notif-actions .btn-outline,.notif-actions .btn-primary{display:inline-flex;align-items:center;justify-content:center;min-height:40px;text-decoration:none}.notif-stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:22px}.notif-stat{padding:18px;border-radius:18px;background:rgba(255,255,255,.045);border:1px solid var(--border);box-shadow:0 18px 56px rgba(0,0,0,.22)}.notif-stat b{display:block;color:#fff;font-size:28px;line-height:1}.notif-stat span{display:block;margin-top:7px;color:var(--text-mute);font-size:12px}.notif-layout{display:grid;grid-template-columns:240px minmax(0,1fr);gap:18px;align-items:start}.notif-rail,.notif-feed,.notif-inspector{background:rgba(255,255,255,.045);border:1px solid var(--border);border-radius:18px;box-shadow:0 24px 70px rgba(0,0,0,.28);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px)}.notif-rail{padding:14px;position:sticky;top:86px}.notif-rail h3,.notif-feed-head h2,.notif-inspector h3{margin:0;color:#fff;font-size:15px}.notif-filter{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:8px;padding:11px 12px;border:1px solid transparent;border-radius:13px;background:transparent;color:var(--text-dim);text-align:left;font-weight:750}.notif-filter:hover,.notif-filter.active{background:rgba(255,255,255,.06);border-color:rgba(124,58,237,.26);color:#fff}.notif-filter b{font-size:11px;color:var(--text-mute);font-weight:800}.notif-filter.active b{color:#c4b5fd}.notif-rail-note{margin:16px 4px 2px;color:var(--text-mute);font-size:12px;line-height:1.7}.notif-feed{padding:18px}.notif-feed-head{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:14px}.notif-feed-sub{margin-top:5px;color:var(--text-mute);font-size:12px}.notif-list{display:grid;gap:12px}.notif-item{display:grid;grid-template-columns:48px minmax(0,1fr) auto;gap:14px;align-items:start;padding:16px;border:1px solid rgba(255,255,255,.075);border-radius:16px;background:rgba(255,255,255,.035);color:inherit;text-decoration:none;transition:transform .22s,border-color .22s,background .22s,box-shadow .22s}.notif-item:hover{transform:translateY(-3px);border-color:rgba(124,58,237,.32);background:rgba(255,255,255,.055);box-shadow:0 18px 54px rgba(124,58,237,.12)}.notif-item.unread{border-color:rgba(6,182,212,.28);background:linear-gradient(135deg,rgba(6,182,212,.08),rgba(255,255,255,.035))}.notif-icon{width:48px;height:48px;border-radius:15px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(124,58,237,.26),rgba(6,182,212,.18));border:1px solid rgba(255,255,255,.10);font-size:18px;font-weight:900;color:#fff}.notif-item[data-tone="reward"] .notif-icon{background:linear-gradient(135deg,rgba(251,191,36,.22),rgba(236,72,153,.14))}.notif-item[data-tone="admin"] .notif-icon{background:linear-gradient(135deg,rgba(236,72,153,.22),rgba(124,58,237,.16))}.notif-item[data-tone="social"] .notif-icon{background:linear-gradient(135deg,rgba(52,211,153,.18),rgba(6,182,212,.18))}.notif-message{color:rgba(255,255,255,.84);font-size:14px;line-height:1.65;font-weight:700;overflow-wrap:anywhere}.notif-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px;color:var(--text-mute);font-size:12px}.notif-chip{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.075);color:var(--text-dim);font-size:11px;font-weight:800}.notif-state{display:flex;align-items:center;gap:7px;color:var(--text-mute);font-size:12px;white-space:nowrap}.unread-dot{width:8px;height:8px;border-radius:50%;background:#22d3ee;box-shadow:0 0 18px rgba(34,211,238,.45)}.notif-empty{padding:54px 18px;text-align:center;border:1px dashed var(--border);border-radius:16px;background:rgba(255,255,255,.03);color:var(--text-mute)}.notif-empty strong{display:block;margin-bottom:8px;color:#fff;font-size:18px}.notif-inspector{margin-top:18px;padding:18px}.notif-inspector p{margin:8px 0 0;color:var(--text-mute);font-size:13px;line-height:1.75}.notif-quick{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:14px}.notif-quick a{padding:10px;border-radius:12px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.07);color:var(--text-dim);text-decoration:none;font-size:13px;font-weight:750}.notif-quick a:hover{color:#fff;border-color:rgba(124,58,237,.3)}@media(max-width:900px){.notif-page{padding:28px 14px 72px}.notif-hero{grid-template-columns:1fr}.notif-actions{justify-content:flex-start}.notif-layout{grid-template-columns:1fr}.notif-rail{position:static}.notif-stats{grid-template-columns:1fr}.notif-item{grid-template-columns:42px minmax(0,1fr)}.notif-state{grid-column:2;justify-content:flex-start}.notif-icon{width:42px;height:42px;border-radius:13px}.notif-feed{padding:14px}.notif-feed-head{align-items:flex-start;flex-direction:column}.notif-quick{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="bg-grid"></div><div class="bg-scanlines"></div><div class="bg-glow"></div>
<header class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-mark" aria-hidden="true"></span><span class="logo-text">Node<span class="x">Weave</span></span><span class="logo-sub">// NOTIFICATIONS</span></a>
    <nav class="nav-links"><a href="index.html">动态</a><a href="boards.html">论坛</a><a href="blog.html">博客</a><a href="messages.html">私信</a></nav>
    <div class="nav-actions" data-auth-actions></div>
  </div>
</header>
<main class="notif-page">
  <section class="notif-hero"><div><span class="notif-kicker">MESSAGE CENTER</span><h1 class="notif-title">消息<span>中心</span></h1><p class="notif-desc">把私信、互动、奖励、审核和系统提醒集中在一个地方。优先处理未读，再回到讨论现场。</p></div><div class="notif-actions"><a class="btn-outline" href="messages.html">私信会话</a><button class="btn-primary" type="button" onclick="readAll()">全部已读</button></div></section>
  <section class="notif-stats" aria-label="消息概览"><div class="notif-stat"><b id="statUnread">--</b><span>未读消息</span></div><div class="notif-stat"><b id="statTotal">--</b><span>最近通知</span></div><div class="notif-stat"><b id="statReward">--</b><span>奖励相关</span></div><div class="notif-stat"><b id="statDm">--</b><span>站内私信</span></div></section>
  <section class="notif-layout"><aside class="notif-rail"><h3>筛选</h3><button class="notif-filter active" type="button" data-filter="all"><span>全部通知</span><b id="countAll">0</b></button><button class="notif-filter" type="button" data-filter="unread"><span>未读优先</span><b id="countUnread">0</b></button><button class="notif-filter" type="button" data-filter="dm"><span>站内私信</span><b id="countDm">0</b></button><button class="notif-filter" type="button" data-filter="social"><span>互动回复</span><b id="countSocial">0</b></button><button class="notif-filter" type="button" data-filter="reward"><span>奖励资产</span><b id="countReward">0</b></button><button class="notif-filter" type="button" data-filter="admin"><span>系统消息</span><b id="countAdmin">0</b></button><p class="notif-rail-note">未读通知会带有青色高亮。点击通知后会自动标记为已读，并跳转到相关内容。</p></aside><div><section class="notif-feed"><div class="notif-feed-head"><div><h2 id="feedTitle">全部通知</h2><div class="notif-feed-sub" id="feedSub">正在同步站内消息...</div></div><button class="btn-outline" type="button" onclick="load()">刷新</button></div><div class="notif-list" id="notifList"><div class="notif-empty">加载中...</div></div></section><aside class="notif-inspector"><h3>快捷入口</h3><p>通知只负责提醒，真正的处理动作会回到对应页面完成。</p><div class="notif-quick"><a href="messages.html">打开私信</a><a href="announcements.html">站内公告</a><a href="invites.html">邀请码</a><a href="admin/moderation.html?view=reports">举报工单</a></div></aside></div></section>
</main>
<script src="script.js"></script>
<script>
var allNotifications = [];
var currentFilter = 'all';
async function load() {
  var list = document.getElementById('notifList');
  list.innerHTML = '<div class="notif-empty">正在同步消息...</div>';
  try {
    var r = await NodeWeave.api('/api/notifications');
    var j = await r.json();
    if (j.code !== 0) { allNotifications = []; updateStats(); list.innerHTML = '<div class="notif-empty"><strong>需要登录</strong>登录后才能查看你的站内通知。</div>'; return; }
    allNotifications = j.data.notifications || [];
    updateStats(); renderList();
  } catch(e) { allNotifications = []; updateStats(); list.innerHTML = '<div class="notif-empty"><strong>暂时不可达</strong>通知服务没有响应，请稍后刷新。</div>'; }
}
function renderList() {
  var list = document.getElementById('notifList');
  var items = filteredNotifications();
  document.getElementById('feedTitle').textContent = filterTitle(currentFilter);
  document.getElementById('feedSub').textContent = items.length ? '共 ' + items.length + ' 条，按时间倒序排列' : '这个分类暂时没有通知';
  if (!items.length) { list.innerHTML = '<div class="notif-empty"><strong>没有消息</strong>这个分类已经清空，可以去看看新的讨论。</div>'; return; }
  list.innerHTML = items.map(function(n){
    var href = notificationHref(n); var tone = notificationTone(n.type);
    return '<a class="notif-item'+(n.is_read ? '' : ' unread')+'" data-tone="'+tone+'" href="'+href+'" data-id="'+h(n.id)+'"><div class="notif-icon">'+notificationIcon(n.type)+'</div><div><div class="notif-message">'+h(n.message)+'</div><div class="notif-meta"><span class="notif-chip">'+h(typeLabel(n.type))+'</span><span>'+formatTime(n.created_at)+'</span></div></div><div class="notif-state">'+(n.is_read ? '<span>已读</span>' : '<span class="unread-dot"></span><span>未读</span>')+'</div></a>';
  }).join('');
}
function filteredNotifications() { return allNotifications.filter(function(n){ if (currentFilter === 'unread') return !n.is_read; if (currentFilter === 'dm') return n.type === 'message'; if (currentFilter === 'social') return notificationTone(n.type) === 'social'; if (currentFilter === 'reward') return notificationTone(n.type) === 'reward'; if (currentFilter === 'admin') return notificationTone(n.type) === 'admin'; return true; }); }
function updateStats() { var unread = allNotifications.filter(function(n){ return !n.is_read; }).length; var reward = allNotifications.filter(function(n){ return notificationTone(n.type) === 'reward'; }).length; var dm = allNotifications.filter(function(n){ return n.type === 'message'; }).length; var social = allNotifications.filter(function(n){ return notificationTone(n.type) === 'social'; }).length; var admin = allNotifications.filter(function(n){ return notificationTone(n.type) === 'admin'; }).length; document.getElementById('statUnread').textContent = unread; document.getElementById('statTotal').textContent = allNotifications.length; document.getElementById('statReward').textContent = reward; document.getElementById('statDm').textContent = dm; document.getElementById('countAll').textContent = allNotifications.length; document.getElementById('countUnread').textContent = unread; document.getElementById('countDm').textContent = dm; document.getElementById('countSocial').textContent = social; document.getElementById('countReward').textContent = reward; document.getElementById('countAdmin').textContent = admin; }
async function readAll() { try { await NodeWeave.api('/api/notifications/read-all', { method:'POST' }); } catch(e) {} load(); }
document.addEventListener('click', function(event){ var filter = event.target.closest('.notif-filter[data-filter]'); if (filter) { document.querySelectorAll('.notif-filter').forEach(function(item){ item.classList.remove('active'); }); filter.classList.add('active'); currentFilter = filter.dataset.filter || 'all'; renderList(); return; } var item = event.target.closest('.notif-item[data-id]'); if (!item || !item.classList.contains('unread')) return; try { NodeWeave.api('/api/notifications/' + encodeURIComponent(item.dataset.id) + '/read', { method:'POST' }); } catch(e) {} });
function h(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function formatTime(value){var t=Number(value || 0);return t ? new Date(t).toLocaleString('zh-CN') : '刚刚'}
function notificationHref(n) { if (n.type === 'report') return 'admin/moderation.html?view=reports'; if (n.type === 'message') return n.ref_id ? 'messages.html?to=' + encodeURIComponent(n.ref_id) : 'messages.html'; if (n.type === 'announcement' || n.type === 'system') return 'announcements.html'; if (n.type === 'invite') return 'invites.html'; if (!n.ref_id) return '#'; return 'post.html?id=' + encodeURIComponent(n.ref_id); }
function notificationTone(type) { if (['tip','reply_reward','accepted','lottery_win','lottery_drawn','lottery_cancelled','achievement','admin_grant','admin_revoke','asset_admin','invite'].includes(type)) return 'reward'; if (['moderation','report','report_result','violation','announcement','system','role','profile_admin','ban','ban_lifted'].includes(type)) return 'admin'; if (['comment','reply','mention','like','comment_like','downvote','rating','follow'].includes(type)) return 'social'; if (type === 'message') return 'dm'; return 'normal'; }
function notificationIcon(type) { var icons = {comment:'💬',reply:'↩',mention:'@',like:'👍',comment_like:'👍',downvote:'↓',rating:'★',follow:'＋',message:'✉',tip:'¥',reply_reward:'礼',accepted:'✓',lottery_win:'奖',lottery_drawn:'抽',lottery_cancelled:'停',moderation:'盾',report:'!',report_result:'回',violation:'警',announcement:'告',system:'讯',achievement:'🏆',admin_grant:'章',admin_revoke:'撤',invite:'券',role:'权',profile_admin:'人',asset_admin:'币',ban:'禁',ban_lifted:'解'}; return icons[type] || '•'; }
function filterTitle(filter) { return ({ all:'全部通知', unread:'未读优先', dm:'站内私信', social:'互动回复', reward:'奖励资产', admin:'系统消息' })[filter] || '全部通知'; }
function typeLabel(type) { return ({ comment:'帖子评论', reply:'评论回复', mention:'@提醒', like:'内容点赞', comment_like:'评论点赞', downvote:'内容点踩', rating:'内容评分', message:'站内私信', tip:'论坛币打赏', reply_reward:'回帖红包', accepted:'回答采纳', lottery_win:'抽奖中奖', lottery_drawn:'抽奖开奖', lottery_cancelled:'抽奖取消', moderation:'管理通知', report:'举报工单', report_result:'举报反馈', violation:'违规记录', announcement:'站内公告', system:'系统公告', achievement:'成就通知', admin_grant:'站长颁发', admin_revoke:'站长撤回', role:'角色变更', profile_admin:'资料管理', asset_admin:'资产变更', ban:'封禁禁言', ban_lifted:'封禁解除', invite:'邀请注册', follow:'关注通知' })[type] || '通知'; }
load();
</script>
</body>
</html>
