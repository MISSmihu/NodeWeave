<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>内容详情 // NodeWeave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style id="customStyles"></style>
<style>
.post-page{max-width:920px;margin:0 auto;padding:82px 24px 110px;position:relative;z-index:1}
.post-shell{background:rgba(18,18,30,.78);border:1px solid var(--border);border-radius:14px;padding:26px;box-shadow:0 22px 80px rgba(0,0,0,.22)}
.back-link{display:inline-flex;margin-bottom:18px;color:var(--text-mute);font-family:var(--font-mono);font-size:13px;text-decoration:none}
.back-link:hover{color:var(--cyan)}
.post-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.post-tags span{padding:4px 10px;border:1px solid rgba(0,240,255,.18);background:rgba(0,240,255,.07);border-radius:999px;color:var(--cyan);font-family:var(--font-mono);font-size:11px}
.post-status-tags{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
.status-tag{padding:4px 9px;border-radius:999px;border:1px solid rgba(0,240,255,.18);background:rgba(0,240,255,.06);color:var(--cyan);font-family:var(--font-mono);font-size:11px}
.status-tag.pin{border-color:rgba(255,0,60,.28);background:rgba(255,0,60,.08);color:var(--magenta);box-shadow:0 0 18px rgba(255,0,60,.08)}
.status-tag.feature{border-color:rgba(127,255,0,.26);background:rgba(127,255,0,.07);color:var(--green)}
.status-tag.reward{border-color:rgba(255,215,0,.28);background:rgba(255,215,0,.08);color:#ffd700}
.post-title{font-family:var(--font-display);font-size:clamp(24px,4vw,36px);line-height:1.25;margin:0;color:var(--text)}
.post-meta{display:flex;gap:12px;flex-wrap:wrap;margin:12px 0 22px;color:var(--text-mute);font-size:13px}
.post-meta a{color:var(--cyan);text-decoration:none}
.edit-note{margin:-10px 0 16px;color:var(--text-mute);font-size:12px;line-height:1.7}
.post-body,.hidden-reveal{word-break:break-word;line-height:1.9;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:24px}
.hidden-reveal{margin-top:14px;background:rgba(0,240,255,.035);border-style:dashed}
.attach-box{display:flex;align-items:center;gap:12px;margin:16px 0;padding:14px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px}
.attach-box a{color:var(--cyan);font-family:var(--font-mono);font-size:12px}
.hidden-box{margin:16px 0;padding:18px;border:1px dashed var(--border);border-radius:10px;background:rgba(0,240,255,.035);text-align:center;color:var(--text-dim)}
.interact-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:18px 0}
.interact-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface-2);color:var(--text-dim);font-family:var(--font-mono);font-size:12px}
.interact-btn:hover,.interact-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,240,255,.07)}
.interact-btn.downvoted{border-color:var(--magenta);color:var(--magenta);background:rgba(255,0,60,.07)}
.staff-bar{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0;padding:12px;border:1px dashed rgba(0,240,255,.18);border-radius:8px;background:rgba(0,240,255,.035)}
.staff-bar button{padding:7px 10px;border:1px solid var(--border);background:var(--bg);border-radius:6px;color:var(--text-dim);font-family:var(--font-mono);font-size:11px}
.staff-bar button:hover{border-color:var(--cyan);color:var(--cyan)}
.staff-bar .danger{border-color:rgba(255,0,60,.35);color:var(--magenta)}
.comment-mod{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.comment-mod button{padding:4px 8px;border:1px solid var(--border);background:var(--bg);border-radius:5px;color:var(--text-mute);font-family:var(--font-mono);font-size:10px}
.comment-mod button:hover{border-color:var(--cyan);color:var(--cyan)}
.comment-mod .danger{border-color:rgba(255,0,60,.35);color:var(--magenta)}
.guest-lock{margin:16px 0;padding:16px;border:1px dashed rgba(0,240,255,.22);border-radius:8px;background:linear-gradient(135deg,rgba(0,240,255,.06),rgba(157,0,255,.035));color:var(--text-dim);font-size:13px;line-height:1.8}
.guest-lock a{color:var(--cyan);text-decoration:none}
.reward-panel{margin:16px 0;padding:16px;border:1px solid rgba(255,215,0,.22);border-radius:10px;background:linear-gradient(135deg,rgba(255,215,0,.09),rgba(157,0,255,.04));box-shadow:0 0 28px rgba(255,215,0,.06)}
.reward-panel h3{font-family:var(--font-display);font-size:15px;color:#ffd700;margin-bottom:8px}
.reward-panel p{color:var(--text-dim);font-size:13px;line-height:1.7}
.reward-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:12px}
.reward-chip{padding:10px;border:1px solid rgba(255,255,255,.07);border-radius:8px;background:rgba(10,10,15,.42)}
.reward-chip span{display:block;color:var(--text-mute);font-family:var(--font-mono);font-size:10px;margin-bottom:4px}
.reward-chip strong{font-family:var(--font-display);color:var(--text);font-size:15px}
.lottery-panel{margin:16px 0;padding:16px;border:1px solid rgba(255,215,0,.24);border-radius:10px;background:linear-gradient(135deg,rgba(255,215,0,.08),rgba(0,240,255,.045));box-shadow:0 0 28px rgba(255,215,0,.055)}
.lottery-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.lottery-head h3{font-family:var(--font-display);font-size:16px;color:#ffd700;margin:0}
.lottery-status{padding:3px 8px;border:1px solid rgba(255,215,0,.28);border-radius:999px;color:#ffd700;background:rgba(255,215,0,.08);font-family:var(--font-mono);font-size:10px;white-space:nowrap}
.lottery-panel p{color:var(--text-dim);font-size:13px;line-height:1.7;margin:0 0 10px}
.lottery-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:12px}
.lottery-chip{padding:10px;border:1px solid rgba(255,255,255,.07);border-radius:8px;background:rgba(10,10,15,.42)}
.lottery-chip span{display:block;color:var(--text-mute);font-family:var(--font-mono);font-size:10px;margin-bottom:4px}
.lottery-chip strong{font-family:var(--font-display);color:var(--text);font-size:15px}
.lottery-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.lottery-actions button{padding:8px 12px;border:1px solid var(--border);border-radius:7px;background:var(--surface-2);color:var(--text-dim);font-family:var(--font-mono);font-size:12px}
.lottery-actions button:disabled{opacity:.45;cursor:not-allowed}
.lottery-actions button:hover{border-color:#ffd700;color:#ffd700;background:rgba(255,215,0,.08)}
.lottery-actions .danger{border-color:rgba(255,0,60,.35);color:var(--magenta)}
.lottery-winners{display:grid;gap:8px;margin-top:12px}
.lottery-winner{display:flex;justify-content:space-between;gap:10px;padding:8px 10px;border:1px solid rgba(255,255,255,.07);border-radius:7px;background:rgba(10,10,15,.34);color:var(--text-dim);font-size:12px}
.rate-stars{display:inline-flex;gap:3px;align-items:center}
.rate-star{font-size:20px;cursor:pointer;color:var(--text-mute);transition:all .15s}
.rate-star.active,.rate-star:hover{color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,.35)}
.comments-section{margin-top:26px}
.comments-section h2{font-family:var(--font-display);font-size:17px;color:var(--cyan);margin-bottom:14px}
.comment-form textarea{width:100%;min-height:90px;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-body);resize:vertical;outline:none}
.comment-form textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,240,255,.08)}
.comment-form.guest textarea{opacity:.72}
.comment-actions{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-top:9px;color:var(--text-mute);font-size:11px}
.comment-item{padding:15px 0;border-bottom:1px solid var(--border-2)}
.comment-head{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:5px}
.comment-author{font-family:var(--font-mono);font-size:12px;color:var(--cyan)}
.comment-time{font-size:11px;color:var(--text-mute)}
.comment-body{color:var(--text-dim);font-size:14px;line-height:1.7;white-space:pre-wrap}
.accepted{display:inline-flex;padding:2px 7px;border-radius:999px;border:1px solid rgba(127,255,0,.25);color:var(--green);font-size:10px;font-family:var(--font-mono)}
.reply-reward-badge{display:inline-flex;padding:2px 7px;border-radius:999px;border:1px solid rgba(127,255,0,.28);background:rgba(127,255,0,.08);color:var(--green);font-size:10px;font-family:var(--font-mono)}
.accept-btn{margin-left:auto;padding:5px 8px;border:1px solid rgba(127,255,0,.25);background:rgba(127,255,0,.06);border-radius:6px;color:var(--green);font-family:var(--font-mono);font-size:11px}
.comment-like{margin-top:8px;padding:4px 8px;border:1px solid var(--border);background:var(--surface-2);border-radius:6px;color:var(--text-mute);font-family:var(--font-mono);font-size:11px}
.comment-like:hover{border-color:var(--cyan);color:var(--cyan)}
.tip-modal,.report-modal{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.72);align-items:center;justify-content:center;padding:18px}
.tip-modal.show,.report-modal.show{display:flex}
.tip-card,.report-card{width:min(420px,100%);background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;box-shadow:0 20px 80px rgba(0,0,0,.45)}
.tip-card h3{font-family:var(--font-display);font-size:17px;color:var(--cyan);margin-bottom:12px}
.report-card h3{font-family:var(--font-display);font-size:17px;color:var(--magenta);margin-bottom:8px}
.report-card p{color:var(--text-mute);font-size:12px;line-height:1.7;margin-bottom:12px}
.report-card label{display:block;color:var(--text-dim);font-family:var(--font-mono);font-size:11px;margin:10px 0 5px}
.report-card select,.report-card textarea{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);outline:none}
.report-card select:focus,.report-card textarea:focus{border-color:var(--magenta);box-shadow:0 0 0 3px rgba(255,0,60,.08)}
.tip-presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.tip-preset{padding:8px 13px;border:1px solid var(--border);background:var(--surface-2);border-radius:7px;color:var(--text-dim);font-family:var(--font-mono)}
.tip-preset:hover,.tip-preset.active{border-color:#ffd700;color:#ffd700;background:rgba(255,215,0,.08)}
.tip-card input,.tip-card textarea{width:100%;padding:10px 12px;margin-bottom:10px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text)}
.tip-actions,.report-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:12px}
.msg{display:none;margin-top:12px;padding:10px 12px;border-radius:8px;font-size:13px}
.msg.show{display:block}
.msg.err{display:block;background:rgba(255,0,60,.1);border:1px solid rgba(255,0,60,.22);color:var(--magenta)}
.spinner{width:34px;height:34px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;margin:80px auto}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:720px){.post-shell{padding:18px}.post-page{padding-left:16px;padding-right:16px}.reward-grid,.lottery-grid{grid-template-columns:1fr 1fr}}
</style>
</head>

    <div class="tip-presets" id="tipPresets">
      <button class="tip-preset" type="button" data-amount="5">5</button>

<div class="report-modal" id="reportModal">
  <div class="report-card">
    <h3>举报内容</h3>
    <p>请尽量描述具体问题。恶意举报会被记录，正常举报会进入站长/版主审核队列。</p>
    <label>举报原因</label>
    <select id="reportReason">
      <option value="违法违规">违法违规</option>
      <option value="广告引流">广告引流</option>
      <option value="辱骂骚扰">辱骂骚扰</option>
      <option value="色情暴力">色情暴力</option>
      <option value="侵权转载">侵权转载</option>
      <option value="垃圾灌水">垃圾灌水</option>
      <option value="其他问题">其他问题</option>
    </select>
    <label>补充说明</label>
    <textarea id="reportDetail" rows="4" maxlength="800" placeholder="可选：补充链接、楼层、证据或说明"></textarea>

      <button class="btn-ghost" type="button" onclick="closeReport()">取消</button>
      <button class="btn-primary" type="button" onclick="submitReport()">提交举报</button>

    <div class="msg err" id="reportError"></div>

<script src="script.js"></script>
<script>
const postId = new URLSearchParams(location.search).get('id');
let postData = null;
let currentUser = null;
let interactState = { liked: false, downvoted: false, rated: false, score: 0 };
let tipAmount = 0;
let reportTarget = null;

const esc = (value) => window.NodeWeave.escapeHtml(value);
const apiJson = (...args) => window.NodeWeave.apiJson(...args);

function requirePostId() {
  if (postId) return true;
  document.getElementById('loading').innerHTML = '<p style="color:var(--magenta);text-align:center;padding:40px">缺少帖子 ID</p>';
  return false;
}

async function loadPost() {
  if (!requirePostId()) return;
  const json = await apiJson('/api/posts/' + encodeURIComponent(postId)).catch(() => null);
  if (!json || json.code !== 0) {
    document.getElementById('loading').innerHTML = '<p style="color:var(--text-mute);text-align:center;padding:40px">帖子不存在或暂时无法访问</p>';
    return;
  }
  postData = json.data;
  await loadInteractState();
  renderPost();
  loadComments();
}

function lotteryStatusLabel(status) {
  return ({
    active: '进行中',
    ready: '可开奖',
    drawn: '已开奖',
    cancelled: '已取消',
    none: '未开启',
  })[status] || status || '未开启';
}

function renderLotteryPanel(lottery) {
  if (!lottery?.enabled) return '';
  const winners = Array.isArray(lottery.winners) ? lottery.winners : [];
  const now = Date.now();
  const joinDisabled = lottery.status !== 'active' || (currentUser ? !lottery.can_join : false);
  const joinText = currentUser ? (lottery.joined ? '已参与' : '参与抽奖') : '登录后参与';
  const drawDisabled = !lottery.can_draw;
  const cancelDisabled = !lottery.can_cancel;
  const prizeTypeLabel = lottery.prize_type === 'coins' ? '论坛币' : '文字奖品';
  const dateText = lottery.status === 'active'
    ? `结束时间 ${lottery.end_at ? new Date(lottery.end_at).toLocaleString('zh-CN') : '-'}`
    : lottery.status === 'ready'
      ? `已到开奖时间 ${lottery.end_at ? new Date(lottery.end_at).toLocaleString('zh-CN') : ''}`
      : lottery.status === 'drawn'
        ? `开奖时间 ${lottery.drawn_at ? new Date(lottery.drawn_at).toLocaleString('zh-CN') : '-'}`
        : lottery.status === 'cancelled'
          ? '抽奖已取消'
          : '';
  const winnersHtml = winners.length ? `
    <div class="lottery-winners">
      ${winners.map((winner, index) => `
        <div class="lottery-winner">
          <span>#${index + 1} @${esc(winner.display_name || winner.username || '匿名用户')}</span>
          <strong>${Number(winner.prize_coin_amount || 0) > 0 ? `${Number(winner.prize_coin_amount || 0)} 论坛币` : '中奖'}</strong>
        </div>`).join('')}
    </div>` : '';
  return `
    <div class="lottery-panel" id="lotteryPanel">
      <div class="lottery-head">
        <h3>🎲 ${esc(lottery.prize_name || '帖子抽奖')}</h3>
        <span class="lottery-status">${lotteryStatusLabel(lottery.status)}</span>
      </div>
      ${lottery.prize_description ? `<p>${esc(lottery.prize_description)}</p>` : ''}
      <div class="lottery-grid">
        <div class="lottery-chip"><span>奖品类型</span><strong>${prizeTypeLabel}</strong></div>
        <div class="lottery-chip"><span>参与费用</span><strong>${Number(lottery.entry_fee || 0)} 论坛币</strong></div>
        <div class="lottery-chip"><span>中奖人数</span><strong>${Number(lottery.winner_count || 0)}</strong></div>
        <div class="lottery-chip"><span>参与人数</span><strong>${Number(lottery.participant_count || 0)}</strong></div>
        <div class="lottery-chip"><span>状态说明</span><strong>${esc(dateText || '等待开奖')}</strong></div>
        <div class="lottery-chip"><span>奖池总额</span><strong>${Number(lottery.prize_coin_total || 0)} 论坛币</strong></div>
        <div class="lottery-chip"><span>开始时间</span><strong>${lottery.start_at ? new Date(lottery.start_at).toLocaleString('zh-CN') : '-'}</strong></div>
        <div class="lottery-chip"><span>结束时间</span><strong>${lottery.end_at ? new Date(lottery.end_at).toLocaleString('zh-CN') : '-'}</strong></div>
      </div>
      <div class="lottery-actions">
        <button type="button" onclick="joinLottery()" ${joinDisabled ? 'disabled' : ''}>${esc(joinText)}</button>
        <button type="button" onclick="drawLottery()" ${drawDisabled ? 'disabled' : ''}>开奖</button>
        <button class="danger" type="button" onclick="cancelLottery()" ${cancelDisabled ? 'disabled' : ''}>取消抽奖</button>
      </div>
      ${winnersHtml}
    </div>`;
}

function renderPost() {
  const p = postData;
  const shell = document.getElementById('postShell');
  document.getElementById('loading').style.display = 'none';
  shell.style.display = '';
  document.title = (p.title || '内容详情') + ' // NodeWeave';
  document.getElementById('customStyles').textContent = p.custom_css || '';
  const tags = (p.tags || []).map(tag => `<span>#${esc(tag)}</span>`).join('');
  const date = new Date(p.created_at).toLocaleString('zh-CN');
  const lastReply = p.last_reply_at && p.last_reply_at !== p.created_at ? new Date(p.last_reply_at).toLocaleString('zh-CN') : '';
  const isStaff = currentUser && ['owner', 'admin', 'moderator'].includes(currentUser.role);
  const heat = Number(p.view_count || 0) + Number(p.like_count || 0) * 3 + Number(p.comment_count || 0) * 5 + Number(p.tip_total || 0) * 2 + Number(p.reply_reward_total || 0);
  const statusTags = [];
  if (p.is_pinned) statusTags.push('<span class="status-tag pin">置顶</span>');
  if (p.is_featured) statusTags.push('<span class="status-tag feature">精华</span>');
  if (heat >= 20) statusTags.push('<span class="status-tag pin">热帖</span>');
  if (Number(p.reply_reward_remaining || 0) > 0) statusTags.push(`<span class="status-tag reward">回帖红包 ${Number(p.reply_reward_remaining || 0)} / ${Number(p.reply_reward_total || 0)}</span>`);
  if (p.bounty && !p.accepted_answer_id) statusTags.push(`<span class="status-tag reward">悬赏 ${p.bounty}</span>`);
  if (p.accepted_answer_id) statusTags.push('<span class="status-tag feature">已解决</span>');
  if (p.lottery?.enabled) statusTags.push(`<span class="status-tag reward">抽奖 ${lotteryStatusLabel(p.lottery.status)}</span>`);
  if (p.is_ai_generated) statusTags.push('<span class="status-tag">AI 辅助</span>');
  const canEdit = !!p.can_edit || !!isStaff;
  let editNote = '';
  if (p.edit_unrestricted || isStaff) {
    editNote = '<div class="edit-note">管理组编辑模式：不受普通用户编辑时限限制。</div>';
  } else if (currentUser && p.author_id === currentUser.id && p.edit_window_applies) {
    if (p.edit_window_expired) {
      editNote = `<div class="edit-note">编辑窗口已结束：普通用户发布后 ${p.edit_window_minutes || 30} 分钟内可自由修改，之后请联系版主或管理员。</div>`;
    } else if (p.can_edit_until) {
      editNote = `<div class="edit-note">你可在 ${new Date(p.can_edit_until).toLocaleString('zh-CN')} 前自由修改此内容。</div>`;
    }
  }
  const attachment = p.attachment_url ? `
    <div class="attach-box">
      <span style="font-size:24px">📎</span>
      <div style="flex:1">
        <strong>${esc(p.attachment_name || '附件')}</strong>
        <div><a href="${esc(p.attachment_url)}" target="_blank" rel="noopener">下载 / 查看附件</a></div>
      </div>
    </div>` : '';
  let hidden = '';
  if (p.hidden_content) {
    if (p.visibility === 'timed' && p.visible_after && p.visible_after > Date.now()) {
      hidden = `<div class="hidden-box">⏰ 隐藏内容将在 ${new Date(p.visible_after).toLocaleString('zh-CN')} 后公开</div>`;
    } else if (p.visibility === 'reply') {
      hidden = `<div class="hidden-box" id="hiddenBox">🔒 回复后可见隐藏内容<br><button class="btn-primary" type="button" style="margin-top:10px" onclick="revealHidden()">我已回复，查看内容</button></div>`;
    } else {
      hidden = `<div class="hidden-reveal">${esc(p.hidden_content)}</div>`;
    }
  }
  const stars = Array.from({ length: 5 }, (_, index) => {
    const score = index + 1;
    return `<span class="rate-star${score <= interactState.score ? ' active' : ''}" onclick="ratePost(${score})">★</span>`;
  }).join('');
  const guestLock = p.content_limited ? `
    <div class="guest-lock">
      游客模式只展示前 ${p.guest_limit?.content_preview_chars || 220} 字。登录后可查看完整正文、隐藏内容、评论互动、点赞评分和打赏。
      <a href="login.html?redirect=${encodeURIComponent('post.html?id=' + postId)}">去登录</a>
    </div>` : '';
  const guestCommentAttrs = currentUser ? '' : 'readonly onclick="requireLoginAction()"';
  const commentButtonText = currentUser ? '发表评论' : '登录后评论';
  const staffBar = isStaff ? `
    <div class="staff-bar">
      <button type="button" onclick="moderatePost('pin', ${p.is_pinned ? 0 : 1})">${p.is_pinned ? '取消置顶' : '置顶'}</button>
      <button type="button" onclick="moderatePost('feature', ${p.is_featured ? 0 : 1})">${p.is_featured ? '取消精华' : '加精'}</button>
      <button type="button" onclick="moderatePost('lock', ${p.is_locked ? 0 : 1})">${p.is_locked ? '解锁' : '锁帖'}</button>
      <button type="button" onclick="moderatePost('hide', ${p.is_hidden ? 0 : 1})">${p.is_hidden ? '恢复显示' : '隐藏'}</button>
      <button type="button" onclick="location.href='editor.html?edit=${esc(p.id)}'">编辑全文</button>
      <button class="danger" type="button" onclick="deletePost()">删除</button>
    </div>` : '';
  const rewardPanel = Number(p.reply_reward_total || 0) > 0 ? `
    <div class="reward-panel">
      <h3>🧧 回帖红包池</h3>
      <p>首次有效回复可随机领取一次论坛币；楼主自己回复不领取，红包余额发完即止。</p>
      <div class="reward-grid">
        <div class="reward-chip"><span>总额</span><strong>${Number(p.reply_reward_total || 0)}</strong></div>
        <div class="reward-chip"><span>剩余</span><strong>${Number(p.reply_reward_remaining || 0)}</strong></div>
        <div class="reward-chip"><span>随机范围</span><strong>${Number(p.reply_reward_min || 0)}-${Number(p.reply_reward_max || 0)}</strong></div>
        <div class="reward-chip"><span>已领取</span><strong>${Number(p.reply_reward_claimed_count || 0)}</strong></div>
      </div>
    </div>` : '';
  const lotteryPanel = renderLotteryPanel(p.lottery);
  shell.innerHTML = `
    <div class="post-status-tags">${statusTags.join('')}</div>
    <div class="post-tags">${tags || `<span>${p.type === 'blog' ? '博客' : '帖子'}</span>`}</div>
    <h1 class="post-title">${esc(p.title)}</h1>
    <div class="post-meta">
      <a href="profile.html?id=${esc(p.author_id)}">@${esc(p.display_name || p.username || '匿名用户')}</a>
      <span>${date}</span>
      ${lastReply ? `<span>最后回复 ${lastReply}</span>` : ''}
      <span>${p.view_count || 0} 浏览</span>
      <span>${p.board_id || 'general'}</span>
      ${p.bounty ? `<span style="color:#ffd700">悬赏 ${p.bounty} 论坛币</span>` : ''}
      ${canEdit ? `<a href="editor.html?edit=${esc(p.id)}">编辑</a>` : ''}
    </div>
    ${editNote}
    ${staffBar}
    ${rewardPanel}
    ${lotteryPanel}
    <div id="postBodyWrap">
      <div class="post-body nw-rich-content">${window.NodeWeave.renderRichText(p.content)}</div>
    </div>
    ${guestLock}
    ${attachment}
    ${hidden}
    <div class="interact-bar">
      <button class="interact-btn${interactState.liked ? ' active' : ''}" onclick="toggleLike()">👍 <span>${p.like_count || 0}</span></button>
      <button class="interact-btn${interactState.downvoted ? ' downvoted' : ''}" onclick="toggleDownvote()">👎 <span>${p.downvote_count || 0}</span></button>
      <button class="interact-btn" onclick="openTip()">打赏 <span>${p.tip_count || 0}</span></button>
      <button class="interact-btn" onclick="openReport('post','${esc(p.id)}')">举报</button>
      <span class="rate-stars">${stars}</span>
      <span style="color:#ffd700;font-family:var(--font-mono);font-size:12px">${p.rating_avg ? Number(p.rating_avg).toFixed(1) : '-'} (${p.rating_count || 0})</span>
    </div>
    <section class="comments-section">
      <h2>评论 <span id="commentCount">${p.comment_count || 0}</span></h2>
      <div class="comment-form${currentUser ? '' : ' guest'}">
        <textarea id="commentInput" placeholder="${currentUser ? '写下你的评论...' : '游客可阅读评论，登录后才能回复互动。'}" ${guestCommentAttrs}></textarea>
        <div class="comment-actions">
          <span>${currentUser ? '以 ' + (currentUser.display_name || currentUser.username) + ' 身份评论' : '登录后可评论、点赞、打赏'}</span>
          <button class="btn-primary" type="button" onclick="submitComment()">${commentButtonText}</button>
        </div>
      </div>
      <div id="commentsList"><div class="spinner" style="margin:28px auto"></div></div>
    </section>`;
  const bodyWrap = document.getElementById('postBodyWrap');
  if (bodyWrap) window.NodeWeave.renderLinkPreviews(bodyWrap, p.content);
}

async function loadInteractState() {
  const json = await apiJson('/api/posts/' + encodeURIComponent(postId) + '/like-status').catch(() => null);
  if (json?.code === 0) interactState = json.data;
}

async function requireLoginAction() {
  currentUser = await window.NodeWeave.currentUser(true);
  if (currentUser) return true;
  location.href = 'login.html?redirect=' + encodeURIComponent('post.html?id=' + postId);
  return false;
}

async function toggleLike() {
  if (!(await requireLoginAction())) return;
  const json = await apiJson('/api/posts/' + encodeURIComponent(postId) + '/like', { method: 'POST' });
  if (json.code === 0) loadPost();
  else alert(json.msg || '操作失败');
}

async function toggleDownvote() {
  if (!(await requireLoginAction())) return;
  const json = await apiJson('/api/posts/' + encodeURIComponent(postId) + '/downvote', { method: 'POST' });
  if (json.code === 0) loadPost();
  else alert(json.msg || '操作失败');
}

async function ratePost(score) {
  if (!(await requireLoginAction())) return;
  const json = await apiJson('/api/posts/' + encodeURIComponent(postId) + '/rate', {
    method: 'POST',
    body: JSON.stringify({ score }),
  });
  if (json.code === 0) {
    interactState.score = score;
    loadPost();
  } else {
    alert(json.msg || '评分失败');
  }
}

function openTip() {
  document.getElementById('tipModal').classList.add('show');
  document.getElementById('tipError').classList.remove('show');
  document.getElementById('tipCustom').style.display = 'none';
  document.querySelectorAll('.tip-preset').forEach(btn => btn.classList.remove('active'));
  tipAmount = 0;
}

function closeTip() {
  document.getElementById('tipModal').classList.remove('show');
}

async function sendTip() {
  if (!(await requireLoginAction())) return;
  const amount = tipAmount || parseInt(document.getElementById('tipCustom').value || '0', 10);
  if (!amount || amount < 1) {
    document.getElementById('tipError').textContent = '请输入有效打赏金额';
    document.getElementById('tipError').classList.add('show');
    return;
  }
  const json = await apiJson('/api/posts/' + encodeURIComponent(postId) + '/tip', {
    method: 'POST',
    body: JSON.stringify({ amount, message: document.getElementById('tipMessage').value }),
  });
  if (json.code !== 0) {
    document.getElementById('tipError').textContent = json.msg || '打赏失败';
    document.getElementById('tipError').classList.add('show');
    return;
  }
  closeTip();
  loadPost();
}

async function joinLottery() {
  if (!(await requireLoginAction())) return;
  const json = await apiJson('/api/lotteries/' + encodeURIComponent(postId) + '/join', { method: 'POST' });
  if (json.code !== 0) {
    alert(json.msg || '参与抽奖失败');
    return;
  }
  loadPost();
}

async function drawLottery() {
  if (!(await requireLoginAction())) return;
  if (!confirm('确定现在开奖吗？')) return;
  const json = await apiJson('/api/lotteries/' + encodeURIComponent(postId) + '/draw', { method: 'POST' });
  if (json.code !== 0) {
    alert(json.msg || '开奖失败');
    return;
  }
  loadPost();
}

async function cancelLottery() {
  if (!(await requireLoginAction())) return;
  if (!confirm('确定取消这次抽奖吗？参与费用会退回。')) return;
  const json = await apiJson('/api/lotteries/' + encodeURIComponent(postId) + '/cancel', { method: 'POST' });
  if (json.code !== 0) {
    alert(json.msg || '取消失败');
    return;
  }
  loadPost();
}

function revealHidden() {
  const box = document.getElementById('hiddenBox');
  if (box && postData?.hidden_content) {
    box.outerHTML = `<div class="hidden-reveal">${esc(postData.hidden_content)}</div>`;
  }
}

async function loadComments() {
  const json = await apiJson('/api/comments?post_id=' + encodeURIComponent(postId)).catch(() => null);
  const list = document.getElementById('commentsList');
  if (!list) return;
  if (!json || json.code !== 0) {
    list.innerHTML = '<div class="hidden-box">评论暂时加载失败</div>';
    return;
  }
  if (!json.data.comments.length) {
    list.innerHTML = '<div class="hidden-box">还没有评论，来坐沙发吧。</div>';
    return;
  }
  list.innerHTML = json.data.comments.map(comment => {
    const canAccept = currentUser && postData && currentUser.id === postData.author_id && comment.author_id !== postData.author_id && !postData.accepted_answer_id;
    const isStaff = currentUser && ['owner', 'admin', 'moderator'].includes(currentUser.role);
    return `<div class="comment-item" id="comment-${esc(comment.id)}">
      <div class="comment-head">
        <span class="comment-author">@${esc(comment.display_name || comment.username || '匿名用户')}</span>
        <span class="comment-time">${new Date(comment.created_at).toLocaleString('zh-CN')}</span>
        ${comment.is_accepted ? '<span class="accepted">已采纳</span>' : ''}
        ${Number(comment.reply_reward_amount || 0) > 0 ? `<span class="reply-reward-badge">红包 +${Number(comment.reply_reward_amount || 0)}</span>` : ''}
        ${canAccept ? `<button class="accept-btn" type="button" onclick="acceptAnswer('${esc(comment.id)}')">采纳并发放悬赏</button>` : ''}
      </div>
      <div class="comment-body">${esc(comment.content)}</div>
      <button class="comment-like" type="button" onclick="likeComment('${esc(comment.id)}')">👍 ${comment.like_count || 0}</button>
      <button class="comment-like" type="button" onclick="openReport('comment','${esc(comment.id)}')">举报</button>
      ${isStaff ? `<div class="comment-mod">
        <button type="button" onclick="editComment('${esc(comment.id)}')">编辑评论</button>
        <button type="button" onclick="hideComment('${esc(comment.id)}')">隐藏评论</button>
        <button class="danger" type="button" onclick="deleteComment('${esc(comment.id)}')">删除评论</button>
      </div>` : ''}
    </div>`;
  }).join('');
}

async function submitComment() {
  if (!(await requireLoginAction())) return;
  const input = document.getElementById('commentInput');
  if (!input) return;
  const content = input.value.trim();
  if (!content) return;
  const json = await apiJson('/api/comments', {
    method: 'POST',
    body: JSON.stringify({ post_id: postId, content }),
  });
  if (json.code !== 0) {
    alert(json.msg || '评论失败');
    return;
  }
  input.value = '';
  if (json.data?.reply_reward?.amount) {
    alert(`手气不错！你获得 ${json.data.reply_reward.amount} 论坛币回帖红包。`);
  }
  await loadPost();
}

async function acceptAnswer(commentId) {
  if (!(await requireLoginAction())) return;
  const json = await apiJson('/api/posts/' + encodeURIComponent(postId) + '/accept', {
    method: 'POST',
    body: JSON.stringify({ comment_id: commentId }),
  });
  if (json.code !== 0) {
    alert(json.msg || '采纳失败');
    return;
  }
  loadPost();
}

async function moderatePost(action, value) {
  if (!(await requireLoginAction())) return;
  const json = await apiJson('/api/posts/' + encodeURIComponent(postId) + '/moderate', {
    method: 'POST',
    body: JSON.stringify({ action, value }),
  });
  if (json.code !== 0) {
    alert(json.msg || '操作失败');
    return;
  }
  loadPost();
}

async function deletePost() {
  if (!(await requireLoginAction())) return;
  if (!confirm('确定删除这篇内容？删除后不可恢复。')) return;
  const json = await apiJson('/api/posts/' + encodeURIComponent(postId), { method: 'DELETE' });
  if (json.code !== 0) {
    alert(json.msg || '删除失败');
    return;
  }
  location.href = postData?.type === 'blog' ? 'blog.html' : 'boards.html';
}

async function editComment(commentId) {
  if (!(await requireLoginAction())) return;
  const next = prompt('输入新的评论内容：');
  if (!next || !next.trim()) return;
  const json = await apiJson('/api/comments/' + encodeURIComponent(commentId), {
    method: 'PUT',
    body: JSON.stringify({ content: next.trim() }),
  });
  if (json.code !== 0) {
    alert(json.msg || '编辑失败');
    return;
  }
  loadComments();
}

async function hideComment(commentId) {
  if (!(await requireLoginAction())) return;
  const json = await apiJson('/api/comments/' + encodeURIComponent(commentId) + '/moderate', {
    method: 'POST',
    body: JSON.stringify({ action: 'hide', value: 1 }),
  });
  if (json.code !== 0) {
    alert(json.msg || '隐藏失败');
    return;
  }
  loadComments();
}

async function deleteComment(commentId) {
  if (!(await requireLoginAction())) return;
  if (!confirm('确定删除这条评论？')) return;
  const json = await apiJson('/api/comments/' + encodeURIComponent(commentId), { method: 'DELETE' });
  if (json.code !== 0) {
    alert(json.msg || '删除失败');
    return;
  }
  loadPost();
}

async function likeComment(commentId) {
  if (!(await requireLoginAction())) return;
  const json = await apiJson('/api/comments/' + encodeURIComponent(commentId) + '/like', { method: 'POST' });
  if (json.code !== 0) {
    alert(json.msg || '点赞失败');
    return;
  }
  loadComments();
}

async function openReport(itemType, itemId) {
  if (!(await requireLoginAction())) return;
  reportTarget = { item_type: itemType, item_id: itemId };
  document.getElementById('reportReason').value = '违法违规';
  document.getElementById('reportDetail').value = '';
  document.getElementById('reportError').classList.remove('show');
  document.getElementById('reportModal').classList.add('show');
}

function closeReport() {
  document.getElementById('reportModal').classList.remove('show');
  reportTarget = null;
}

async function submitReport() {
  if (!reportTarget) return;
  const json = await apiJson('/api/reports', {
    method: 'POST',
    body: JSON.stringify({
      ...reportTarget,
      reason: document.getElementById('reportReason').value,
      detail: document.getElementById('reportDetail').value,
    }),
  });
  if (json.code !== 0) {
    document.getElementById('reportError').textContent = json.msg || '举报提交失败';
    document.getElementById('reportError').classList.add('show');
    return;
  }
  closeReport();
  alert(json.data?.message || '举报已提交');
}

document.addEventListener('DOMContentLoaded', async () => {
  currentUser = await window.NodeWeave.currentUser(true);
  if (requirePostId()) loadPost();
  document.getElementById('tipPresets').addEventListener('click', (event) => {
    const button = event.target.closest('.tip-preset');
    if (!button) return;
    document.querySelectorAll('.tip-preset').forEach(btn => btn.classList.remove('active'));
    button.classList.add('active');
    tipAmount = parseInt(button.dataset.amount || '0', 10);
    document.getElementById('tipCustom').style.display = tipAmount === 0 ? '' : 'none';
  });
  document.getElementById('tipCustom').addEventListener('input', (event) => {
    tipAmount = parseInt(event.target.value || '0', 10) || 0;
  });
});
</script>
</body>
</html>
