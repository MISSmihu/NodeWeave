<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成就殿堂 // NodeWeave</title>
<link rel="stylesheet" href="style.css">
<script src="js/badge-image-map.js"></script>
<style>
.ach-page{max-width:1120px;margin:0 auto;padding:72px 24px 100px}
.ach-head{display:flex;justify-content:space-between;gap:20px;align-items:flex-end;margin-bottom:26px}
.ach-eyebrow{font-family:var(--font-mono);font-size:12px;color:var(--cyan);letter-spacing:.12em;margin-bottom:8px}
.ach-title{font-family:var(--font-display);font-size:30px;color:var(--text);line-height:1.2}
.ach-sub{font-size:13px;color:var(--text-mute);max-width:560px;margin-top:8px}
.ach-summary{display:flex;gap:12px;flex-wrap:wrap}
.ach-pill{background:rgba(0,240,255,.07);border:1px solid var(--border);border-radius:999px;padding:8px 12px;font-family:var(--font-mono);font-size:12px;color:var(--text-dim)}
.ach-pill strong{color:var(--cyan);font-family:var(--font-display);font-size:14px}
.ach-tabs{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 22px}
.ach-tab{padding:8px 14px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);border-radius:999px;font-family:var(--font-mono);font-size:12px}
.ach-tab.active{color:var(--cyan);border-color:var(--cyan);box-shadow:0 0 18px rgba(0,240,255,.16)}
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.ach-card{position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(18,18,30,.96),rgba(10,10,15,.96));border:1px solid var(--border);border-radius:16px;padding:20px;transition:transform .2s,border-color .2s,box-shadow .2s}
.ach-card::before{content:'';position:absolute;inset:-40% -30% auto auto;width:160px;height:160px;background:radial-gradient(circle,rgba(0,240,255,.18),transparent 65%);pointer-events:none}
.ach-card:hover{transform:translateY(-3px);border-color:rgba(0,240,255,.45);box-shadow:0 18px 40px rgba(0,0,0,.25)}
.ach-card.locked{opacity:.72}
.ach-card.locked .ach-icon img{filter:grayscale(.86) saturate(.45) opacity(.42);transform:scale(.92)}
.ach-card.done{border-color:rgba(127,255,0,.36)}
.ach-icon{position:relative;width:76px;height:76px;margin-bottom:14px;display:flex;align-items:center;justify-content:center;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid var(--border-2)}
.ach-icon img{width:70px;height:70px;object-fit:contain;filter:drop-shadow(0 0 12px rgba(0,240,255,.24))}
.ach-lock{position:absolute;right:-6px;bottom:-6px;width:28px;height:28px;display:grid;place-items:center;border-radius:999px;background:rgba(5,5,10,.9);border:1px solid var(--border);font-size:14px;color:var(--text-mute);box-shadow:0 0 16px rgba(0,0,0,.45)}
.ach-card.done .ach-lock{display:none}
.ach-name{font-family:var(--font-display);font-size:15px;color:var(--text);margin-bottom:6px}
.ach-desc{font-size:12px;color:var(--text-dim);min-height:38px;line-height:1.55}
.ach-meta{display:flex;justify-content:space-between;gap:10px;margin:14px 0 8px;font-family:var(--font-mono);font-size:11px;color:var(--text-mute)}
.ach-reward{color:#ffd700}
.ach-progress{height:7px;background:var(--surface-2);border-radius:999px;overflow:hidden;border:1px solid var(--border-2)}
.ach-progress i{display:block;height:100%;width:var(--p);background:linear-gradient(90deg,var(--cyan),var(--green));box-shadow:0 0 14px rgba(0,240,255,.35)}
.ach-status{margin-top:10px;font-size:12px;color:var(--text-mute)}
.ach-card.done .ach-status{color:var(--green)}
.empty{grid-column:1/-1;text-align:center;color:var(--text-mute);padding:54px 20px;border:1px dashed var(--border);border-radius:16px;background:rgba(255,255,255,.03)}
@media (max-width:768px){.ach-head{display:block}.ach-summary{margin-top:16px}}
</style>
</head>
<body>
<div class="bg-grid"></div><div class="bg-scanlines"></div><div class="bg-glow"></div>
<header class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-mark" aria-hidden="true"></span><span class="logo-text">Node<span class="x">Weave</span></span><span class="logo-sub">// ACHIEVEMENTS</span></a>
    <div class="nav-actions"><a href="index.html" class="btn-ghost" style="border:1px solid var(--border);padding:8px 16px">返回</a></div>
  </div>
</header>
<main class="ach-page">
  <section class="ach-head">
    <div>
      <div class="ach-eyebrow">AUTO BADGE SYSTEM</div>
      <h1 class="ach-title">成就殿堂</h1>
      <p class="ach-sub">达成条件后系统会自动颁发成就、徽章和论坛币奖励；可在徽章商城装备已获得徽章。</p>
    </div>
    <div class="ach-summary">
      <span class="ach-pill">已解锁 <strong id="doneCount">--</strong></span>
      <span class="ach-pill">总成就 <strong id="totalCount">--</strong></span>
      <span class="ach-pill">完成率 <strong id="doneRate">--</strong></span>
    </div>
  </section>
  <div class="ach-tabs" id="achTabs"></div>
  <div class="ach-grid" id="achGrid"><div class="empty">加载中...</div></div>
</main>
<script src="script.js"></script>
<script>
var allAchievements = [];
var activeCategory = 'all';
var categoryNames = { all:'全部', achievement:'成就', reputation:'声望', content:'内容', social:'社交', streak:'签到', general:'通用' };

async function init() {
  var grid = document.getElementById('achGrid');
  try {
    var api = window.NodeWeave && window.NodeWeave.api ? window.NodeWeave.api : function(path, options){ return fetch(path, options); };
    var r = await api('/api/achievements/mine', { credentials:'include' });
    var j = await r.json();
    if (j.code !== 0) {
      grid.innerHTML = '<div class="empty">请先登录查看成就进度。</div>';
      return;
    }
    allAchievements = j.data || [];
    renderTabs();
    renderSummary();
    renderGrid();
  } catch (e) {
    grid.innerHTML = '<div class="empty">成就系统暂时不可达，请稍后刷新。</div>';
  }
}

function renderSummary() {
  var total = allAchievements.length;
  var done = allAchievements.filter(function(a){ return a.completed; }).length;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('doneRate').textContent = total ? Math.round(done / total * 100) + '%' : '--';
}

function renderTabs() {
  var cats = ['all'];
  allAchievements.forEach(function(a){
    var cat = a.category || 'general';
    if (cats.indexOf(cat) < 0) cats.push(cat);
  });
  document.getElementById('achTabs').innerHTML = cats.map(function(cat){
    return '<button class="ach-tab'+(cat===activeCategory?' active':'')+'" data-cat="'+h(cat)+'">'+h(categoryNames[cat] || cat)+'</button>';
  }).join('');
}

function renderGrid() {
  var list = allAchievements.filter(function(a){ return activeCategory === 'all' || (a.category || 'general') === activeCategory; });
  var grid = document.getElementById('achGrid');
  if (!list.length) { grid.innerHTML = '<div class="empty">这个分类还没有成就。</div>'; return; }
  grid.innerHTML = list.map(function(a){
    var target = Math.max(1, Number(a.condition_value || 1));
    var progress = Number(a.user_progress || 0);
    var percent = Math.min(100, Number(a.progress_percent || Math.round(Math.min(progress, target) / target * 100)));
    var icon = a.completed ? badgeImg(a.badge_id || a.id, '') : '<span class="ach-lock">🔒</span>';
    icon = badgeImg(a.badge_id || a.id, '') + '<span class="ach-lock">&#128274;</span>';
    return '<article class="ach-card '+(a.completed?'done':'locked')+'">'+
      '<div class="ach-icon">'+icon+'</div>'+
      '<div class="ach-name">'+h(a.name)+'</div>'+
      '<div class="ach-desc">'+h(a.description || a.condition_label || '')+'</div>'+
      '<div class="ach-meta"><span>'+h(a.condition_label || '达成条件')+'</span><span class="ach-reward">'+(a.coin_reward ? '+'+a.coin_reward+' 币' : '徽章')+'</span></div>'+
      '<div class="ach-progress" style="--p:'+percent+'%"><i></i></div>'+
      '<div class="ach-status">'+(a.completed ? '已解锁' : ('进度 '+progress+' / '+target))+'</div>'+
    '</article>';
  }).join('');
}

document.getElementById('achTabs').addEventListener('click', function(event){
  var btn = event.target.closest('[data-cat]');
  if (!btn) return;
  activeCategory = btn.dataset.cat;
  renderTabs();
  renderGrid();
});

function h(s){var d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML}
init();
</script>
</body>
</html>
