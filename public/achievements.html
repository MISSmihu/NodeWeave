<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成就殿堂 // NodeWeave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="js/badge-image-map.js"></script>
<style>
.ach-page{max-width:800px;margin:0 auto;padding:80px 24px 100px}
.ach-page h2{font-family:var(--font-display);font-size:20px;color:var(--cyan);margin-bottom:4px}
.ach-page .sub{font-size:13px;color:var(--text-mute);margin-bottom:24px}
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.ach-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:22px 18px;text-align:center;transition:all .2s}
.ach-card.locked{opacity:.5}
.ach-card .icon{font-size:40px;margin-bottom:10px;display:block}
.ach-card .name{font-family:var(--font-display);font-size:14px;color:var(--text);margin-bottom:6px}
.ach-card .desc{font-size:12px;color:var(--text-dim);margin-bottom:12px;line-height:1.4}
.ach-card .condition{font-family:var(--font-mono);font-size:11px;color:var(--text-mute);padding:6px 12px;background:var(--bg);border-radius:4px;display:inline-block}
.ach-card .reward{font-size:12px;color:#ffd700;margin-top:8px}
</style>
</head>
<body>
<div class="bg-grid"></div><div class="bg-scanlines"></div><div class="bg-glow"></div>
<header class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-mark">◈</span><span class="logo-text">Node<span class="x">Weave</span></span><span class="logo-sub">// ACHIEVEMENTS</span></a>
    <div class="nav-actions"><a href="index.html" class="btn-ghost" style="border:1px solid var(--border);padding:8px 16px">← 返回</a></div>
  </div>
</header>
<main class="ach-page">
  <h2>成就殿堂</h2>
  <p class="sub">完成挑战解锁成就，获得论坛币奖励</p>
  <div class="ach-grid" id="achGrid">加载中...</div>
</main>
<script>
async function init() {
  var grid = document.getElementById('achGrid');
  try {
    var r = await fetch('/api/achievements/mine');
    var j = await r.json();
    if (j.code!==0) { grid.innerHTML='<p style="color:var(--text-mute);text-align:center;padding:40px">请先登录查看成就</p>'; return; }
    grid.innerHTML = j.data.map(function(a){
      return '<div class="ach-card'+(a.completed?'':' locked')+'">'+
        '<span class="ach-icon">'+(a.completed?badgeImg(a.badge_id||a.id,''):'🔒')+'</span>'+
        '<div class="name">'+h(a.name)+'</div>'+
        '<div class="desc">'+h(a.description)+'</div>'+
        '<div class="condition">'+a.condition_label+'</div>'+
        (a.coin_reward>0?'<div class="reward">奖励 Ⓝ '+a.coin_reward+'</div>':'')+
      '</div>';
    }).join('');
  } catch(e) {
    grid.innerHTML='<p style="color:var(--text-mute);text-align:center;padding:40px">请先启动后端服务</p>';
  }
}
function h(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
init();
</script>
</body>
</html>
