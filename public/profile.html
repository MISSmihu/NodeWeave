<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人主页 // NodeWeave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="js/badge-image-map.js"></script>
<style id="customStyles"></style>
<style>
.canvas-bg{position:fixed;inset:0;width:100%;height:100%;z-index:-1;pointer-events:none}
.profile-bg-layer{position:fixed;inset:0;z-index:-2;pointer-events:none;background:transparent;background-size:cover;background-position:center;opacity:.82}
.profile-page{max-width:920px;margin:0 auto;padding:84px 24px 110px;position:relative;z-index:1}
.profile-card{background:rgba(18,18,30,.78);border:1px solid var(--border);border-radius:16px;padding:26px;box-shadow:0 22px 80px rgba(0,0,0,.24)}
.profile-head{display:flex;gap:20px;align-items:center;flex-wrap:wrap;margin-bottom:24px}
.profile-avatar{width:86px;height:86px;border-radius:50%;border:3px solid var(--cyan);display:grid;place-items:center;font-family:var(--font-display);font-size:34px;color:var(--bg);box-shadow:var(--glow-cyan)}
.profile-info h1{font-family:var(--font-display);font-size:26px;margin:0;color:var(--text)}
.profile-info .username{font-family:var(--font-mono);font-size:13px;color:var(--text-mute);margin:4px 0 8px}
.profile-info .bio{color:var(--text-dim);line-height:1.7;max-width:620px}
.level-badge{display:inline-flex;margin-top:10px;padding:5px 11px;border-radius:999px;border:1px solid var(--border);font-family:var(--font-mono);font-size:12px;cursor:pointer;background:rgba(0,240,255,.05)}
.stats-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin:20px 0}
.stat-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:15px;text-align:center}
.stat-box .num{font-family:var(--font-display);font-size:22px;color:var(--cyan)}
.stat-box .label{font-family:var(--font-mono);font-size:11px;color:var(--text-mute);margin-top:4px}
.asset-panel{display:grid;grid-template-columns:1.1fr .9fr .9fr;gap:14px;margin:20px 0}
.asset-card{background:linear-gradient(135deg,rgba(0,240,255,.055),rgba(157,0,255,.035)),var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px}
.asset-card h3{font-family:var(--font-display);font-size:14px;color:var(--cyan);margin-bottom:10px}
.progress-bar{height:9px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;border:1px solid var(--border)}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--purple));box-shadow:var(--glow-cyan)}
.perm-list{display:grid;gap:7px;margin-top:10px}
.perm-list span{font-size:12px;color:var(--text-dim);line-height:1.55}
.perm-list span::before{content:'✓ ';color:var(--green)}
.asset-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;font-family:var(--font-mono);font-size:11px;color:var(--text-mute)}
.section-title{font-family:var(--font-display);font-size:16px;color:var(--cyan);margin:26px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.badge-wall{display:flex;flex-wrap:wrap;gap:12px}
.badge-item{width:58px;height:58px;border-radius:12px;border:1px solid var(--border);background:var(--bg);display:grid;place-items:center}
.badge-item img{width:52px;height:52px;object-fit:contain}
.badge-fallback{font-size:26px}
.post-list{display:grid;gap:10px}
.post-item{display:block;text-decoration:none;color:inherit;padding:14px 15px;background:var(--bg);border:1px solid var(--border);border-radius:10px}
.post-item:hover{border-color:var(--cyan)}
.post-title{font-size:15px;color:var(--text);margin-bottom:5px}
.post-meta{font-family:var(--font-mono);font-size:11px;color:var(--text-mute)}
.customize-panel{display:none;margin-top:20px;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:18px}
.customize-panel.show{display:block}
.customize-panel h3{font-family:var(--font-display);font-size:15px;color:var(--cyan);margin-bottom:12px}
.customize-panel textarea{width:100%;min-height:120px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-mono);font-size:12px;padding:10px;resize:vertical}
.bg-preview{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}
.bg-preset{width:44px;height:44px;border-radius:10px;border:2px solid transparent;cursor:pointer}
.bg-preset.active{border-color:var(--cyan);box-shadow:var(--glow-cyan)}
.empty{color:var(--text-mute);font-size:13px;padding:14px;border:1px dashed var(--border);border-radius:10px}
.report-modal{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.72);align-items:center;justify-content:center;padding:18px}
.report-modal.show{display:flex}
.report-card{width:min(420px,100%);background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;box-shadow:0 20px 80px rgba(0,0,0,.45)}
.report-card h3{font-family:var(--font-display);font-size:17px;color:var(--magenta);margin-bottom:8px}
.report-card p{color:var(--text-mute);font-size:12px;line-height:1.7;margin-bottom:12px}
.report-card label{display:block;color:var(--text-dim);font-family:var(--font-mono);font-size:11px;margin:10px 0 5px}
.report-card select,.report-card textarea{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);outline:none}
.report-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:12px}
.msg{display:none;margin-top:12px;padding:10px 12px;border-radius:8px;font-size:13px}
.msg.show{display:block}
.msg.err{display:block;background:rgba(255,0,60,.1);border:1px solid rgba(255,0,60,.22);color:var(--magenta)}
@media(max-width:720px){.stats-row{grid-template-columns:repeat(2,1fr)}.asset-panel{grid-template-columns:1fr}.profile-card{padding:18px}}
</style>
</head>
<body>
<div class="profile-bg-layer" id="profileBgLayer"></div>
<canvas class="canvas-bg" id="bgCanvas"></canvas>
<div class="bg-grid"></div><div class="bg-scanlines"></div><div class="bg-glow"></div>
<header class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-mark" aria-hidden="true"></span><span class="logo-text">Node<span class="x">Weave</span></span><span class="logo-sub">// PROFILE</span></a>
    <nav class="nav-links">
      <a href="index.html">动态</a>
      <a href="boards.html">论坛</a>
      <a href="blog.html">博客</a>
      <a href="board.html?board=qa">问答</a>
    </nav>
    <div class="nav-actions" data-auth-actions>
      <a class="btn-ghost" href="login.html">登录</a>
      <a class="btn-primary" href="editor.html">+ 发帖</a>
    </div>
  </div>
</header>

<main class="profile-page">
  <section class="profile-card">
    <div class="profile-head">
      <div class="profile-avatar" id="profileAvatar">?</div>
      <div class="profile-info">
        <h1 id="displayName">加载中...</h1>
        <div class="username" id="username">@loading</div>
        <div class="bio" id="bio"></div>
        <span class="level-badge" id="levelBadge" onclick="location.href='levels.html?user='+encodeURIComponent(userId||'')">Lv0 新人</span>
        <div style="margin-top:12px">
          <button class="btn-primary" id="btnEdit" type="button" style="display:none" onclick="toggleCustomize()">装扮设置</button>
          <a class="btn-ghost" id="btnInvites" href="invites.html" style="display:none;margin-left:8px">邀请注册</a>
          <a class="btn-ghost" id="btnBlogHome" href="#" style="margin-left:8px">博客主页</a>
          <a class="btn-ghost" id="btnMessageUser" href="#" style="display:none;margin-left:8px">发私信</a>
          <button class="btn-ghost" id="btnReportProfile" type="button" style="display:none;margin-left:8px" onclick="openProfileReport()">举报资料</button>
        </div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-box"><div class="num" id="statPosts">0</div><div class="label">帖子</div></div>
      <div class="stat-box"><div class="num" id="statComments">0</div><div class="label">评论</div></div>
      <div class="stat-box"><div class="num" id="statReputation">0</div><div class="label">声望</div></div>
      <div class="stat-box"><div class="num" id="statCoins">0</div><div class="label">论坛币</div></div>
      <div class="stat-box"><div class="num" id="statExp">0</div><div class="label">经验</div></div>
    </div>

    <div class="asset-panel">
      <div class="asset-card">
        <h3>等级进度</h3>
        <div class="progress-bar"><div class="progress-fill" id="levelProgress"></div></div>
        <div class="asset-meta">
          <span id="levelNeed">升级数据加载中</span>
          <a href="levels.html" style="color:var(--cyan);text-decoration:none">查看全部用户组权限 →</a>
        </div>
      </div>
      <div class="asset-card">
        <h3>当前权限</h3>
        <div class="perm-list" id="currentPerms"><span>加载中</span></div>
      </div>
      <div class="asset-card">
        <h3>下一等级权限</h3>
        <div class="perm-list" id="nextPerms"><span>加载中</span></div>
      </div>
    </div>

    <div class="customize-panel" id="customizePanel">
      <h3>个人装扮</h3>
      <textarea id="customCSS" placeholder="/* 自定义你的主页样式 */"></textarea>
      <div class="bg-preview" id="bgPresets">
        <div class="bg-preset active" data-type="" style="background:#0a0a0f" title="默认"></div>
        <div class="bg-preset" data-type="matrix" style="background:#003300" title="矩阵雨"></div>
        <div class="bg-preset" data-type="particles" style="background:#1a0033" title="粒子"></div>
        <div class="bg-preset" data-type="stars" style="background:#000033" title="星空"></div>
      </div>
      <button class="btn-primary" type="button" onclick="saveCustomize()">保存装扮</button>
      <span id="customizeMsg" style="display:none;color:var(--green);margin-left:10px;font-size:13px">已保存</span>
    </div>

    <div class="section-title">展示徽章</div>
    <div class="badge-wall" id="badgeWall"><div class="empty">加载中...</div></div>

    <div class="section-title">最近帖子</div>
    <div class="post-list" id="postList"><div class="empty">加载中...</div></div>
  </section>
</main>

<div class="report-modal" id="reportModal">
  <div class="report-card">
    <h3>举报用户资料</h3>
    <p>用于处理头像、昵称、简介等资料违规。请不要恶意举报。</p>
    <label>举报原因</label>
    <select id="reportReason">
      <option value="冒充他人">冒充他人</option>
      <option value="违法违规">违法违规</option>
      <option value="广告引流">广告引流</option>
      <option value="辱骂骚扰">辱骂骚扰</option>
      <option value="色情暴力">色情暴力</option>
      <option value="其他问题">其他问题</option>
    </select>
    <label>补充说明</label>
    <textarea id="reportDetail" rows="4" maxlength="800" placeholder="可选：说明具体问题"></textarea>
    <div class="report-actions">
      <button class="btn-ghost" type="button" onclick="closeProfileReport()">取消</button>
      <button class="btn-primary" type="button" onclick="submitProfileReport()">提交举报</button>
    </div>
    <div class="msg err" id="reportError"></div>
  </div>
</div>

<script src="script.js"></script>
<script>
let userId = new URLSearchParams(location.search).get('id');
let currentUser = null;
let bgAnimationId = null;
const esc = (value) => window.NodeWeave.escapeHtml(value);

async function resolveUserId() {
  currentUser = await window.NodeWeave.currentUser(true);
  if (!userId && currentUser) userId = currentUser.id;
  if (!userId) {
    location.href = 'login.html?redirect=profile.html';
    return false;
  }
  return true;
}

async function loadProfile() {
  if (!(await resolveUserId())) return;
  const json = await window.NodeWeave.apiJson('/api/users/' + encodeURIComponent(userId)).catch(() => null);
  if (!json || json.code !== 0) {
    document.getElementById('displayName').textContent = '用户不存在';
    return;
  }
  const user = json.data;
  document.title = (user.display_name || user.username) + ' // NodeWeave';
  document.getElementById('displayName').textContent = user.display_name || user.username;
  document.getElementById('username').textContent = '@' + user.username;
  document.getElementById('bio').textContent = user.bio || '这个用户还没有写简介。';
  document.getElementById('profileAvatar').textContent = (user.display_name || user.username || '?').slice(0, 2).toUpperCase();
  document.getElementById('profileAvatar').style.background = user.avatar_color || '#00f0ff';
  document.getElementById('btnBlogHome').href = 'blog.html?user=' + encodeURIComponent(user.id);
  document.getElementById('statPosts').textContent = user.post_count || 0;
  document.getElementById('statComments').textContent = user.comment_count || 0;
  document.getElementById('statReputation').textContent = user.reputation || 0;
  document.getElementById('statCoins').textContent = user.coins || 0;
  document.getElementById('statExp').textContent = user.exp || 0;
  if (user.level) {
    const level = document.getElementById('levelBadge');
    level.textContent = `${user.level.icon || ''} Lv${user.level.level} ${user.level.name}`;
    level.style.color = user.level.color || 'var(--cyan)';
    document.getElementById('levelProgress').style.width = (user.level.progress || 0) + '%';
    document.getElementById('levelNeed').textContent = user.level.next_level
      ? `距离 Lv${user.level.next_level.level} ${user.level.next_level.name} 还差 ${user.level.need} 声望`
      : '已达到最高用户组';
    document.getElementById('currentPerms').innerHTML = (user.level.permissions || []).map(item => `<span>${esc(item)}</span>`).join('');
    document.getElementById('nextPerms').innerHTML = user.level.next_level
      ? (user.level.next_level.permissions || []).map(item => `<span>${esc(item)}</span>`).join('')
      : '<span>已解锁全部用户组权限</span>';
  }
  applyProfileAppearance(user.profile_bg_type || '', user.profile_bg_value || '', user.profile_css || '');
  if (currentUser && currentUser.id === user.id) {
    document.getElementById('btnEdit').style.display = '';
    loadInviteProfileEntry();
    document.getElementById('customCSS').value = user.profile_css || '';
    document.querySelectorAll('.bg-preset').forEach(el => el.classList.toggle('active', el.dataset.type === (user.profile_bg_type || '')));
  } else if (currentUser) {
    document.getElementById('btnMessageUser').href = 'messages.html?to=' + encodeURIComponent(user.id);
    document.getElementById('btnMessageUser').style.display = 'inline-flex';
    document.getElementById('btnReportProfile').style.display = '';
  }
  renderPosts(user.recent_posts || []);
  loadBadges(user.id);
}

async function loadInviteProfileEntry() {
  const json = await window.NodeWeave.apiJson('/api/site-config/public').catch(() => null);
  if (json?.code === 0 && json.data?.user_invite_enabled) {
    document.getElementById('btnInvites').style.display = '';
  }
}

function renderPosts(posts) {
  const list = document.getElementById('postList');
  if (!posts.length) {
    list.innerHTML = '<div class="empty">暂无帖子</div>';
    return;
  }
  list.innerHTML = posts.map(post => `<a class="post-item" href="post.html?id=${esc(post.id)}">
    <div class="post-title">${esc(post.title)}</div>
    <div class="post-meta">${post.type === 'blog' ? '博客' : '帖子'}${lotteryPostMeta(post)} · ${post.like_count || 0} 赞 · ${post.comment_count || 0} 评论</div>
  </a>`).join('');
}

function lotteryPostMeta(post) {
  if (!Number(post.lottery_enabled || 0)) return '';
  const name = String(post.lottery_prize_name || '').trim();
  return ` · 抽奖 ${esc(name ? name.slice(0, 14) : '进行中')}`;
}

async function loadBadges(id) {
  const wall = document.getElementById('badgeWall');
  const json = await window.NodeWeave.apiJson('/api/badges/user/' + encodeURIComponent(id)).catch(() => null);
  const badges = json?.code === 0 ? (json.data.badges || []) : [];
  if (!badges.length) {
    wall.innerHTML = '<div class="empty">还没有展示徽章</div>';
    return;
  }
  wall.innerHTML = badges.map(badge => {
    const image = typeof badgeImg === 'function' ? badgeImg(badge.id, '') : '';
    return `<div class="badge-item" title="${esc(badge.name)}">${image || `<span class="badge-fallback">${esc(badge.icon || '🏅')}</span>`}</div>`;
  }).join('');
}

function toggleCustomize() {
  document.getElementById('customizePanel').classList.toggle('show');
}

async function saveCustomize() {
  const active = document.querySelector('.bg-preset.active');
  const profile_css = document.getElementById('customCSS').value;
  const profile_bg_type = active ? active.dataset.type : '';
  const json = await window.NodeWeave.apiJson('/api/account/customize', {
    method: 'PUT',
    body: JSON.stringify({ profile_css, profile_bg_type, profile_bg_value: '' }),
  });
  if (json.code !== 0) {
    alert(json.msg || '保存失败');
    return;
  }
  applyProfileAppearance(profile_bg_type, '', profile_css);
  document.getElementById('customizeMsg').style.display = 'inline';
  setTimeout(() => document.getElementById('customizeMsg').style.display = 'none', 1800);
}

async function openProfileReport() {
  currentUser = await window.NodeWeave.currentUser(true);
  if (!currentUser) {
    location.href = 'login.html?redirect=' + encodeURIComponent('profile.html?id=' + userId);
    return;
  }
  document.getElementById('reportReason').value = '冒充他人';
  document.getElementById('reportDetail').value = '';
  document.getElementById('reportError').classList.remove('show');
  document.getElementById('reportModal').classList.add('show');
}

function closeProfileReport() {
  document.getElementById('reportModal').classList.remove('show');
}

async function submitProfileReport() {
  const json = await window.NodeWeave.apiJson('/api/reports', {
    method: 'POST',
    body: JSON.stringify({
      item_type: 'profile',
      item_id: userId,
      reason: document.getElementById('reportReason').value,
      detail: document.getElementById('reportDetail').value,
    }),
  });
  if (json.code !== 0) {
    document.getElementById('reportError').textContent = json.msg || '举报提交失败';
    document.getElementById('reportError').classList.add('show');
    return;
  }
  closeProfileReport();
  alert(json.data?.message || '举报已提交');
}

document.getElementById('bgPresets').addEventListener('click', event => {
  const preset = event.target.closest('.bg-preset');
  if (!preset) return;
  document.querySelectorAll('.bg-preset').forEach(item => item.classList.remove('active'));
  preset.classList.add('active');
});

function initBgCanvas(type) {
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  if (bgAnimationId) cancelAnimationFrame(bgAnimationId);
  bgAnimationId = null;
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!type) return;
  if (type === 'matrix') drawMatrix(ctx, canvas);
  if (type === 'particles') drawParticles(ctx, canvas);
  if (type === 'stars') drawStars(ctx, canvas);
}

function applyProfileAppearance(type, value, css) {
  document.getElementById('customStyles').textContent = css || '';
  const layer = document.getElementById('profileBgLayer');
  layer.style.background = '';
  layer.style.backgroundImage = '';
  const parts = String(value || '').split('|||');
  if (type === 'color') {
    layer.style.background = parts[0] || '#0a0a0f';
  } else if (type === 'gradient') {
    layer.style.background = `linear-gradient(135deg, ${parts[0] || '#0a0a0f'}, ${parts[1] || '#1a0033'})`;
  } else if (type === 'image' && parts[0]) {
    layer.style.backgroundImage = `linear-gradient(rgba(10,10,15,.42),rgba(10,10,15,.64)), url("${parts[0].replace(/"/g, '%22')}")`;
  }
  initBgCanvas(['matrix', 'particles', 'stars'].includes(type) ? type : '');
}

function drawMatrix(ctx, canvas) {
  const chars = 'NODEWEAVE0123456789<>/{}[]';
  const drops = Array(Math.ceil(canvas.width / 18)).fill(1);
  function draw() {
    ctx.fillStyle = 'rgba(10,10,15,.12)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00f0ff';
    ctx.font = '14px monospace';
    drops.forEach((drop, index) => {
      ctx.fillText(chars[Math.floor(Math.random() * chars.length)], index * 18, drop * 18);
      if (drop * 18 > canvas.height && Math.random() > .975) drops[index] = 0;
      drops[index]++;
    });
    bgAnimationId = requestAnimationFrame(draw);
  }
  draw();
}

function drawParticles(ctx, canvas) {
  const particles = Array.from({ length: 80 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - .5) * 1.4,
    vy: (Math.random() - .5) * 1.4,
    r: Math.random() * 2 + 1,
  }));
  function draw() {
    ctx.fillStyle = 'rgba(10,10,15,.16)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#9d00ff';
    particles.forEach(p => {
      p.x = (p.x + p.vx + canvas.width) % canvas.width;
      p.y = (p.y + p.vy + canvas.height) % canvas.height;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    });
    bgAnimationId = requestAnimationFrame(draw);
  }
  draw();
}

function drawStars(ctx, canvas) {
  const stars = Array.from({ length: 150 }, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 1.5 + .4, a: Math.random() }));
  function draw() {
    ctx.fillStyle = 'rgba(5,5,20,.18)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.a += (Math.random() - .5) * .05;
      s.a = Math.max(.2, Math.min(1, s.a));
      ctx.fillStyle = `rgba(255,255,255,${s.a})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    });
    bgAnimationId = requestAnimationFrame(draw);
  }
  draw();
}

addEventListener('resize', () => {
  const active = document.querySelector('.bg-preset.active');
  initBgCanvas(active ? active.dataset.type : '');
});
document.addEventListener('DOMContentLoaded', loadProfile);
</script>
</body>
