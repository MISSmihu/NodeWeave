<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>板块 // NodeWeave</title>
<link rel="stylesheet" href="style.css">
<style>
.board-page{max-width:1220px;margin:0 auto;padding:78px 24px 100px}
.board-hero{position:relative;overflow:hidden;border:1px solid rgba(0,240,255,.14);border-radius:8px;padding:30px;background:linear-gradient(135deg,rgba(0,240,255,.10),rgba(157,0,255,.06) 58%,rgba(255,0,60,.06)),rgba(18,18,30,.82);box-shadow:0 22px 80px rgba(0,0,0,.28)}
.board-hero::before{content:'';position:absolute;right:-90px;top:-120px;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,var(--board-color),transparent 68%);opacity:.25;pointer-events:none}
.board-back{display:inline-flex;color:var(--text-mute);font-family:var(--font-mono);font-size:12px;text-decoration:none;margin-bottom:16px}
.board-back:hover{color:var(--cyan)}
.board-kicker{display:inline-flex;gap:8px;align-items:center;padding:6px 12px;border:1px solid rgba(0,240,255,.2);background:rgba(0,240,255,.06);border-radius:999px;color:var(--cyan);font-family:var(--font-mono);font-size:12px}
.board-kicker i{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 12px var(--green)}
.board-headline{position:relative;z-index:1;display:grid;grid-template-columns:1fr auto;gap:22px;align-items:end}
.board-title{display:flex;align-items:center;gap:14px;margin-top:14px}
.board-icon{display:grid;place-items:center;width:64px;height:64px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.05);font-size:34px}
.board-title h1{font-family:var(--font-display);font-size:clamp(32px,5vw,58px);line-height:1;margin:0;color:var(--text)}
.board-title h1 span{color:var(--board-color);text-shadow:0 0 24px color-mix(in srgb,var(--board-color) 45%,transparent)}
.board-desc{max-width:720px;margin-top:14px;color:var(--text-dim);font-size:15px;line-height:1.85}
.board-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.board-stats{display:flex;gap:16px;flex-wrap:wrap;margin-top:20px}
.board-stat{min-width:120px;padding:12px 14px;border:1px solid var(--border);background:rgba(10,10,15,.42)}
.board-stat b{display:block;font-family:var(--font-display);font-size:22px;color:var(--cyan);line-height:1}
.board-stat span{font-family:var(--font-mono);font-size:11px;color:var(--text-mute)}
.board-toolbar{display:flex;justify-content:space-between;gap:16px;align-items:center;margin:22px 0 16px;border-bottom:1px solid var(--border-2);padding-bottom:16px}
.board-tabs{display:flex;gap:6px;flex-wrap:wrap}
.board-tabs button{padding:9px 14px;border:1px solid var(--border);background:rgba(18,18,30,.75);color:var(--text-dim);border-radius:4px;font-family:var(--font-mono);font-size:12px}
.board-tabs button.active,.board-tabs button:hover{color:var(--cyan);border-color:var(--cyan);background:rgba(0,240,255,.07);box-shadow:0 0 22px rgba(0,240,255,.08)}
.guest-note{display:none;color:var(--text-mute);font-family:var(--font-mono);font-size:12px}
.guest-note.show{display:block}
.post-list{display:grid;gap:14px}
.post-card{position:relative;display:block;text-decoration:none;color:inherit;border:1px solid var(--border);border-radius:8px;background:linear-gradient(180deg,rgba(255,255,255,.018),transparent),rgba(18,18,30,.76);padding:20px 20px 18px;overflow:hidden;transition:all .2s}
.post-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(var(--board-color),var(--purple));opacity:.68}
.post-card:hover{transform:translateY(-3px);border-color:var(--board-color);box-shadow:0 18px 54px rgba(0,0,0,.32)}
.post-flags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:9px}
.flag{padding:3px 8px;border-radius:3px;font-family:var(--font-mono);font-size:10px;border:1px solid rgba(0,240,255,.18);color:var(--cyan);background:rgba(0,240,255,.06)}
.flag.hot{border-color:rgba(255,0,60,.25);color:var(--magenta);background:rgba(255,0,60,.07)}
.flag.featured{border-color:rgba(127,255,0,.25);color:var(--green);background:rgba(127,255,0,.07)}
.flag.reward{border-color:rgba(255,215,0,.28);color:#ffd700;background:rgba(255,215,0,.08)}
.post-title{font-family:var(--font-display);font-size:20px;line-height:1.35;color:var(--text);margin-bottom:9px}
.post-excerpt{color:var(--text-dim);font-size:13px;line-height:1.8;margin-bottom:12px}
.limited{color:var(--text-mute);font-family:var(--font-mono);font-size:11px;margin-top:6px}
.post-meta{display:flex;gap:14px;flex-wrap:wrap;color:var(--text-mute);font-family:var(--font-mono);font-size:11px}
.empty-state,.loading-state{border:1px dashed rgba(0,240,255,.18);border-radius:8px;background:linear-gradient(135deg,rgba(0,240,255,.05),rgba(157,0,255,.035)),rgba(18,18,30,.52);padding:58px 20px;text-align:center;color:var(--text-dim)}
.empty-state .icon,.loading-state .icon{font-size:48px;margin-bottom:10px}
.empty-state h3,.loading-state h3{font-family:var(--font-display);color:var(--text);margin-bottom:8px}
@media(max-width:820px){.board-headline,.board-toolbar{grid-template-columns:1fr;display:block}.board-actions{justify-content:flex-start;margin-top:18px}.board-toolbar{display:grid}.guest-note{margin-top:10px}}
@media(max-width:560px){.board-page{padding-left:16px;padding-right:16px}.board-hero{padding:22px}.board-title{align-items:flex-start}.board-icon{width:52px;height:52px;font-size:28px}}
</style>
</head>
<body>
<div class="bg-grid"></div><div class="bg-scanlines"></div><div class="bg-glow"></div>
<header class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-mark" aria-hidden="true"></span><span class="logo-text">Node<span class="x">Weave</span></span><span class="logo-sub">// BOARD</span></a>
    <nav class="nav-links">
      <a href="index.html">动态</a>
      <a href="boards.html" class="active">论坛</a>
      <a href="blog.html">博客</a>
      <a href="board.html?board=qa">问答</a>
    </nav>
    <div class="nav-actions" data-auth-actions>
      <a class="btn-ghost" href="login.html">登录</a>
      <a class="btn-primary" href="editor.html">+ 发帖</a>
    </div>
  </div>
</header>

<main class="board-page">
  <section class="board-hero" id="boardHero" style="--board-color:#00f0ff">
    <a href="boards.html" class="board-back">← 板块广场</a>
    <div class="board-kicker"><i></i><span id="boardSlug">BOARD NODE</span></div>
    <div class="board-headline">
      <div>
        <div class="board-title">
          <div class="board-icon" id="boardIcon">📋</div>
          <h1 id="boardName">加载<span>节点</span></h1>
        </div>
        <p class="board-desc" id="boardDesc">正在同步板块信息。</p>
      </div>
      <div class="board-actions">
        <a class="btn-primary btn-lg" id="writePost" href="editor.html">在本板块发帖</a>
        <a class="btn-outline btn-lg" href="search.html">搜索内容</a>
      </div>
    </div>
    <div class="board-stats">
      <div class="board-stat"><b id="boardPostCount">--</b><span>帖子</span></div>
      <div class="board-stat"><b id="boardHotCount">--</b><span>热帖参考</span></div>
      <div class="board-stat"><b id="boardStatus">ONLINE</b><span>状态</span></div>
    </div>
  </section>

  <section class="board-toolbar">
    <div class="board-tabs">
      <button class="active" data-sort="latest">最新</button>
      <button data-sort="hot">热帖</button>
      <button data-sort="featured">精华</button>
      <button data-sort="replied">最新回复</button>
      <button data-sort="bounty">悬赏</button>
      <button data-sort="unanswered">待解决</button>
      <button data-sort="solved">已解决</button>
    </div>
    <div class="guest-note" id="guestNote">游客可浏览摘要；登录后可查看完整正文、回复、点赞、评分和打赏。</div>
  </section>

  <section class="post-list" id="postList">
    <div class="loading-state"><div class="icon">⌁</div><h3>正在同步帖子节点...</h3><p>正在读取真实内容流。</p></div>
  </section>
</main>

<script src="script.js"></script>
<script>
const slug = new URLSearchParams(location.search).get('board') || 'general';
let currentSort = 'latest';
let currentUser = null;
let boardInfo = null;

const SEED_BOARDS = {
  general:{name:'综合讨论',description:'自由讨论，不限话题',icon:'💬',color:'#00f0ff'},
  qa:{name:'问答',description:'技术问答与悬赏，采纳打赏论坛币',icon:'❓',color:'#ffd700'},
  tech:{name:'技术交流',description:'技术分享与心得',icon:'💻',color:'#7fff00'},
  dev:{name:'开发',description:'编程语言与框架',icon:'⚡',color:'#9d00ff'},
  ai:{name:'人工智能',description:'AI/ML、提示词、自动化与模型实践',icon:'🤖',color:'#ffd700'},
  blog:{name:'博客',description:'原创长文、技术笔记与思考沉淀',icon:'📝',color:'#00f0ff'},
  chat:{name:'娱乐闲聊',description:'灌水摸鱼，轻松闲聊，分享日常',icon:'🎮',color:'#ff69b4'},
  promo:{name:'推广',description:'产品推广、项目宣传与商务合作',icon:'📢',color:'#ff8c00'},
  share:{name:'福利分享',description:'资源分享、白嫖福利与优惠信息',icon:'🎁',color:'#ff1493'},
  transfer:{name:'中转站',description:'文件中转、网盘分享与资源交换',icon:'📦',color:'#00ced1'}
};

const esc = (value) => window.NodeWeave.escapeHtml(value);
const timeAgo = (value) => window.NodeWeave.timeAgo(value);

function sanitizeColor(color) {
  return /^#[0-9a-fA-F]{3,8}$/.test(color || '') ? color : '#00f0ff';
}

async function loadBoard() {
  currentUser = await window.NodeWeave.currentUser(true);
  document.getElementById('guestNote').classList.toggle('show', !currentUser);
  const json = await window.NodeWeave.apiJson('/api/boards/' + encodeURIComponent(slug)).catch(() => null);
  boardInfo = json?.code === 0 ? json.data : (SEED_BOARDS[slug] || { name: slug, description: '', icon: '📋', color: '#00f0ff', post_count: 0 });
  renderBoard();
  loadPosts();
}

function renderBoard() {
  const color = sanitizeColor(boardInfo.color);
  document.getElementById('boardHero').style.setProperty('--board-color', color);
  document.getElementById('boardSlug').textContent = (boardInfo.slug || slug).toUpperCase() + ' / SECTOR';
  document.getElementById('boardIcon').textContent = boardInfo.icon || '📋';
  document.getElementById('boardName').innerHTML = `${esc(boardInfo.name || slug)}<span>频道</span>`;
  document.getElementById('boardDesc').textContent = boardInfo.description || '这个节点正在等待第一批内容沉淀。';
  document.getElementById('boardPostCount').textContent = Number(boardInfo.post_count || 0).toLocaleString();
  document.getElementById('writePost').href = 'editor.html?board=' + encodeURIComponent(boardInfo.slug || slug);
  document.title = (boardInfo.name || slug) + ' // NodeWeave';
}

function postHeat(post) {
  return Number(post.view_count || 0) + Number(post.like_count || 0) * 3 + Number(post.comment_count || 0) * 5 + Number(post.tip_total || 0) * 2 + Number(post.reply_reward_total || 0);
}

function lotteryStatus(post) {
  const status = String(post.lottery_status || 'none');
  if (status === 'active' && Number(post.lottery_end_at || 0) > 0 && Number(post.lottery_end_at) <= Date.now()) return 'ready';
  return status;
}

function lotteryStatusLabel(status) {
  return ({ active: '进行中', ready: '可开奖', drawn: '已开奖', cancelled: '已取消' })[status] || '抽奖';
}

function lotteryFlag(post) {
  if (!Number(post.lottery_enabled || 0)) return '';
  const name = String(post.lottery_prize_name || '').trim();
  const label = name ? name.slice(0, 18) : lotteryStatusLabel(lotteryStatus(post));
  return `<span class="flag reward">抽奖 ${esc(label)}</span>`;
}

async function loadPosts() {
  const list = document.getElementById('postList');
  list.innerHTML = '<div class="loading-state"><div class="icon">⌁</div><h3>正在同步帖子节点...</h3><p>正在读取真实内容流。</p></div>';
  const params = new URLSearchParams({ board: slug, sort: currentSort, pageSize: '30' });
  const json = await window.NodeWeave.apiJson('/api/posts?' + params.toString()).catch(() => null);
  if (!json || json.code !== 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">⚠</div><h3>内容暂时不可达</h3><p>请稍后刷新；如果你从本地文件打开，请点底部提示切到线上页面。</p></div>';
    return;
  }
  const posts = json.data.posts || [];
  document.getElementById('boardPostCount').textContent = Number(json.data.total || boardInfo.post_count || 0).toLocaleString();
  document.getElementById('boardHotCount').textContent = posts.filter(post => postHeat(post) >= 20).length || '--';
  document.getElementById('guestNote').classList.toggle('show', !!json.data.guest_limited);
  if (!posts.length) {
    const emptyText = {
      featured: '暂无精华帖',
      hot: '暂无热帖',
      replied: '暂无回复活跃帖',
      bounty: '暂无悬赏帖',
      unanswered: '暂无待解决帖子',
      solved: '暂无已解决帖子',
    };
    const text = emptyText[currentSort] || '暂无帖子';
    list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><h3>${text}</h3><p>成为这个板块的第一批建设者吧。</p><a class="btn-primary" href="editor.html?board=${encodeURIComponent(slug)}" style="display:inline-block;margin-top:14px">发布第一帖</a></div>`;
    return;
  }
  list.innerHTML = posts.map(renderPost).join('');
}

function renderPost(post) {
  const flags = [];
  if (post.is_pinned) flags.push('<span class="flag hot">置顶</span>');
  if (post.is_featured) flags.push('<span class="flag featured">精华</span>');
  if (postHeat(post) >= 20) flags.push('<span class="flag hot">热帖</span>');
  if (Number(post.reply_reward_remaining || 0) > 0) flags.push(`<span class="flag featured">回帖红包 ${Number(post.reply_reward_remaining || 0)}</span>`);
  if (post.bounty && !post.bounty_claimed) flags.push(`<span class="flag featured">悬赏 ${post.bounty}</span>`);
  if (Number(post.lottery_enabled || 0)) flags.push(lotteryFlag(post));
  if (post.accepted_answer_id) flags.push('<span class="flag featured">已解决</span>');
  flags.push(`<span class="flag">${post.type === 'blog' ? '博客' : '帖子'}</span>`);
  const content = String(post.content || '').replace(/\s+/g, ' ').trim();
  const limited = post.content_limited ? '<div class="limited">游客预览已截断，登录后可查看完整正文。</div>' : '';
  const lastReply = post.last_reply_at && post.last_reply_at !== post.created_at ? `<span>最后回复 ${timeAgo(post.last_reply_at)}</span>` : '';
  return `<a class="post-card" href="post.html?id=${encodeURIComponent(post.id)}">
    <div class="post-flags">${flags.join('')}</div>
    <div class="post-title">${esc(post.title)}</div>
    <div class="post-excerpt">${esc(content || '无正文摘要')}${limited}</div>
    <div class="post-meta">
      <span>@${esc(post.display_name || post.username || '匿名用户')}</span>
      <span>${timeAgo(post.created_at)}</span>
      ${lastReply}
      <span>浏览 ${post.view_count || 0}</span>
      <span>回复 ${post.comment_count || 0}</span>
      <span>赞 ${post.like_count || 0}</span>
      <span>评分 ${post.rating_avg ? Number(post.rating_avg).toFixed(1) : '-'}</span>
    </div>
  </a>`;
}

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.board-tabs button').forEach(button => {
    button.addEventListener('click', () => {
      document.querySelectorAll('.board-tabs button').forEach(item => item.classList.remove('active'));
      button.classList.add('active');
      currentSort = button.dataset.sort || 'latest';
      loadPosts();
    });
  });
  loadBoard();
});
</script>
</body>
</html>
