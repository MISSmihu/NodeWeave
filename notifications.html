<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通知 // NodeWeave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.notif-page{max-width:760px;margin:0 auto;padding:80px 24px 100px}
.notif-page h2{font-family:var(--font-display);font-size:20px;color:var(--cyan);margin-bottom:16px}
.notif-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.notif-bar .btn-sm{padding:6px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-family:var(--font-mono);font-size:11px;cursor:pointer}
.notif-item{padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;text-decoration:none;color:inherit;transition:all .18s}
.notif-item:hover{border-color:var(--cyan);transform:translateY(-2px);box-shadow:0 12px 36px rgba(0,240,255,.08)}
.notif-item.unread{border-left:3px solid var(--cyan)}
.notif-item .icon{font-size:20px;flex-shrink:0}
.notif-item .body{flex:1;font-size:13px;color:var(--text-dim);line-height:1.5}
.notif-item .time{font-size:10px;color:var(--text-mute);margin-top:4px}
.notif-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;font-family:var(--font-mono);font-size:10px;color:var(--text-mute)}
.unread-dot{display:inline-flex;width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:var(--glow-cyan);margin-left:6px}
</style>
</head>
<body>
<div class="bg-grid"></div><div class="bg-scanlines"></div><div class="bg-glow"></div>
<header class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo"><span class="logo-mark">◈</span><span class="logo-text">Node<span class="x">Weave</span></span></a>
    <div class="nav-actions"><a href="index.html" class="btn-ghost" style="border:1px solid var(--border);padding:8px 16px">← 返回</a></div>
  </div>
</header>
<main class="notif-page">
  <div class="notif-bar">
    <h2>🔔 通知</h2>
    <button class="btn-sm" onclick="readAll()">全部已读</button>
  </div>
  <div id="notifList">加载中...</div>
</main>
<script>
async function load() {
  var list = document.getElementById('notifList');
  try {
    var r = await fetch('/api/notifications');
    var j = await r.json();
    if (j.code!==0) { list.innerHTML='<p style="color:var(--text-mute);text-align:center;padding:40px">请先登录</p>'; return; }
    if (!j.data.notifications.length) { list.innerHTML='<p style="color:var(--text-mute);text-align:center;padding:40px">暂无通知</p>'; return; }
    var icons = {comment:'💬',reply:'↩️',mention:'@',like:'👍',comment_like:'👍',follow:'👤',tip:'💰',accepted:'✅',moderation:'🛡️',system:'📢',achievement:'🏆'};
    list.innerHTML = j.data.notifications.map(function(n){
      var href = n.ref_id ? 'post.html?id=' + encodeURIComponent(n.ref_id) : '#';
      return '<a class="notif-item'+(n.is_read?'':' unread')+'" href="'+href+'" data-id="'+h(n.id)+'">'+
        '<div class="icon">'+(icons[n.type]||'📌')+'</div>'+
        '<div class="body">'+h(n.message)+(n.is_read?'':'<span class="unread-dot"></span>')+
          '<div class="notif-meta"><span>'+h(typeLabel(n.type))+'</span><span>'+new Date(n.created_at).toLocaleString('zh-CN')+'</span></div>'+
        '</div>'+
      '</a>';
    }).join('');
  } catch(e) {
    list.innerHTML='<p style="color:var(--text-mute);text-align:center;padding:40px">通知暂时不可达，请稍后刷新</p>';
  }
}
async function readAll() {
  try { await fetch('/api/notifications/read-all',{method:'POST'}); } catch(e) {}
  load();
}
document.addEventListener('click', function(event){
  var item = event.target.closest('.notif-item[data-id]');
  if (!item || !item.classList.contains('unread')) return;
  try { fetch('/api/notifications/' + encodeURIComponent(item.dataset.id) + '/read', { method:'POST' }); } catch(e) {}
});
function h(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function typeLabel(type) {
  return ({
    comment:'帖子评论',
    reply:'评论回复',
    mention:'@提醒',
    like:'内容点赞',
    comment_like:'评论点赞',
    tip:'论坛币打赏',
    accepted:'回答采纳',
    moderation:'管理通知',
    system:'系统公告',
    achievement:'成就通知'
  })[type] || '通知';
}
load();
</script>
</body>
</html>
