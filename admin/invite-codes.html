<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邀请码管理 // NEXUS ADMIN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
.admin-layout{display:flex;min-height:100vh;padding-top:60px}
.admin-sidebar{width:200px;background:var(--surface);border-right:1px solid var(--border);padding:20px 0;position:fixed;top:60px;bottom:0;left:0;overflow-y:auto}
.admin-sidebar a{display:block;padding:10px 20px;color:var(--text-dim);font-family:var(--font-mono);font-size:13px;text-decoration:none;transition:all .2s}
.admin-sidebar a:hover,.admin-sidebar a.active{color:var(--cyan);background:rgba(0,240,255,.05)}
.admin-main{margin-left:200px;flex:1;padding:24px;max-width:1100px}
.admin-main h2{font-family:var(--font-display);font-size:20px;color:var(--cyan);margin-bottom:20px}
.page-section{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;margin-bottom:20px}
.page-section h3{font-family:var(--font-display);font-size:15px;color:var(--text);margin-bottom:16px}
.form-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}
.form-row .form-group{flex:1;min-width:120px}
.form-group label{display:block;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase}
.form-group input{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;outline:none}
.form-group input:focus{border-color:var(--cyan)}
.btn-sm{padding:8px 16px;font-family:var(--font-display);font-size:12px;border-radius:4px;border:none;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--cyan);color:var(--bg);font-weight:700}
.btn-primary:hover{box-shadow:var(--glow-cyan)}
.btn-ghost-sm{background:transparent;color:var(--text-dim);border:1px solid var(--border);font-family:var(--font-mono);font-size:11px;padding:6px 12px;cursor:pointer;border-radius:3px}
.btn-ghost-sm:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-danger{background:transparent;color:var(--magenta);border:1px solid var(--magenta);font-family:var(--font-mono);font-size:11px;padding:6px 12px;cursor:pointer;border-radius:3px}
.btn-danger:hover{background:var(--magenta);color:#fff}
.code-list{width:100%;border-collapse:collapse;font-size:13px}
.code-list th{background:var(--surface-2);color:var(--cyan);font-family:var(--font-mono);font-size:11px;padding:10px 12px;text-align:left;text-transform:uppercase}
.code-list td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text-dim)}
.code-list .code-val{font-family:var(--font-mono);color:var(--text);font-size:14px;letter-spacing:1px}
.code-list .tag{display:inline-block;padding:2px 8px;border-radius:3px;font-family:var(--font-mono);font-size:10px}
.tag-active{background:rgba(127,255,0,.15);color:var(--green)}
.tag-inactive{background:rgba(255,0,60,.1);color:var(--magenta)}
.tag-expired{background:rgba(90,90,120,.2);color:var(--text-mute)}
.empty-state{text-align:center;padding:40px;color:var(--text-mute)}
.empty-state .icon{font-size:40px;margin-bottom:12px}
.msg{display:none;padding:8px 12px;border-radius:4px;font-size:13px;margin-bottom:12px}
.msg.show{display:block}
.msg-ok{background:rgba(127,255,0,.1);color:var(--green);border:1px solid rgba(127,255,0,.2)}
.msg-err{background:rgba(255,0,60,.1);color:var(--magenta);border:1px solid rgba(255,0,60,.2)}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-scanlines"></div>
<div class="bg-glow"></div>

<header class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo">
      <span class="logo-mark">◈</span>
      <span class="logo-text">NE<span class="x">X</span>US</span>
      <span class="logo-sub">// ADMIN PANEL</span>
    </a>
    <div class="nav-actions">
      <a href="../index.html" class="btn-ghost">返回首页</a>
    </div>
  </div>
</header>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <a href="site-config.html">站点配置</a>
    <a href="invite-codes.html" class="active">邀请码管理</a>
    <a href="moderation.html">内容审核</a>
    <a href="users.html">用户管理</a>
    <a href="#">举报处理</a>
  </aside>

  <main class="admin-main">
    <h2>邀请码管理</h2>

    <div class="page-section">
      <h3>生成邀请码</h3>
      <div class="form-row">
        <div class="form-group">
          <label>生成数量</label>
          <input type="number" id="genCount" value="5" min="1" max="100">
        </div>
        <div class="form-group">
          <label>最大使用次数</label>
          <input type="number" id="genMaxUses" value="1" min="1" max="1000">
        </div>
        <div class="form-group">
          <label>有效期（天，留空永久）</label>
          <input type="number" id="genExpires" placeholder="永久有效">
        </div>
        <div class="form-group" style="display:flex;align-items:flex-end">
          <button class="btn-sm btn-primary" id="genBtn">生成</button>
        </div>
      </div>
      <div class="msg" id="genMsg"></div>
      <div id="genResult" style="display:none"></div>
    </div>

    <div class="page-section">
      <h3>已有邀请码</h3>
      <div class="msg" id="listMsg"></div>
      <div id="codeTableContainer">
        <table class="code-list" id="codeTable">
          <thead>
            <tr><th>邀请码</th><th>创建者</th><th>使用/总量</th><th>过期时间</th><th>状态</th><th>操作</th></tr>
          </thead>
          <tbody id="codeTableBody"></tbody>
        </table>
        <div id="emptyState" class="empty-state" style="display:none">
          <div class="icon">🏷️</div>
          <p>暂无邀请码</p>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const API = '/api/admin/invite-codes';

async function loadList() {
  try {
    const res = await fetch(API);
    const json = await res.json();
    if (json.code !== 0) { showMsg('listMsg', json.msg, 'err'); return; }
    const tbody = document.getElementById('codeTableBody');
    tbody.innerHTML = '';
    if (!json.data.codes.length) {
      document.getElementById('codeTable').style.display = 'none';
      document.getElementById('emptyState').style.display = '';
      return;
    }
    document.getElementById('codeTable').style.display = '';
    document.getElementById('emptyState').style.display = 'none';
    json.data.codes.forEach(c => {
      const expired = c.expires_at && c.expires_at < Date.now();
      const statusClass = c.status === 'active' ? (expired ? 'tag-expired' : 'tag-active') : 'tag-inactive';
      const statusText = c.status === 'active' ? (expired ? '已过期' : '有效') : '已停用';
      const actions = c.status === 'active' && !expired
        ? `<button class="btn-ghost-sm" onclick="toggleCode('${c.code}','deactivate')">停用</button>
           <button class="btn-danger" onclick="toggleCode('${c.code}','delete')">删除</button>`
        : `<button class="btn-ghost-sm" onclick="toggleCode('${c.code}','activate')">启用</button>
           <button class="btn-danger" onclick="toggleCode('${c.code}','delete')">删除</button>`;
      tbody.innerHTML += '<tr>' +
        `<td><span class="code-val">${c.code}</span></td>` +
        `<td>${c.creator_name || 'system'}</td>` +
        `<td>${c.used_count} / ${c.max_uses}</td>` +
        `<td>${c.expires_at ? new Date(c.expires_at).toLocaleDateString('zh-CN') : '永久'}</td>` +
        `<td><span class="tag ${statusClass}">${statusText}</span></td>` +
        `<td>${actions}</td>` +
        '</tr>';
    });
  } catch(e) { showMsg('listMsg', '加载失败', 'err'); }
}

async function genCodes() {
  const count = document.getElementById('genCount').value;
  const max_uses = document.getElementById('genMaxUses').value;
  const expires_in_days = document.getElementById('genExpires').value;
  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ count: +count, max_uses: +max_uses, expires_in_days: expires_in_days ? +expires_in_days : null }),
    });
    const json = await res.json();
    if (json.code !== 0) { showMsg('genMsg', json.msg, 'err'); return; }
    const codes = json.data.codes.map(c => c.code).join('<br>');
    document.getElementById('genResult').style.display = 'block';
    document.getElementById('genResult').innerHTML = '<div class="msg msg-ok show">生成 ' + json.data.generated + ' 个邀请码:<br><br><span style="font-family:var(--font-mono);font-size:16px;letter-spacing:2px">' + codes + '</span></div>';
    loadList();
  } catch(e) { showMsg('genMsg', '操作失败', 'err'); }
}

window.toggleCode = async function(code, action) {
  if (action === 'delete' && !confirm('确定删除此邀请码？')) return;
  try {
    const res = await fetch(`${API}/${code}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action }),
    });
    const json = await res.json();
    if (json.code !== 0) { alert(json.msg); return; }
    loadList();
  } catch(e) { alert('操作失败'); }
};

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg show msg-' + (type === 'err' ? 'err' : 'ok');
  setTimeout(() => el.classList.remove('show'), 3000);
}

document.getElementById('genBtn').addEventListener('click', genCodes);
loadList();
</script>
</body>
</html>
