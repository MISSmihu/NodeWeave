<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#0a0202"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#4a1a1a" stroke-width="6"/>
  <!-- Beetle body -->
  <ellipse cx="100" cy="100" rx="32" ry="42" fill="none" stroke="url(#red)" stroke-width="3" filter="url(#glow)"/>
  <ellipse cx="100" cy="100" rx="32" ry="42" fill="#ff4444" opacity="0.06"/>
  <!-- Body split line -->
  <line x1="100" y1="60" x2="100" y2="140" stroke="#ff4444" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <!-- Beetle head -->
  <ellipse cx="100" cy="62" rx="18" ry="14" fill="none" stroke="url(#red)" stroke-width="2.5" filter="url(#glow)"/>
  <ellipse cx="100" cy="62" rx="18" ry="14" fill="#cc0000" opacity="0.1"/>
  <!-- Antennae -->
  <path d="M90,52 Q80,40 75,30" fill="none" stroke="#ff4444" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <path d="M110,52 Q120,40 125,30" fill="none" stroke="#ff4444" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <circle cx="75" cy="30" r="2" fill="#ff4444" filter="url(#glow)" opacity="0.6"/>
  <circle cx="125" cy="30" r="2" fill="#ff4444" filter="url(#glow)" opacity="0.6"/>
  <!-- Eyes -->
  <circle cx="92" cy="60" r="3" fill="#ff4444" opacity="0.6" filter="url(#glow)"/>
  <circle cx="108" cy="60" r="3" fill="#ff4444" opacity="0.6" filter="url(#glow)"/>
  <!-- Legs (3 per side) -->
  <path d="M68,85 Q55,80 45,75" fill="none" stroke="#ff4444" stroke-width="2" filter="url(#glow)" opacity="0.6"/>
  <path d="M68,100 Q52,100 42,100" fill="none" stroke="#ff4444" stroke-width="2" filter="url(#glow)" opacity="0.6"/>
  <path d="M68,115 Q55,120 45,125" fill="none" stroke="#ff4444" stroke-width="2" filter="url(#glow)" opacity="0.6"/>
  <path d="M132,85 Q145,80 155,75" fill="none" stroke="#ff4444" stroke-width="2" filter="url(#glow)" opacity="0.6"/>
  <path d="M132,100 Q148,100 158,100" fill="none" stroke="#ff4444" stroke-width="2" filter="url(#glow)" opacity="0.6"/>
  <path d="M132,115 Q145,120 155,125" fill="none" stroke="#ff4444" stroke-width="2" filter="url(#glow)" opacity="0.6"/>
  <!-- Body spots -->
  <circle cx="85" cy="95" r="3" fill="#ff4444" opacity="0.25" filter="url(#glow)"/>
  <circle cx="115" cy="95" r="3" fill="#ff4444" opacity="0.25" filter="url(#glow)"/>
  <circle cx="88" cy="115" r="2.5" fill="#ff4444" opacity="0.2" filter="url(#glow)"/>
  <circle cx="112" cy="115" r="2.5" fill="#ff4444" opacity="0.2" filter="url(#glow)"/>
  <!-- Magnifying glass -->
  <circle cx="50" cy="50" r="15" fill="none" stroke="#ff4444" stroke-width="2" filter="url(#glow)" opacity="0.5"/>
  <circle cx="50" cy="50" r="15" fill="#ff4444" opacity="0.05"/>
  <line x1="60" y1="60" x2="72" y2="72" stroke="#ff4444" stroke-width="3" filter="url(#glow)" opacity="0.5"/>
  <!-- Magnifier reflection -->
  <path d="M44,45 Q46,42 50,43" fill="none" stroke="#ff8888" stroke-width="0.8" opacity="0.4"/>
  <text x="100" y="170" text-anchor="middle" fill="#ff4444" font-size="11" font-family="Arial" filter="url(#glow)">Bug猎人</text>
</svg>