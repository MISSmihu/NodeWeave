<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0515"/>
      <stop offset="100%" stop-color="#050210"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="party1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff44ff"/>
      <stop offset="100%" stop-color="#bf55ec"/>
    </linearGradient>
    <linearGradient id="party2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#2a1a3a" stroke-width="6"/>
  <!-- Balloon 1 (center) -->
  <ellipse cx="100" cy="80" rx="28" ry="32" fill="none" stroke="url(#party1)" stroke-width="2.5" filter="url(#glow)"/>
  <ellipse cx="100" cy="80" rx="28" ry="32" fill="#ff44ff" opacity="0.08"/>
  <!-- Balloon shine -->
  <ellipse cx="92" cy="70" rx="6" ry="8" fill="#fff" opacity="0.1"/>
  <!-- Balloon tie -->
  <path d="M96,112 L100,118 L104,112" fill="none" stroke="#ff44ff" stroke-width="1.5" filter="url(#glow)"/>
  <!-- String -->
  <path d="M100,118 Q95,135 100,150" fill="none" stroke="#bf55ec" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <!-- Balloon 2 (small left) -->
  <ellipse cx="55" cy="95" rx="18" ry="22" fill="none" stroke="url(#party2)" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  <ellipse cx="55" cy="95" rx="18" ry="22" fill="#ffd700" opacity="0.06"/>
  <path d="M52,117 L55,121 L58,117" fill="none" stroke="#ff8c00" stroke-width="1" filter="url(#glow)" opacity="0.6"/>
  <!-- Balloon 3 (small right) -->
  <ellipse cx="145" cy="95" rx="18" ry="22" fill="none" stroke="url(#party1)" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  <ellipse cx="145" cy="95" rx="18" ry="22" fill="#00bfff" opacity="0.06"/>
  <path d="M142,117 L145,121 L148,117" fill="none" stroke="#00bfff" stroke-width="1" filter="url(#glow)" opacity="0.6"/>
  <!-- Confetti -->
  <rect x="40" y="50" width="5" height="2" rx="1" fill="#ff44ff" transform="rotate(30,42,51)" filter="url(#glow)" opacity="0.6"/>
  <rect x="155" y="55" width="5" height="2" rx="1" fill="#ffd700" transform="rotate(-20,157,56)" filter="url(#glow)" opacity="0.6"/>
  <rect x="35" y="135" width="5" height="2" rx="1" fill="#00ff88" transform="rotate(45,37,136)" filter="url(#glow)" opacity="0.5"/>
  <rect x="160" y="130" width="5" height="2" rx="1" fill="#ff8c00" transform="rotate(-30,162,131)" filter="url(#glow)" opacity="0.5"/>
  <rect x="50" y="155" width="4" height="2" rx="1" fill="#bf55ec" transform="rotate(60,52,156)" filter="url(#glow)" opacity="0.5"/>
  <rect x="150" y="155" width="4" height="2" rx="1" fill="#ff44ff" transform="rotate(-45,152,156)" filter="url(#glow)" opacity="0.5"/>
  <!-- Star confetti -->
  <circle cx="45" cy="120" r="1.5" fill="#ffd700" filter="url(#glow)" opacity="0.5"/>
  <circle cx="155" cy="120" r="1.5" fill="#00bfff" filter="url(#glow)" opacity="0.5"/>
  <circle cx="38" cy="80" r="1" fill="#ff44ff" filter="url(#glow)" opacity="0.4"/>
  <circle cx="162" cy="80" r="1" fill="#ff8c00" filter="url(#glow)" opacity="0.4"/>
  <text x="100" y="170" text-anchor="middle" fill="#ff44ff" font-size="11" font-family="Arial" filter="url(#glow)">派对达人</text>
</svg>