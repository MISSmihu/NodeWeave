<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0510"/>
      <stop offset="100%" stop-color="#0a0208"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="warmPink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb6c1"/>
      <stop offset="50%" stop-color="#ff69b4"/>
      <stop offset="100%" stop-color="#ff1493"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#4a1a2a" stroke-width="6"/>
  <!-- Left hand -->
  <path d="M85,55 Q70,55 60,70 Q52,85 55,105 Q58,120 70,130 Q80,138 90,135 L100,125" fill="none" stroke="url(#warmPink)" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M85,55 Q70,55 60,70 Q52,85 55,105 Q58,120 70,130 Q80,138 90,135 L100,125" fill="#ff69b4" opacity="0.06"/>
  <!-- Right hand (mirrored) -->
  <path d="M115,55 Q130,55 140,70 Q148,85 145,105 Q142,120 130,130 Q120,138 110,135 L100,125" fill="none" stroke="url(#warmPink)" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M115,55 Q130,55 140,70 Q148,85 145,105 Q142,120 130,130 Q120,138 110,135 L100,125" fill="#ff69b4" opacity="0.06"/>
  <!-- Fingers detail left -->
  <path d="M65,60 Q68,52 73,55" fill="none" stroke="#ffb6c1" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <path d="M75,55 Q78,48 83,52" fill="none" stroke="#ffb6c1" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <!-- Fingers detail right -->
  <path d="M135,60 Q132,52 127,55" fill="none" stroke="#ffb6c1" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <path d="M125,55 Q122,48 117,52" fill="none" stroke="#ffb6c1" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <!-- Heart shape in middle -->
  <path d="M100,115 Q85,105 85,90 Q85,80 95,80 Q100,80 100,88 Q100,80 105,80 Q115,80 115,90 Q115,105 100,115 Z" fill="url(#warmPink)" opacity="0.25" filter="url(#glow)"/>
  <path d="M100,115 Q85,105 85,90 Q85,80 95,80 Q100,80 100,88 Q100,80 105,80 Q115,80 115,90 Q115,105 100,115 Z" fill="none" stroke="url(#warmPink)" stroke-width="2" filter="url(#glow)"/>
  <!-- Heart pulse line -->
  <path d="M80,92 L88,92 L92,85 L96,98 L100,88 L104,98 L108,85 L112,92 L120,92" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.4" filter="url(#glow)"/>
  <!-- Warm glow -->
  <circle cx="100" cy="100" r="55" fill="none" stroke="#ff69b4" stroke-width="0.5" opacity="0.15" filter="url(#glow)"/>
  <text x="100" y="165" text-anchor="middle" fill="#ff69b4" font-size="11" font-family="Arial" filter="url(#glow)">知心伙伴</text>
</svg>