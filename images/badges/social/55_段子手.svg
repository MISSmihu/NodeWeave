<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1505"/>
      <stop offset="100%" stop-color="#050a02"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="yellowGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffff00"/>
      <stop offset="50%" stop-color="#adff2f"/>
      <stop offset="100%" stop-color="#7fff00"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#1a3a0a" stroke-width="6"/>
  <!-- Smiley face circle -->
  <circle cx="100" cy="90" r="45" fill="none" stroke="url(#yellowGreen)" stroke-width="3" filter="url(#glow)"/>
  <circle cx="100" cy="90" r="45" fill="#adff2f" opacity="0.08"/>
  <!-- Eyes (laughing squint) -->
  <path d="M80,78 Q85,72 90,78" fill="none" stroke="#ffff00" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M110,78 Q115,72 120,78" fill="none" stroke="#ffff00" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Big smile -->
  <path d="M75,95 Q100,120 125,95" fill="none" stroke="url(#yellowGreen)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M75,95 Q100,120 125,95 Q100,108 75,95 Z" fill="#adff2f" opacity="0.15"/>
  <!-- 哈哈哈 text -->
  <text x="100" y="135" text-anchor="middle" fill="url(#yellowGreen)" font-size="14" font-weight="bold" font-family="Arial" filter="url(#glow)">哈哈哈</text>
  <!-- Floating "ha" particles -->
  <text x="45" y="60" fill="#ffff00" font-size="9" font-family="Arial" filter="url(#glow)" opacity="0.5">哈</text>
  <text x="150" y="55" fill="#adff2f" font-size="10" font-family="Arial" filter="url(#glow)" opacity="0.5">哈</text>
  <text x="40" y="85" fill="#ffff00" font-size="8" font-family="Arial" filter="url(#glow)" opacity="0.4">哈</text>
  <text x="155" y="90" fill="#adff2f" font-size="9" font-family="Arial" filter="url(#glow)" opacity="0.4">哈</text>
  <text x="50" y="115" fill="#ffff00" font-size="7" font-family="Arial" filter="url(#glow)" opacity="0.3">哈</text>
  <text x="148" y="118" fill="#adff2f" font-size="8" font-family="Arial" filter="url(#glow)" opacity="0.3">哈</text>
  <text x="100" y="158" text-anchor="middle" fill="#adff2f" font-size="11" font-family="Arial" filter="url(#glow)">段子手</text>
</svg>