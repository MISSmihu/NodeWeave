<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1505"/>
      <stop offset="100%" stop-color="#0a0a02"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffec8b"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#4a3a1a" stroke-width="6"/>
  <!-- Sofa body -->
  <rect x="50" y="90" width="100" height="42" rx="8" fill="none" stroke="url(#gold)" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="50" y="90" width="100" height="42" rx="8" fill="#ffd700" opacity="0.06"/>
  <!-- Sofa back -->
  <rect x="50" y="68" width="100" height="28" rx="5" fill="none" stroke="url(#gold)" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  <!-- Armrests -->
  <rect x="42" y="72" width="14" height="52" rx="5" fill="none" stroke="url(#gold)" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  <rect x="144" y="72" width="14" height="52" rx="5" fill="none" stroke="url(#gold)" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  <!-- Sofa legs -->
  <line x1="58" y1="132" x2="58" y2="142" stroke="#ffd700" stroke-width="2" filter="url(#glow)"/>
  <line x1="142" y1="132" x2="142" y2="142" stroke="#ffd700" stroke-width="2" filter="url(#glow)"/>
  <!-- Pillow -->
  <ellipse cx="78" cy="100" rx="14" ry="8" fill="none" stroke="#ffec8b" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <!-- 抢 text glowing -->
  <text x="115" y="115" text-anchor="middle" fill="#ffd700" font-size="34" font-weight="bold" font-family="Arial" filter="url(#glow)">抢</text>
  <!-- Light rays from 抢 -->
  <line x1="115" y1="80" x2="115" y2="68" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <line x1="100" y1="85" x2="92" y2="78" stroke="#ffd700" stroke-width="0.8" filter="url(#glow)" opacity="0.3"/>
  <line x1="130" y1="85" x2="138" y2="78" stroke="#ffd700" stroke-width="0.8" filter="url(#glow)" opacity="0.3"/>
  <!-- Decorative stars -->
  <polygon points="50,55 52,62 59,62 53,66 55,73 50,69 45,73 47,66 41,62 48,62" fill="#ffd700" opacity="0.5" filter="url(#glow)"/>
  <polygon points="150,55 152,62 159,62 153,66 155,73 150,69 145,73 147,66 141,62 148,62" fill="#ffd700" opacity="0.5" filter="url(#glow)"/>
  <text x="100" y="158" text-anchor="middle" fill="#ffd700" font-size="11" font-family="Arial" filter="url(#glow)">沙发猎人</text>
</svg>