<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0a15"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="rainbow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <linearGradient id="rainbow2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="50%" stop-color="#00bfff"/>
      <stop offset="100%" stop-color="#bf55ec"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#2a2a3a" stroke-width="6"/>
  <!-- Left upper wing -->
  <path d="M100,90 Q60,55 45,70 Q35,85 50,95 Q70,100 100,95 Z" fill="none" stroke="url(#rainbow1)" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M100,90 Q60,55 45,70 Q35,85 50,95 Q70,100 100,95 Z" fill="#ff4444" opacity="0.08"/>
  <!-- Right upper wing -->
  <path d="M100,90 Q140,55 155,70 Q165,85 150,95 Q130,100 100,95 Z" fill="none" stroke="url(#rainbow1)" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M100,90 Q140,55 155,70 Q165,85 150,95 Q130,100 100,95 Z" fill="#ffd700" opacity="0.08"/>
  <!-- Left lower wing -->
  <path d="M100,100 Q70,115 60,135 Q70,145 85,135 Q95,125 100,108 Z" fill="none" stroke="url(#rainbow2)" stroke-width="2" filter="url(#glow)"/>
  <path d="M100,100 Q70,115 60,135 Q70,145 85,135 Q95,125 100,108 Z" fill="#00ff88" opacity="0.08"/>
  <!-- Right lower wing -->
  <path d="M100,100 Q130,115 140,135 Q130,145 115,135 Q105,125 100,108 Z" fill="none" stroke="url(#rainbow2)" stroke-width="2" filter="url(#glow)"/>
  <path d="M100,100 Q130,115 140,135 Q130,145 115,135 Q105,125 100,108 Z" fill="#bf55ec" opacity="0.08"/>
  <!-- Wing spots/dots -->
  <circle cx="55" cy="80" r="3" fill="#ffd700" filter="url(#glow)" opacity="0.6"/>
  <circle cx="145" cy="80" r="3" fill="#ffd700" filter="url(#glow)" opacity="0.6"/>
  <circle cx="75" cy="125" r="2" fill="#00bfff" filter="url(#glow)" opacity="0.5"/>
  <circle cx="125" cy="125" r="2" fill="#00bfff" filter="url(#glow)" opacity="0.5"/>
  <!-- Butterfly body -->
  <ellipse cx="100" cy="100" rx="4" ry="20" fill="none" stroke="#fff" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <!-- Head -->
  <circle cx="100" cy="78" r="5" fill="none" stroke="#fff" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <!-- Antennae -->
  <path d="M97,75 Q90,65 85,58" fill="none" stroke="#fff" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <path d="M103,75 Q110,65 115,58" fill="none" stroke="#fff" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <circle cx="85" cy="58" r="1.5" fill="#ffd700" filter="url(#glow)" opacity="0.6"/>
  <circle cx="115" cy="58" r="1.5" fill="#ffd700" filter="url(#glow)" opacity="0.6"/>
  <!-- Social network nodes -->
  <circle cx="40" cy="50" r="2" fill="#ff4444" opacity="0.4" filter="url(#glow)"/>
  <circle cx="160" cy="50" r="2" fill="#ff4444" opacity="0.4" filter="url(#glow)"/>
  <circle cx="35" cy="145" r="2" fill="#bf55ec" opacity="0.4" filter="url(#glow)"/>
  <circle cx="165" cy="145" r="2" fill="#bf55ec" opacity="0.4" filter="url(#glow)"/>
  <line x1="40" y1="50" x2="100" y2="80" stroke="#fff" stroke-width="0.3" opacity="0.15"/>
  <line x1="160" y1="50" x2="100" y2="80" stroke="#fff" stroke-width="0.3" opacity="0.15"/>
  <text x="100" y="165" text-anchor="middle" fill="#ffd700" font-size="11" font-family="Arial" filter="url(#glow)">社交蝴蝶</text>
</svg>