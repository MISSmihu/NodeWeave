<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#050a1a"/>
      <stop offset="100%" stop-color="#020510"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00bfff"/>
      <stop offset="100%" stop-color="#1e90ff"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#1a2a4a" stroke-width="6"/>
  <!-- Whale body -->
  <path d="M40,90 Q40,65 70,60 Q100,55 130,65 Q155,72 160,90 Q162,100 155,108 Q145,115 130,115 L55,115 Q40,112 40,90 Z" fill="none" stroke="url(#blue)" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M40,90 Q40,65 70,60 Q100,55 130,65 Q155,72 160,90 Q162,100 155,108 Q145,115 130,115 L55,115 Q40,112 40,90 Z" fill="#00bfff" opacity="0.06"/>
  <!-- Whale tail -->
  <path d="M40,85 Q30,70 20,60 Q25,65 30,75" fill="none" stroke="#00bfff" stroke-width="2" filter="url(#glow)" opacity="0.7"/>
  <path d="M40,95 Q30,110 20,120 Q25,115 30,105" fill="none" stroke="#00bfff" stroke-width="2" filter="url(#glow)" opacity="0.7"/>
  <!-- Whale eye -->
  <circle cx="145" cy="82" r="5" fill="none" stroke="#00bfff" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
  <circle cx="145" cy="82" r="2" fill="#00bfff" opacity="0.5"/>
  <!-- Whale mouth -->
  <path d="M155,95 Q150,98 145,95" fill="none" stroke="#00bfff" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <!-- Container blocks on whale back -->
  <rect x="60" y="62" width="16" height="12" rx="1" fill="none" stroke="#00bfff" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <rect x="78" y="62" width="16" height="12" rx="1" fill="none" stroke="#00bfff" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <rect x="96" y="62" width="16" height="12" rx="1" fill="none" stroke="#00bfff" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <rect x="114" y="62" width="16" height="12" rx="1" fill="none" stroke="#00bfff" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <!-- Second row containers -->
  <rect x="69" y="48" width="16" height="12" rx="1" fill="none" stroke="#00bfff" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <rect x="87" y="48" width="16" height="12" rx="1" fill="none" stroke="#00bfff" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <rect x="105" y="48" width="16" height="12" rx="1" fill="none" stroke="#00bfff" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <!-- Water spout -->
  <path d="M85,55 Q82,40 78,30 Q85,38 90,30 Q88,42 85,55" fill="none" stroke="#00bfff" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <text x="100" y="145" text-anchor="middle" fill="#00bfff" font-size="11" font-family="Arial" filter="url(#glow)">Docker鲸鱼</text>
</svg>