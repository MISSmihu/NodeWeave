<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#100520"/>
      <stop offset="100%" stop-color="#080210"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bf55ec"/>
      <stop offset="100%" stop-color="#8e44ad"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <!-- Heptagon outer frame -->
  <polygon points="100,15 163,50 183,118 142,175 58,175 17,118 37,50" fill="none" stroke="#8e44ad" stroke-width="3" filter="url(#glow)" opacity="0.4"/>
  <!-- Steering wheel -->
  <circle cx="100" cy="95" r="45" fill="none" stroke="url(#purple)" stroke-width="3" filter="url(#glow)"/>
  <circle cx="100" cy="95" r="38" fill="none" stroke="#bf55ec" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <!-- Wheel spokes -->
  <line x1="100" y1="50" x2="100" y2="140" stroke="#bf55ec" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <line x1="55" y1="95" x2="145" y2="95" stroke="#bf55ec" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <line x1="68" y1="63" x2="132" y2="127" stroke="#bf55ec" stroke-width="1.5" filter="url(#glow)" opacity="0.4"/>
  <line x1="132" y1="63" x2="68" y2="127" stroke="#bf55ec" stroke-width="1.5" filter="url(#glow)" opacity="0.4"/>
  <!-- Center hub -->
  <circle cx="100" cy="95" r="12" fill="none" stroke="url(#purple)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="100" cy="95" r="12" fill="#bf55ec" opacity="0.1"/>
  <!-- K8s text -->
  <text x="100" y="100" text-anchor="middle" fill="url(#purple)" font-size="13" font-weight="bold" font-family="Arial" filter="url(#glow)">K8s</text>
  <!-- Handle knobs -->
  <circle cx="100" cy="50" r="4" fill="none" stroke="#bf55ec" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <circle cx="145" cy="95" r="4" fill="none" stroke="#bf55ec" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <circle cx="100" cy="140" r="4" fill="none" stroke="#bf55ec" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <circle cx="55" cy="95" r="4" fill="none" stroke="#bf55ec" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <text x="100" y="175" text-anchor="middle" fill="#bf55ec" font-size="11" font-family="Arial" filter="url(#glow)">K8s舵手</text>
</svg>