<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#051508"/>
      <stop offset="100%" stop-color="#020a05"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc66"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#0a3a1a" stroke-width="6"/>
  <!-- Penguin body silhouette -->
  <ellipse cx="100" cy="110" rx="40" ry="50" fill="none" stroke="url(#green)" stroke-width="2.5" filter="url(#glow)"/>
  <ellipse cx="100" cy="110" rx="40" ry="50" fill="#00ff88" opacity="0.06"/>
  <!-- Penguin head -->
  <circle cx="100" cy="68" r="25" fill="none" stroke="url(#green)" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="100" cy="68" r="25" fill="#00ff88" opacity="0.06"/>
  <!-- White belly -->
  <ellipse cx="100" cy="115" rx="22" ry="35" fill="#00ff88" opacity="0.1"/>
  <!-- Beak -->
  <path d="M95,75 L100,85 L105,75 Z" fill="#00ff88" opacity="0.4" filter="url(#glow)"/>
  <!-- Eyes -->
  <circle cx="90" cy="63" r="5" fill="none" stroke="#00ff88" stroke-width="1" filter="url(#glow)" opacity="0.6"/>
  <circle cx="110" cy="63" r="5" fill="none" stroke="#00ff88" stroke-width="1" filter="url(#glow)" opacity="0.6"/>
  <circle cx="90" cy="63" r="2" fill="#00ff88" opacity="0.5"/>
  <circle cx="110" cy="63" r="2" fill="#00ff88" opacity="0.5"/>
  <!-- Feet -->
  <path d="M82,155 Q78,162 75,165 Q80,163 85,158" fill="none" stroke="#00ff88" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <path d="M118,155 Q122,162 125,165 Q120,163 115,158" fill="none" stroke="#00ff88" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <!-- Wings -->
  <path d="M65,95 Q58,105 60,120 Q63,135 68,145" fill="none" stroke="#00ff88" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <path d="M135,95 Q142,105 140,120 Q137,135 132,145" fill="none" stroke="#00ff88" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <!-- Bow tie -->
  <path d="M88,90 L100,95 L112,90 L112,100 L100,95 L88,100 Z" fill="#00ff88" opacity="0.3" filter="url(#glow)"/>
  <text x="100" y="175" text-anchor="middle" fill="#00ff88" font-size="11" font-family="Arial" filter="url(#glow)">Linux企鹅</text>
</svg>