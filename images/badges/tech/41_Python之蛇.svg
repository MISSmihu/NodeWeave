<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1508"/>
      <stop offset="100%" stop-color="#050a05"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="snakeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffff00"/>
      <stop offset="50%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc66"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#1a3a1a" stroke-width="6"/>
  <!-- Coiled snake body -->
  <path d="M120,55 Q140,55 145,70 Q150,90 130,100 Q110,110 90,100 Q70,90 75,70 Q80,55 100,55" fill="none" stroke="url(#snakeGrad)" stroke-width="4" filter="url(#glow)"/>
  <!-- Snake inner coil -->
  <path d="M110,65 Q125,65 128,75 Q130,88 115,95 Q100,100 90,92 Q80,82 85,72 Q90,65 100,65" fill="none" stroke="#00ff88" stroke-width="3" filter="url(#glow)" opacity="0.7"/>
  <!-- Snake head -->
  <circle cx="120" cy="55" r="12" fill="none" stroke="#ffff00" stroke-width="2" filter="url(#glow)"/>
  <circle cx="120" cy="55" r="12" fill="#ffff00" opacity="0.08"/>
  <!-- Snake eyes -->
  <circle cx="116" cy="52" r="2.5" fill="#ffff00" filter="url(#glow)" opacity="0.8"/>
  <circle cx="126" cy="52" r="2.5" fill="#ffff00" filter="url(#glow)" opacity="0.8"/>
  <circle cx="116" cy="52" r="1" fill="#003300"/>
  <circle cx="126" cy="52" r="1" fill="#003300"/>
  <!-- Forked tongue -->
  <path d="M120,60 L118,70 L116,72 M118,70 L120,72" fill="none" stroke="#ff4444" stroke-width="1" filter="url(#glow)" opacity="0.6"/>
  <!-- Code texture on body -->
  <text x="85" y="78" fill="#00ff88" font-size="6" font-family="monospace" opacity="0.4" filter="url(#glow)">def</text>
  <text x="100" y="88" fill="#ffff00" font-size="6" font-family="monospace" opacity="0.3" filter="url(#glow)">py</text>
  <!-- Tail tip -->
  <path d="M95,100 Q88,105 82,108 Q78,110 75,115" fill="none" stroke="#00cc66" stroke-width="2" filter="url(#glow)" opacity="0.5"/>
  <text x="100" y="145" text-anchor="middle" fill="#00ff88" font-size="11" font-family="Arial" filter="url(#glow)">Python之蛇</text>
</svg>