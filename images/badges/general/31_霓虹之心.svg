<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a15"/>
      <stop offset="100%" stop-color="#0a0510"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="pinkNeon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff69b4"/>
      <stop offset="50%" stop-color="#ff1493"/>
      <stop offset="100%" stop-color="#ff69b4"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#3a1a2a" stroke-width="6"/>
  <!-- Heart shape cyberpunk -->
  <path d="M100,140 Q55,105 55,72 Q55,42 78,42 Q95,42 100,62 Q105,42 122,42 Q145,42 145,72 Q145,105 100,140 Z" fill="none" stroke="url(#pinkNeon)" stroke-width="3" filter="url(#glow)"/>
  <path d="M100,140 Q55,105 55,72 Q55,42 78,42 Q95,42 100,62 Q105,42 122,42 Q145,42 145,72 Q145,105 100,140 Z" fill="#ff69b4" opacity="0.08"/>
  <!-- Crack lines -->
  <path d="M100,90 L92,78 L95,68 L88,58" fill="none" stroke="#ff1493" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
  <path d="M100,90 L105,80 L112,72" fill="none" stroke="#ff1493" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <path d="M92,78 L85,82 L80,78" fill="none" stroke="#ff69b4" stroke-width="0.8" filter="url(#glow)" opacity="0.4"/>
  <!-- Mechanical parts -->
  <circle cx="80" cy="60" r="5" fill="none" stroke="#ff69b4" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <circle cx="80" cy="60" r="2" fill="#ff69b4" opacity="0.4"/>
  <circle cx="125" cy="55" r="4" fill="none" stroke="#ff1493" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <rect x="72" y="95" width="8" height="8" rx="1" fill="none" stroke="#ff69b4" stroke-width="0.8" filter="url(#glow)" opacity="0.4"/>
  <!-- Gear accent -->
  <circle cx="120" cy="85" r="6" fill="none" stroke="#ff1493" stroke-width="0.8" opacity="0.3"/>
  <line x1="120" y1="79" x2="120" y2="91" stroke="#ff1493" stroke-width="0.5" opacity="0.3"/>
  <line x1="114" y1="85" x2="126" y2="85" stroke="#ff1493" stroke-width="0.5" opacity="0.3"/>
  <text x="100" y="170" text-anchor="middle" fill="#ff69b4" font-size="11" font-family="Arial" filter="url(#glow)">霓虹之心</text>
</svg>