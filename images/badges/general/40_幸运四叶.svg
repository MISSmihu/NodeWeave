<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#05150a"/>
      <stop offset="100%" stop-color="#020a05"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc66"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#0a3a1a" stroke-width="6"/>
  <!-- Four leaf clover -->
  <!-- Top leaf -->
  <path d="M100,55 Q115,55 118,70 Q120,85 100,85 Q80,85 82,70 Q85,55 100,55 Z" fill="none" stroke="url(#green)" stroke-width="2" filter="url(#glow)"/>
  <path d="M100,55 Q115,55 118,70 Q120,85 100,85 Q80,85 82,70 Q85,55 100,55 Z" fill="#00ff88" opacity="0.1"/>
  <!-- Right leaf -->
  <path d="M130,90 Q130,75 115,72 Q100,70 100,90 Q100,110 115,108 Q130,105 130,90 Z" fill="none" stroke="url(#green)" stroke-width="2" filter="url(#glow)"/>
  <path d="M130,90 Q130,75 115,72 Q100,70 100,90 Q100,110 115,108 Q130,105 130,90 Z" fill="#00ff88" opacity="0.1"/>
  <!-- Bottom leaf -->
  <path d="M100,95 Q85,95 82,110 Q80,125 100,125 Q120,125 118,110 Q115,95 100,95 Z" fill="none" stroke="url(#green)" stroke-width="2" filter="url(#glow)"/>
  <path d="M100,95 Q85,95 82,110 Q80,125 100,125 Q120,125 118,110 Q115,95 100,95 Z" fill="#00ff88" opacity="0.1"/>
  <!-- Left leaf -->
  <path d="M70,90 Q70,105 85,108 Q100,110 100,90 Q100,70 85,72 Q70,75 70,90 Z" fill="none" stroke="url(#green)" stroke-width="2" filter="url(#glow)"/>
  <path d="M70,90 Q70,105 85,108 Q100,110 100,90 Q100,70 85,72 Q70,75 70,90 Z" fill="#00ff88" opacity="0.1"/>
  <!-- Center -->
  <circle cx="100" cy="90" r="5" fill="#00ff88" opacity="0.4" filter="url(#glow)"/>
  <!-- Stem -->
  <path d="M100,125 Q98,140 95,155" fill="none" stroke="#00cc66" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <!-- Dew drops -->
  <circle cx="105" cy="65" r="2.5" fill="none" stroke="#00ff88" stroke-width="1" filter="url(#glow)" opacity="0.6"/>
  <circle cx="105" cy="65" r="1" fill="#00ff88" opacity="0.4"/>
  <circle cx="120" cy="95" r="2" fill="none" stroke="#00ff88" stroke-width="0.8" filter="url(#glow)" opacity="0.5"/>
  <circle cx="120" cy="95" r="0.8" fill="#00ff88" opacity="0.3"/>
  <!-- Lucky aura ring -->
  <circle cx="100" cy="90" r="55" fill="none" stroke="#00ff88" stroke-width="0.8" filter="url(#glow)" opacity="0.2"/>
  <!-- Sparkle -->
  <g transform="translate(140,55)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#00ff88" stroke-width="0.8" filter="url(#glow)" opacity="0.5"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#00ff88" stroke-width="0.8" filter="url(#glow)" opacity="0.5"/>
  </g>
  <g transform="translate(55,60)">
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#00ff88" stroke-width="0.8" filter="url(#glow)" opacity="0.4"/>
    <line x1="-4" y1="0" x2="4" y2="0" stroke="#00ff88" stroke-width="0.8" filter="url(#glow)" opacity="0.4"/>
  </g>
  <text x="100" y="175" text-anchor="middle" fill="#00ff88" font-size="11" font-family="Arial" filter="url(#glow)">幸运四叶</text>
</svg>