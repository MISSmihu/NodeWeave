<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a05"/>
      <stop offset="100%" stop-color="#0a0502"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="flame" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#ff4500"/>
      <stop offset="40%" stop-color="#ff6a00"/>
      <stop offset="100%" stop-color="#ffaa00"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#4a2010" stroke-width="6"/>
  <!-- Phoenix wings spread wide -->
  <!-- Left wing -->
  <path d="M100,95 Q70,60 30,50 Q50,65 55,80 Q60,75 45,60" fill="none" stroke="url(#flame)" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  <path d="M100,95 Q75,70 35,65 Q55,75 60,90" fill="none" stroke="#ff6a00" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <path d="M100,100 Q80,85 50,80 Q65,88 70,100" fill="none" stroke="#ff4500" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <!-- Right wing -->
  <path d="M100,95 Q130,60 170,50 Q150,65 145,80 Q140,75 155,60" fill="none" stroke="url(#flame)" stroke-width="2" filter="url(#glow)" opacity="0.8"/>
  <path d="M100,95 Q125,70 165,65 Q145,75 140,90" fill="none" stroke="#ff6a00" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <path d="M100,100 Q120,85 150,80 Q135,88 130,100" fill="none" stroke="#ff4500" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <!-- Body -->
  <path d="M100,130 Q90,110 95,90 Q98,80 100,75 Q102,80 105,90 Q110,110 100,130" fill="none" stroke="url(#flame)" stroke-width="2" filter="url(#glow)"/>
  <path d="M100,130 Q95,120 97,105 Q99,95 100,90 Q101,95 103,105 Q105,120 100,130" fill="url(#flame)" opacity="0.2"/>
  <!-- Head -->
  <circle cx="100" cy="75" r="10" fill="none" stroke="#ffaa00" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Head crest -->
  <path d="M95,68 Q90,55 85,45" fill="none" stroke="#ffaa00" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
  <path d="M100,67 Q100,52 100,40" fill="none" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)" opacity="0.8"/>
  <path d="M105,68 Q110,55 115,45" fill="none" stroke="#ffaa00" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
  <!-- Tail feathers going down -->
  <path d="M100,130 Q85,145 75,160" fill="none" stroke="#ff6a00" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <path d="M100,130 Q100,148 100,165" fill="none" stroke="#ff4500" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
  <path d="M100,130 Q115,145 125,160" fill="none" stroke="#ff6a00" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <!-- Fire particles -->
  <circle cx="50" cy="55" r="1.5" fill="#ff6a00" filter="url(#glow)" opacity="0.5"/>
  <circle cx="150" cy="55" r="1.5" fill="#ff6a00" filter="url(#glow)" opacity="0.5"/>
  <circle cx="85" cy="45" r="1" fill="#ffaa00" filter="url(#glow)" opacity="0.6"/>
  <circle cx="115" cy="45" r="1" fill="#ffaa00" filter="url(#glow)" opacity="0.6"/>
  <text x="100" y="175" text-anchor="middle" fill="#ff6a00" font-size="11" font-family="Arial" filter="url(#glow)">凤凰涅槃</text>
</svg>