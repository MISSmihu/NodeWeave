<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0520"/>
      <stop offset="100%" stop-color="#050210"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="purple" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="50%" stop-color="#bf55ec"/>
      <stop offset="100%" stop-color="#e0b0ff"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#1a0a3a" stroke-width="6"/>
  <!-- Stars background -->
  <circle cx="40" cy="35" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="155" cy="30" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="30" cy="80" r="0.6" fill="#fff" opacity="0.3"/>
  <circle cx="165" cy="75" r="1" fill="#fff" opacity="0.35"/>
  <circle cx="50" cy="150" r="0.8" fill="#fff" opacity="0.25"/>
  <circle cx="150" cy="155" r="0.6" fill="#fff" opacity="0.3"/>
  <circle cx="35" cy="120" r="0.7" fill="#fff" opacity="0.3"/>
  <circle cx="160" cy="120" r="0.8" fill="#fff" opacity="0.25"/>
  <!-- Planet -->
  <circle cx="150" cy="55" r="12" fill="none" stroke="#bf55ec" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <circle cx="150" cy="55" r="12" fill="#9b59b6" opacity="0.15"/>
  <path d="M140,52 Q150,48 160,52" fill="none" stroke="#bf55ec" stroke-width="0.5" opacity="0.3"/>
  <!-- Ring around planet -->
  <ellipse cx="150" cy="55" rx="20" ry="5" fill="none" stroke="#bf55ec" stroke-width="0.8" opacity="0.4" transform="rotate(-20,150,55)"/>
  <!-- Rocket body -->
  <path d="M85,120 L85,60 Q100,35 115,60 L115,120 Z" fill="none" stroke="#ddd" stroke-width="2" filter="url(#glow)"/>
  <path d="M85,120 L85,60 Q100,35 115,60 L115,120 Z" fill="#ffffff" opacity="0.05"/>
  <!-- Rocket window -->
  <circle cx="100" cy="75" r="8" fill="none" stroke="#bf55ec" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="100" cy="75" r="5" fill="#bf55ec" opacity="0.2" filter="url(#glow)"/>
  <!-- Rocket fins -->
  <path d="M85,110 L70,125 L85,120" fill="none" stroke="#ddd" stroke-width="1.5" filter="url(#glow)"/>
  <path d="M115,110 L130,125 L115,120" fill="none" stroke="#ddd" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Rocket nose -->
  <path d="M92,55 Q100,38 108,55" fill="none" stroke="#ddd" stroke-width="1" filter="url(#glow)"/>
  <!-- Purple flame/exhaust -->
  <path d="M88,120 Q90,140 95,150 Q100,155 105,150 Q110,140 112,120" fill="url(#purple)" opacity="0.5" filter="url(#glow)"/>
  <path d="M92,120 Q95,135 100,145 Q105,135 108,120" fill="#bf55ec" opacity="0.3" filter="url(#glow)"/>
  <!-- Another small planet -->
  <circle cx="45" cy="140" r="8" fill="none" stroke="#9b59b6" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <text x="100" y="170" text-anchor="middle" fill="#bf55ec" font-size="11" font-family="Arial" filter="url(#glow)">太空漫游</text>
</svg>