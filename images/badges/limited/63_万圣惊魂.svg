<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a05"/>
      <stop offset="100%" stop-color="#0a0502"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="pumpkinOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8c00"/>
      <stop offset="50%" stop-color="#ff6a00"/>
      <stop offset="100%" stop-color="#cc4400"/>
    </linearGradient>
    <linearGradient id="ghostly" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#88ddff"/>
      <stop offset="100%" stop-color="#aaeeff"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#4a2010" stroke-width="6"/>
  <!-- Pumpkin body -->
  <ellipse cx="100" cy="110" rx="48" ry="40" fill="none" stroke="url(#pumpkinOrange)" stroke-width="3" filter="url(#glow)"/>
  <ellipse cx="100" cy="110" rx="48" ry="40" fill="#ff8c00" opacity="0.08"/>
  <!-- Pumpkin ridges -->
  <ellipse cx="80" cy="110" rx="8" ry="38" fill="none" stroke="#ff6a00" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <ellipse cx="120" cy="110" rx="8" ry="38" fill="none" stroke="#ff6a00" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <ellipse cx="100" cy="110" rx="8" ry="38" fill="none" stroke="#ff6a00" stroke-width="0.8" filter="url(#glow)" opacity="0.3"/>
  <!-- Pumpkin stem -->
  <rect x="95" y="60" width="10" height="15" rx="2" fill="none" stroke="#8b4513" stroke-width="2" filter="url(#glow)" opacity="0.6"/>
  <path d="M105,65 Q115,55 110,50" fill="none" stroke="#8b4513" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <!-- Triangle eyes -->
  <polygon points="78,95 92,95 85,108" fill="none" stroke="url(#pumpkinOrange)" stroke-width="2" filter="url(#glow)"/>
  <polygon points="78,95 92,95 85,108" fill="#ffd700" opacity="0.3" filter="url(#glow)"/>
  <polygon points="108,95 122,95 115,108" fill="none" stroke="url(#pumpkinOrange)" stroke-width="2" filter="url(#glow)"/>
  <polygon points="108,95 122,95 115,108" fill="#ffd700" opacity="0.3" filter="url(#glow)"/>
  <!-- Nose (triangle) -->
  <polygon points="97,112 103,112 100,120" fill="none" stroke="url(#pumpkinOrange)" stroke-width="1.5" filter="url(#glow)"/>
  <polygon points="97,112 103,112 100,120" fill="#ffd700" opacity="0.25"/>
  <!-- Jagged mouth -->
  <path d="M75,128 L82,135 L88,128 L95,138 L100,128 L105,138 L112,128 L118,135 L125,128" fill="none" stroke="url(#pumpkinOrange)" stroke-width="2" filter="url(#glow)"/>
  <path d="M75,128 L82,135 L88,128 L95,138 L100,128 L105,138 L112,128 L118,135 L125,128 L125,132 L120,138 L115,132 L110,142 L100,132 L90,142 L85,132 L80,138 L75,132 Z" fill="#ffd700" opacity="0.2"/>
  <!-- Ghost wisps -->
  <path d="M40,70 Q42,60 38,55 Q44,58 42,68" fill="none" stroke="url(#ghostly)" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <path d="M160,65 Q158,55 162,50 Q156,53 158,63" fill="none" stroke="url(#ghostly)" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <text x="100" y="170" text-anchor="middle" fill="#ff8c00" font-size="11" font-family="Arial" filter="url(#glow)">万圣惊魂</text>
</svg>