<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#0a0202"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="chinaRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff0033"/>
      <stop offset="50%" stop-color="#e60026"/>
      <stop offset="100%" stop-color="#cc0019"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#5a1a1a" stroke-width="6"/>
  <!-- Red envelope -->
  <rect x="55" y="45" width="90" height="120" rx="8" fill="none" stroke="url(#chinaRed)" stroke-width="3" filter="url(#glow)"/>
  <rect x="55" y="45" width="90" height="120" rx="8" fill="#e60026" opacity="0.1"/>
  <!-- Envelope flap -->
  <path d="M55,53 L100,85 L145,53" fill="none" stroke="url(#gold)" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <!-- Gold border decoration -->
  <rect x="60" y="50" width="80" height="110" rx="5" fill="none" stroke="url(#gold)" stroke-width="0.8" filter="url(#glow)" opacity="0.4"/>
  <!-- 福 character -->
  <circle cx="100" cy="110" r="25" fill="none" stroke="url(#gold)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="100" cy="110" r="25" fill="#ffd700" opacity="0.08"/>
  <text x="100" y="120" text-anchor="middle" fill="url(#gold)" font-size="32" font-weight="bold" font-family="serif" filter="url(#glow)">福</text>
  <!-- Corner decorations -->
  <path d="M65,58 L65,65 L72,65" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <path d="M135,58 L135,65 L128,65" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <path d="M65,152 L65,145 L72,145" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <path d="M135,152 L135,145 L128,145" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <!-- Gold coins floating -->
  <circle cx="40" cy="70" r="5" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <circle cx="160" cy="75" r="5" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.4"/>
  <circle cx="40" cy="90" r="4" fill="none" stroke="#ffd700" stroke-width="0.8" filter="url(#glow)" opacity="0.3"/>
  <text x="100" y="178" text-anchor="middle" fill="#ffd700" font-size="11" font-family="Arial" filter="url(#glow)">新年快乐</text>
</svg>