<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#100520"/>
      <stop offset="100%" stop-color="#080210"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="darkPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#6c3483"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8e0d0"/>
      <stop offset="100%" stop-color="#c0b0a0"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#2a1a3a" stroke-width="6"/>
  <!-- Moon background -->
  <circle cx="130" cy="65" r="30" fill="url(#moonGlow)" opacity="0.15" filter="url(#glow)"/>
  <circle cx="130" cy="65" r="30" fill="none" stroke="#e8e0d0" stroke-width="1.5" filter="url(#glow)" opacity="0.4"/>
  <!-- Crescent -->
  <circle cx="138" cy="60" r="22" fill="url(#bg)" opacity="0.6"/>
  <!-- Stars -->
  <circle cx="55" cy="45" r="1.5" fill="#e8e0d0" filter="url(#glow)" opacity="0.6"/>
  <circle cx="75" cy="35" r="1" fill="#e8e0d0" filter="url(#glow)" opacity="0.5"/>
  <circle cx="45" cy="70" r="1" fill="#e8e0d0" filter="url(#glow)" opacity="0.4"/>
  <circle cx="160" cy="40" r="1.5" fill="#e8e0d0" filter="url(#glow)" opacity="0.5"/>
  <circle cx="70" cy="60" r="0.8" fill="#e8e0d0" filter="url(#glow)" opacity="0.4"/>
  <!-- Owl body -->
  <ellipse cx="100" cy="120" rx="30" ry="35" fill="none" stroke="url(#darkPurple)" stroke-width="2.5" filter="url(#glow)"/>
  <ellipse cx="100" cy="120" rx="30" ry="35" fill="#9b59b6" opacity="0.08"/>
  <!-- Owl head -->
  <circle cx="100" cy="95" r="22" fill="none" stroke="url(#darkPurple)" stroke-width="2" filter="url(#glow)"/>
  <!-- Ear tufts -->
  <path d="M82,80 L78,65 L88,78" fill="none" stroke="#9b59b6" stroke-width="1.5" filter="url(#glow)"/>
  <path d="M118,80 L122,65 L112,78" fill="none" stroke="#9b59b6" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Eyes -->
  <circle cx="90" cy="92" r="8" fill="none" stroke="#9b59b6" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="110" cy="92" r="8" fill="none" stroke="#9b59b6" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="90" cy="92" r="3" fill="#9b59b6" filter="url(#glow)" opacity="0.6"/>
  <circle cx="110" cy="92" r="3" fill="#9b59b6" filter="url(#glow)" opacity="0.6"/>
  <!-- Beak -->
  <path d="M100,98 L96,105 L104,105 Z" fill="#9b59b6" opacity="0.4" filter="url(#glow)"/>
  <!-- Number 5 -->
  <text x="100" y="140" text-anchor="middle" fill="#9b59b6" font-size="14" font-weight="bold" font-family="Arial" filter="url(#glow)">5</text>
  <text x="100" y="170" text-anchor="middle" fill="#9b59b6" font-size="11" font-family="Arial" filter="url(#glow)">深夜活跃</text>
</svg>