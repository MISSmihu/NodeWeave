<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1520"/>
      <stop offset="100%" stop-color="#050a10"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00fff5"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#1a3a4a" stroke-width="6"/>
  <!-- Halo ring -->
  <ellipse cx="100" cy="130" rx="55" ry="10" fill="none" stroke="#00fff5" stroke-width="1.5" filter="url(#glow)" opacity="0.5"/>
  <!-- Person silhouette -->
  <circle cx="100" cy="60" r="18" fill="none" stroke="url(#cyan)" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="100" cy="60" r="18" fill="#00fff5" opacity="0.08"/>
  <path d="M70,110 Q70,85 100,85 Q130,85 130,110 L130,135 Q130,140 125,140 L75,140 Q70,140 70,135 Z" fill="none" stroke="url(#cyan)" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M70,110 Q70,85 100,85 Q130,85 130,110 L130,135 Q130,140 125,140 L75,140 Q70,140 70,135 Z" fill="#00fff5" opacity="0.08"/>
  <!-- Number 100 -->
  <text x="100" y="118" text-anchor="middle" fill="#00fff5" font-size="26" font-weight="bold" font-family="Arial" filter="url(#glow)">100</text>
  <!-- Glow around figure -->
  <circle cx="100" cy="90" r="45" fill="none" stroke="#00fff5" stroke-width="0.8" opacity="0.2" filter="url(#glow)"/>
  <text x="100" y="170" text-anchor="middle" fill="#00fff5" font-size="11" font-family="Arial" filter="url(#glow)">关注破百</text>
</svg>