<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a25"/>
      <stop offset="100%" stop-color="#0a0515"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bf55ec"/>
      <stop offset="100%" stop-color="#8e44ad"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#4a2a5a" stroke-width="6"/>
  <!-- Scroll shape -->
  <path d="M55,50 Q55,40 70,40 L130,40 Q145,40 145,50 L145,140 Q145,155 130,155 L70,155 Q55,155 55,140 Z" fill="none" stroke="url(#purple)" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Scroll rolls top -->
  <ellipse cx="70" cy="40" rx="18" ry="6" fill="none" stroke="#bf55ec" stroke-width="2" filter="url(#glow)"/>
  <ellipse cx="130" cy="40" rx="18" ry="6" fill="none" stroke="#bf55ec" stroke-width="2" filter="url(#glow)"/>
  <!-- Scroll rolls bottom -->
  <ellipse cx="70" cy="155" rx="18" ry="6" fill="none" stroke="#bf55ec" stroke-width="2" filter="url(#glow)"/>
  <ellipse cx="130" cy="155" rx="18" ry="6" fill="none" stroke="#bf55ec" stroke-width="2" filter="url(#glow)"/>
  <!-- Data stream lines -->
  <line x1="70" y1="60" x2="130" y2="60" stroke="#bf55ec" stroke-width="0.8" opacity="0.3"/>
  <line x1="70" y1="70" x2="125" y2="70" stroke="#bf55ec" stroke-width="0.8" opacity="0.3"/>
  <line x1="70" y1="80" x2="130" y2="80" stroke="#bf55ec" stroke-width="0.8" opacity="0.3"/>
  <line x1="70" y1="110" x2="130" y2="110" stroke="#bf55ec" stroke-width="0.8" opacity="0.3"/>
  <line x1="70" y1="120" x2="120" y2="120" stroke="#bf55ec" stroke-width="0.8" opacity="0.3"/>
  <line x1="70" y1="130" x2="130" y2="130" stroke="#bf55ec" stroke-width="0.8" opacity="0.3"/>
  <!-- Number 100 -->
  <text x="100" y="100" text-anchor="middle" fill="#bf55ec" font-size="34" font-weight="bold" font-family="Arial" filter="url(#glow)">100</text>
  <text x="100" y="180" text-anchor="middle" fill="#bf55ec" font-size="11" font-family="Arial" filter="url(#glow)">百帖宗师</text>
</svg>