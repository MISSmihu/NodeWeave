<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f0a20"/>
      <stop offset="100%" stop-color="#050310"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="purpleGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#9b59b6"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#5a2d6a" stroke-width="6"/>
  <!-- Galaxy/milky way texture dots -->
  <circle cx="40" cy="50" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="155" cy="45" r="0.6" fill="#fff" opacity="0.2"/>
  <circle cx="30" cy="130" r="0.7" fill="#fff" opacity="0.25"/>
  <circle cx="165" cy="140" r="0.5" fill="#fff" opacity="0.3"/>
  <circle cx="50" cy="160" r="0.8" fill="#fff" opacity="0.2"/>
  <circle cx="150" cy="30" r="0.6" fill="#fff" opacity="0.25"/>
  <circle cx="160" cy="80" r="0.7" fill="#fff" opacity="0.2"/>
  <circle cx="35" cy="85" r="0.5" fill="#fff" opacity="0.3"/>
  <!-- Constellation pattern -->
  <circle cx="65" cy="55" r="2" fill="#ffd700" filter="url(#glow)" opacity="0.7"/>
  <circle cx="135" cy="55" r="2" fill="#9b59b6" filter="url(#glow)" opacity="0.7"/>
  <circle cx="55" cy="100" r="2" fill="#ffd700" filter="url(#glow)" opacity="0.6"/>
  <circle cx="145" cy="100" r="2" fill="#9b59b6" filter="url(#glow)" opacity="0.6"/>
  <circle cx="65" cy="145" r="2" fill="#ffd700" filter="url(#glow)" opacity="0.7"/>
  <circle cx="135" cy="145" r="2" fill="#9b59b6" filter="url(#glow)" opacity="0.7"/>
  <!-- Constellation lines -->
  <line x1="65" y1="55" x2="55" y2="100" stroke="#ffd700" stroke-width="0.5" opacity="0.3"/>
  <line x1="135" y1="55" x2="145" y2="100" stroke="#9b59b6" stroke-width="0.5" opacity="0.3"/>
  <line x1="55" y1="100" x2="65" y2="145" stroke="#ffd700" stroke-width="0.5" opacity="0.3"/>
  <line x1="145" y1="100" x2="135" y2="145" stroke="#9b59b6" stroke-width="0.5" opacity="0.3"/>
  <line x1="65" y1="55" x2="135" y2="55" stroke="#c084fc" stroke-width="0.5" opacity="0.2"/>
  <line x1="65" y1="145" x2="135" y2="145" stroke="#c084fc" stroke-width="0.5" opacity="0.2"/>
  <!-- Central star -->
  <polygon points="100,50 108,75 135,80 115,95 120,122 100,108 80,122 85,95 65,80 92,75" fill="none" stroke="url(#purpleGold)" stroke-width="2" filter="url(#glow)"/>
  <!-- Number 1000 -->
  <text x="100" y="100" text-anchor="middle" fill="url(#purpleGold)" font-size="28" font-weight="bold" font-family="Arial" filter="url(#glow)">1000</text>
  <text x="100" y="170" text-anchor="middle" fill="#c084fc" font-size="11" font-family="Arial" filter="url(#glow)">千赞之星</text>
</svg>