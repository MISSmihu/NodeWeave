<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1005"/>
      <stop offset="100%" stop-color="#0a0802"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="30%" stop-color="#fff8dc"/>
      <stop offset="70%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
    <linearGradient id="flameGold" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#daa520"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#fffacd"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#b8860b" stroke-width="6"/>
  <!-- Phoenix body -->
  <path d="M100,135 Q80,115 75,90 Q72,75 80,60 Q85,50 100,42 Q115,50 120,60 Q128,75 125,90 Q120,115 100,135" fill="none" stroke="url(#gold)" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Wings left -->
  <path d="M80,60 Q60,50 45,55 Q55,65 65,80 Q72,88 78,85" fill="none" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
  <path d="M75,75 Q50,68 38,72 Q52,82 62,95" fill="none" stroke="#daa520" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <!-- Wings right -->
  <path d="M120,60 Q140,50 155,55 Q145,65 135,80 Q128,88 122,85" fill="none" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)" opacity="0.7"/>
  <path d="M125,75 Q150,68 162,72 Q148,82 138,95" fill="none" stroke="#daa520" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <!-- Tail feathers -->
  <path d="M100,135 Q90,145 80,155" fill="none" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <path d="M100,135 Q100,150 100,160" fill="none" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <path d="M100,135 Q110,145 120,155" fill="none" stroke="#ffd700" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
  <!-- Head crest -->
  <path d="M95,45 Q90,35 82,30" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.7"/>
  <path d="M100,42 Q100,32 100,25" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.7"/>
  <path d="M105,45 Q110,35 118,30" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.7"/>
  <!-- Flame texture -->
  <path d="M90,80 Q95,90 100,85 Q105,90 110,80" fill="url(#flameGold)" opacity="0.15"/>
  <!-- Number 10000 -->
  <text x="100" y="100" text-anchor="middle" fill="#fff8dc" font-size="16" font-weight="bold" font-family="Arial" filter="url(#glow)">10000</text>
  <!-- Particles -->
  <circle cx="45" cy="55" r="1.5" fill="#ffd700" filter="url(#glow)" opacity="0.4"/>
  <circle cx="155" cy="55" r="1.5" fill="#ffd700" filter="url(#glow)" opacity="0.4"/>
  <circle cx="82" cy="30" r="1" fill="#ffd700" filter="url(#glow)" opacity="0.5"/>
  <circle cx="118" cy="30" r="1" fill="#ffd700" filter="url(#glow)" opacity="0.5"/>
  <circle cx="100" cy="25" r="1.5" fill="#ffd700" filter="url(#glow)" opacity="0.6"/>
  <text x="100" y="175" text-anchor="middle" fill="#ffd700" font-size="11" font-family="Arial" filter="url(#glow)">万赞传奇</text>
</svg>