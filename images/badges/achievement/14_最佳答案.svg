<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1505"/>
      <stop offset="100%" stop-color="#0a0a02"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffec8b"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#5a4a1a" stroke-width="6"/>
  <!-- Shield shape -->
  <path d="M100,35 L145,55 L145,105 Q145,140 100,160 Q55,140 55,105 L55,55 Z" fill="none" stroke="url(#gold)" stroke-width="3" filter="url(#glow)"/>
  <path d="M100,42 L140,58 L140,105 Q140,135 100,152 Q60,135 60,105 L60,58 Z" fill="#ffd700" opacity="0.08"/>
  <!-- Check mark -->
  <path d="M72,100 L90,118 L130,75" fill="none" stroke="url(#gold)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Decorative corners -->
  <circle cx="55" cy="55" r="3" fill="#ffd700" filter="url(#glow)" opacity="0.6"/>
  <circle cx="145" cy="55" r="3" fill="#ffd700" filter="url(#glow)" opacity="0.6"/>
  <text x="100" y="170" text-anchor="middle" fill="#ffd700" font-size="11" font-family="Arial" filter="url(#glow)">最佳答案</text>
</svg>