<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#150a20"/>
      <stop offset="100%" stop-color="#0a0515"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bf55ec"/>
      <stop offset="100%" stop-color="#8e44ad"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#3a1a5a" stroke-width="6"/>
  <!-- Open book -->
  <!-- Left page -->
  <path d="M100,50 Q75,48 55,55 L55,135 Q75,128 100,130 Z" fill="none" stroke="url(#purple)" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M100,50 Q75,48 55,55 L55,135 Q75,128 100,130 Z" fill="#bf55ec" opacity="0.08"/>
  <!-- Right page -->
  <path d="M100,50 Q125,48 145,55 L145,135 Q125,128 100,130 Z" fill="none" stroke="url(#purple)" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M100,50 Q125,48 145,55 L145,135 Q125,128 100,130 Z" fill="#bf55ec" opacity="0.08"/>
  <!-- Spine -->
  <line x1="100" y1="50" x2="100" y2="130" stroke="#bf55ec" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Text lines left page -->
  <line x1="65" y1="70" x2="95" y2="68" stroke="#bf55ec" stroke-width="0.8" opacity="0.3"/>
  <line x1="65" y1="80" x2="93" y2="78" stroke="#bf55ec" stroke-width="0.8" opacity="0.25"/>
  <line x1="65" y1="90" x2="95" y2="88" stroke="#bf55ec" stroke-width="0.8" opacity="0.3"/>
  <line x1="65" y1="100" x2="90" y2="98" stroke="#bf55ec" stroke-width="0.8" opacity="0.25"/>
  <line x1="65" y1="110" x2="95" y2="108" stroke="#bf55ec" stroke-width="0.8" opacity="0.3"/>
  <!-- Number 10 -->
  <text x="120" y="100" text-anchor="middle" fill="#bf55ec" font-size="28" font-weight="bold" font-family="Arial" filter="url(#glow)">10</text>
  <!-- Quill ink effect -->
  <path d="M140,120 Q145,125 142,132" fill="none" stroke="#8e44ad" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <circle cx="142" cy="135" r="3" fill="#bf55ec" opacity="0.3" filter="url(#glow)"/>
  <text x="100" y="165" text-anchor="middle" fill="#bf55ec" font-size="11" font-family="Arial" filter="url(#glow)">博客达人</text>
</svg>