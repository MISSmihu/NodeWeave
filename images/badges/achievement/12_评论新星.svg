<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1a10"/>
      <stop offset="100%" stop-color="#050a08"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="neonGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc66"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#1a3a2a" stroke-width="6"/>
  <!-- Chat bubble -->
  <path d="M60,55 Q55,50 55,55 L55,115 Q55,120 60,120 L120,120 Q125,120 125,115 L125,55 Q125,50 120,55 L120,55 L60,55" fill="none" stroke="url(#neonGreen)" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Bubble tail -->
  <path d="M70,120 L60,140 L85,120" fill="none" stroke="url(#neonGreen)" stroke-width="2" filter="url(#glow)"/>
  <!-- Star inside bubble -->
  <polygon points="90,72 94,85 108,87 97,95 100,108 90,100 80,108 83,95 72,87 86,85" fill="none" stroke="#00ff88" stroke-width="1.5" filter="url(#glow)"/>
  <polygon points="90,77 93,86 103,87 95,93 97,103 90,97 83,103 85,93 77,87 87,86" fill="#00ff88" opacity="0.15"/>
  <!-- Sparkles -->
  <circle cx="135" cy="60" r="2" fill="#00ff88" filter="url(#glow)" opacity="0.6"/>
  <circle cx="145" cy="80" r="1.5" fill="#00ff88" filter="url(#glow)" opacity="0.4"/>
  <circle cx="42" cy="75" r="1.5" fill="#00ff88" filter="url(#glow)" opacity="0.5"/>
  <text x="100" y="170" text-anchor="middle" fill="#00ff88" font-size="11" font-family="Arial" filter="url(#glow)">评论新星</text>
</svg>