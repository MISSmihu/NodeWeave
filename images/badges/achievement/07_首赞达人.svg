<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1505"/>
      <stop offset="100%" stop-color="#0a0a02"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffec8b"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#8b7500" stroke-width="6"/>
  <!-- Star shape -->
  <polygon points="100,40 115,75 155,80 125,105 132,145 100,125 68,145 75,105 45,80 85,75" fill="none" stroke="url(#gold)" stroke-width="2.5" filter="url(#glow)"/>
  <polygon points="100,50 112,78 142,82 118,102 124,135 100,118 76,135 82,102 58,82 88,78" fill="url(#gold)" opacity="0.15"/>
  <!-- Number 1 -->
  <text x="100" y="102" text-anchor="middle" fill="url(#gold)" font-size="34" font-weight="bold" font-family="Arial" filter="url(#glow)">1</text>
  <!-- Top halo -->
  <circle cx="100" cy="40" r="8" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.5" filter="url(#glow)"/>
  <text x="100" y="170" text-anchor="middle" fill="#ffd700" font-size="11" font-family="Arial" filter="url(#glow)">首赞达人</text>
</svg>