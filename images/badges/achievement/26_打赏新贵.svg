<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1505"/>
      <stop offset="100%" stop-color="#0a0a02"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffec8b"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
    <radialGradient id="coinShine" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fff8dc"/>
      <stop offset="100%" stop-color="#daa520"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#5a4a1a" stroke-width="6"/>
  <!-- Coin outer -->
  <circle cx="100" cy="90" r="42" fill="none" stroke="url(#gold)" stroke-width="3" filter="url(#glow)"/>
  <circle cx="100" cy="90" r="42" fill="url(#gold)" opacity="0.1"/>
  <!-- Coin inner ring -->
  <circle cx="100" cy="90" r="35" fill="none" stroke="#ffd700" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <!-- Coin shine -->
  <circle cx="88" cy="78" r="8" fill="#fff8dc" opacity="0.08"/>
  <!-- $ symbol -->
  <text x="100" y="102" text-anchor="middle" fill="url(#gold)" font-size="38" font-weight="bold" font-family="Arial" filter="url(#glow)">$</text>
  <!-- 第一次 text -->
  <text x="100" y="150" text-anchor="middle" fill="#ffd700" font-size="16" font-weight="bold" font-family="Arial" filter="url(#glow)">第一次</text>
  <!-- Sparkles -->
  <circle cx="55" cy="55" r="1.5" fill="#ffd700" filter="url(#glow)" opacity="0.6"/>
  <circle cx="148" cy="58" r="1" fill="#ffec8b" filter="url(#glow)" opacity="0.5"/>
  <circle cx="50" cy="120" r="1" fill="#ffd700" filter="url(#glow)" opacity="0.4"/>
  <circle cx="152" cy="115" r="1.5" fill="#ffd700" filter="url(#glow)" opacity="0.5"/>
  <text x="100" y="175" text-anchor="middle" fill="#ffd700" font-size="11" font-family="Arial" filter="url(#glow)">打赏新贵</text>
</svg>