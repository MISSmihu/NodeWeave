<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1520"/>
      <stop offset="100%" stop-color="#050a10"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00fff5"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#1a3a4a" stroke-width="6"/>
  <!-- Sofa shape -->
  <rect x="50" y="85" width="100" height="40" rx="8" fill="none" stroke="url(#cyan)" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Sofa back -->
  <rect x="50" y="65" width="100" height="25" rx="5" fill="none" stroke="url(#cyan)" stroke-width="2" filter="url(#glow)"/>
  <!-- Sofa armrests -->
  <rect x="42" y="70" width="14" height="50" rx="5" fill="none" stroke="url(#cyan)" stroke-width="2" filter="url(#glow)"/>
  <rect x="144" y="70" width="14" height="50" rx="5" fill="none" stroke="url(#cyan)" stroke-width="2" filter="url(#glow)"/>
  <!-- Sofa legs -->
  <line x1="58" y1="125" x2="58" y2="135" stroke="#00fff5" stroke-width="2" filter="url(#glow)"/>
  <line x1="142" y1="125" x2="142" y2="135" stroke="#00fff5" stroke-width="2" filter="url(#glow)"/>
  <!-- Number 1 on armrest -->
  <text x="149" y="100" text-anchor="middle" fill="#00fff5" font-size="18" font-weight="bold" font-family="Arial" filter="url(#glow)">1</text>
  <!-- Circuit board base lines -->
  <line x1="55" y1="140" x2="145" y2="140" stroke="#00fff5" stroke-width="0.5" opacity="0.3"/>
  <line x1="60" y1="145" x2="140" y2="145" stroke="#00fff5" stroke-width="0.5" opacity="0.2"/>
  <line x1="70" y1="140" x2="70" y2="150" stroke="#00fff5" stroke-width="0.5" opacity="0.2"/>
  <line x1="100" y1="140" x2="100" y2="152" stroke="#00fff5" stroke-width="0.5" opacity="0.2"/>
  <line x1="130" y1="140" x2="130" y2="150" stroke="#00fff5" stroke-width="0.5" opacity="0.2"/>
  <text x="100" y="170" text-anchor="middle" fill="#00fff5" font-size="11" font-family="Arial" filter="url(#glow)">沙发之王</text>
</svg>