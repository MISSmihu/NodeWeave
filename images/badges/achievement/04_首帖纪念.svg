<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1a15"/>
      <stop offset="100%" stop-color="#050a08"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="neonGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc66"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a4a3a"/>
      <stop offset="50%" stop-color="#1a2a1a"/>
      <stop offset="100%" stop-color="#3a4a3a"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#border)" stroke-width="6"/>
  <!-- Circuit texture lines -->
  <line x1="30" y1="60" x2="55" y2="60" stroke="#00ff88" stroke-width="0.5" opacity="0.2"/>
  <line x1="30" y1="70" x2="45" y2="70" stroke="#00ff88" stroke-width="0.5" opacity="0.2"/>
  <line x1="145" y1="130" x2="170" y2="130" stroke="#00ff88" stroke-width="0.5" opacity="0.2"/>
  <line x1="155" y1="140" x2="170" y2="140" stroke="#00ff88" stroke-width="0.5" opacity="0.2"/>
  <line x1="60" y1="30" x2="60" y2="50" stroke="#00ff88" stroke-width="0.5" opacity="0.2"/>
  <line x1="140" y1="150" x2="140" y2="170" stroke="#00ff88" stroke-width="0.5" opacity="0.2"/>
  <!-- Quill pen -->
  <path d="M55,135 Q65,80 80,50 Q85,40 90,38" fill="none" stroke="url(#neonGreen)" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M90,38 Q92,35 88,30 Q85,33 82,38 Q85,40 90,38" fill="url(#neonGreen)" opacity="0.6" filter="url(#glow)"/>
  <path d="M55,135 Q60,130 70,132 Q65,138 55,135" fill="url(#neonGreen)" opacity="0.5" filter="url(#glow)"/>
  <!-- Ink drops -->
  <circle cx="52" cy="140" r="3" fill="#00ff88" opacity="0.3" filter="url(#glow)"/>
  <circle cx="48" cy="148" r="2" fill="#00ff88" opacity="0.2" filter="url(#glow)"/>
  <!-- Neon ring -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  <text x="100" y="170" text-anchor="middle" fill="#00ff88" font-size="11" font-family="Arial" filter="url(#glow)">首帖纪念</text>
</svg>