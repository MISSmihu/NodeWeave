<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#0a0202"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="50%" stop-color="#ff6666"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#4a1a1a" stroke-width="6"/>
  <!-- Bell shape -->
  <path d="M100,45 Q75,50 72,80 L68,115 Q68,120 73,120 L127,120 Q132,120 132,115 L128,80 Q125,50 100,45 Z" fill="none" stroke="url(#red)" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M100,45 Q75,50 72,80 L68,115 Q68,120 73,120 L127,120 Q132,120 132,115 L128,80 Q125,50 100,45 Z" fill="#ff4444" opacity="0.1"/>
  <!-- Bell top -->
  <circle cx="100" cy="45" r="5" fill="none" stroke="#ff4444" stroke-width="2" filter="url(#glow)"/>
  <!-- Bell clapper -->
  <circle cx="100" cy="130" r="8" fill="none" stroke="#ff4444" stroke-width="2" filter="url(#glow)"/>
  <circle cx="100" cy="130" r="8" fill="#ff4444" opacity="0.15"/>
  <!-- Bell ring line -->
  <path d="M80,125 Q100,135 120,125" fill="none" stroke="#ff6666" stroke-width="1" filter="url(#glow)" opacity="0.5"/>
  <!-- Rotating light rays -->
  <line x1="100" y1="80" x2="130" y2="50" stroke="#ff4444" stroke-width="2" filter="url(#redGlow)" opacity="0.6"/>
  <line x1="100" y1="80" x2="60" y2="50" stroke="#ff4444" stroke-width="1.5" filter="url(#redGlow)" opacity="0.4"/>
  <line x1="100" y1="80" x2="140" y2="80" stroke="#ff4444" stroke-width="1" filter="url(#redGlow)" opacity="0.3"/>
  <line x1="100" y1="80" x2="60" y2="80" stroke="#ff4444" stroke-width="1" filter="url(#redGlow)" opacity="0.3"/>
  <!-- Shield watermark -->
  <path d="M100,60 L120,70 L120,90 Q120,105 100,110 Q80,105 80,90 L80,70 Z" fill="none" stroke="#ff4444" stroke-width="0.8" opacity="0.2"/>
  <!-- Exclamation -->
  <text x="100" y="102" text-anchor="middle" fill="#ff4444" font-size="22" font-weight="bold" font-family="Arial" filter="url(#glow)">!</text>
  <text x="100" y="165" text-anchor="middle" fill="#ff4444" font-size="11" font-family="Arial" filter="url(#glow)">举报卫士</text>
</svg>