<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手机绑定 / 实名验证 // NodeWeave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
<style>
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.verify-card{width:100%;max-width:430px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:32px 28px;position:relative;z-index:1}
.verify-card h2{font-family:var(--font-display);font-size:20px;color:var(--cyan);margin-bottom:6px;text-align:center;text-shadow:var(--glow-cyan)}
.verify-card .sub{font-size:13px;color:var(--text-mute);margin-bottom:24px;text-align:center;line-height:1.7}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-family:var(--font-mono);font-size:12px;color:var(--text-dim);margin-bottom:6px}
.form-group input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:14px;outline:none}
.form-group input:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,240,255,.08)}
.code-row{display:flex;gap:10px}
.code-row input{flex:1}
.code-row button{padding:10px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:5px;color:var(--text-dim);font-family:var(--font-mono);font-size:12px;white-space:nowrap;cursor:pointer}
.code-row button:hover{border-color:var(--cyan);color:var(--cyan)}
.code-row button:disabled{opacity:.55;cursor:not-allowed}
.verify-card .btn-primary{width:100%;padding:12px;font-family:var(--font-display);font-size:14px;margin-top:8px}
.note{font-size:12px;color:var(--text-mute);margin-top:16px;text-align:center;line-height:1.7}
.error-msg{display:none;color:var(--magenta);font-size:13px;margin-top:8px}
.error-msg.show{display:block}
.success-msg,.verified-info{display:none;text-align:center;padding:22px 0}
.success-msg.show,.verified-info.show{display:block}
.success-msg .icon,.verified-info .icon{font-size:44px;margin-bottom:12px}
.success-msg h3,.verified-info h3{font-family:var(--font-display);color:var(--green);font-size:16px;margin-bottom:8px}
.turnstile-wrap{min-height:65px;margin-bottom:12px}
.turnstile-wrap.is-disabled{display:none}
</style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:16px;left:16px;z-index:100;font-family:var(--font-mono);font-size:13px;color:var(--text-mute);text-decoration:none">← 返回</a>
<div class="bg-grid"></div><div class="bg-scanlines"></div><div class="bg-glow"></div>
<div class="auth-page">
  <div class="verify-card">
    <div id="alreadyVerified" class="verified-info">
      <div class="icon">✅</div>
      <h3>已完成验证</h3>
      <p class="sub">你的手机号已经完成绑定。</p>
      <a href="../index.html" class="btn-primary" style="display:block;text-decoration:none;text-align:center">返回首页</a>
    </div>
    <div id="verifyForm">
      <h2>手机绑定 / 实名验证</h2>
      <p class="sub">输入手机号获取验证码。未接入真实短信服务时，接口会返回测试验证码，方便站长调试。</p>
      <div class="form-group">
        <label>手机号</label>
        <input type="tel" id="phone" placeholder="请输入 11 位手机号" maxlength="11">
      </div>
      <div class="form-group">
        <label>短信验证码</label>
        <div class="code-row">
          <input type="text" id="smsCode" placeholder="6 位验证码" maxlength="6">
          <button id="sendBtn" type="button">获取验证码</button>
        </div>
      </div>
      <div class="turnstile-wrap"><div class="cf-turnstile" id="identityTurnstile"></div></div>
      <p class="error-msg" id="errorMsg"></p>
      <button class="btn-primary" id="verifyBtn" type="button">提交验证</button>
      <p class="note">手机号只用于账号安全与站点合规验证，服务端仅保存 SHA-256 哈希。</p>
    </div>
    <div class="success-msg" id="successMsg">
      <div class="icon">🎉</div>
      <h3>验证完成</h3>
      <p class="sub">手机号已成功绑定。</p>
      <a href="../index.html" class="btn-primary" style="display:block;text-decoration:none;text-align:center">返回首页</a>
    </div>
  </div>
</div>
<script>
let smsToken = null;
let countdown = 0;
let turnstileSiteKey = '';
let turnstileWidget = null;

function showError(message) {
  const errEl = document.getElementById('errorMsg');
  errEl.textContent = message;
  errEl.classList.add('show');
}

function clearError() {
  document.getElementById('errorMsg').classList.remove('show');
}

function waitForTurnstile() {
  return new Promise((resolve, reject) => {
    if (window.turnstile) return resolve(window.turnstile);
    let attempts = 0;
    const timer = setInterval(() => {
      if (window.turnstile) {
        clearInterval(timer);
        resolve(window.turnstile);
      } else if (++attempts > 80) {
        clearInterval(timer);
        reject(new Error('Turnstile load timeout'));
      }
    }, 100);
  });
}

async function setupTurnstile(siteKey) {
  turnstileSiteKey = siteKey || '';
  const wrap = document.querySelector('.turnstile-wrap');
  if (!turnstileSiteKey) {
    wrap.classList.add('is-disabled');
    return;
  }
  try {
    const api = await waitForTurnstile();
    turnstileWidget = api.render('#identityTurnstile', { sitekey: turnstileSiteKey });
  } catch(e) {
    console.warn('Turnstile unavailable, backend will decide verification:', e);
  }
}

function getTurnstileToken() {
  if (!turnstileSiteKey || !window.turnstile || !turnstileWidget) return '';
  return window.turnstile.getResponse(turnstileWidget) || '';
}

async function checkStatus() {
  try {
    const res = await fetch('/api/account/me', { credentials: 'include' });
    const json = await res.json();
    if (json.code === 4011) {
      location.href = '../login.html?redirect=' + encodeURIComponent(location.pathname);
      return;
    }
    if (json.code === 0 && json.data.phone_verified) {
      document.getElementById('verifyForm').style.display = 'none';
      document.getElementById('alreadyVerified').classList.add('show');
    }
  } catch(e) {}
}

function updateSendBtn() {
  const btn = document.getElementById('sendBtn');
  if (countdown > 0) {
    btn.textContent = countdown + 's';
    btn.disabled = true;
    countdown--;
    setTimeout(updateSendBtn, 1000);
  } else {
    btn.textContent = '获取验证码';
    btn.disabled = false;
  }
}

document.getElementById('sendBtn').addEventListener('click', async () => {
  clearError();
  const phone = document.getElementById('phone').value.trim();
  if (!/^\d{11}$/.test(phone)) return showError('请输入正确的 11 位手机号');
  if (countdown > 0) return;
  try {
    const res = await fetch('/api/account/send-sms', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, turnstile_token: getTurnstileToken() }),
    });
    const json = await res.json();
    if (json.code !== 0) return showError(json.msg || '发送失败');
    smsToken = json.data.token;
    if (json.data.dev_code) document.getElementById('smsCode').value = json.data.dev_code;
    countdown = 60;
    updateSendBtn();
  } catch(e) {
    showError('网络错误，请稍后重试');
  }
});

document.getElementById('verifyBtn').addEventListener('click', async () => {
  clearError();
  const code = document.getElementById('smsCode').value.trim();
  if (!smsToken) return showError('请先获取验证码');
  if (!/^\d{6}$/.test(code)) return showError('请输入 6 位验证码');
  try {
    const res = await fetch('/api/account/verify-phone', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: smsToken, code }),
    });
    const json = await res.json();
    if (json.code !== 0) return showError(json.msg || '验证失败');
    document.getElementById('verifyForm').style.display = 'none';
    document.getElementById('successMsg').classList.add('show');
  } catch(e) {
    showError('网络错误，请稍后重试');
  }
});

fetch('/api/site-config/public').then(r => r.json()).then(json => {
  setupTurnstile(json.code === 0 ? json.data.turnstile_site_key : '');
}).catch(() => setupTurnstile(''));
checkStatus();
</script>
</body>
</html>
