<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实名认证 // NodeWeave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.verify-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:32px 28px;position:relative;z-index:1}
.verify-card h2{font-family:var(--font-display);font-size:18px;color:var(--cyan);margin-bottom:4px;text-align:center}
.verify-card .sub{font-size:13px;color:var(--text-mute);margin-bottom:24px;text-align:center}
.verify-card .form-group{margin-bottom:14px}
.verify-card label{display:block;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase}
.verify-card input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:14px;outline:none}
.verify-card input:focus{border-color:var(--cyan)}
.verify-card .code-row{display:flex;gap:10px}
.verify-card .code-row input{flex:1}
.verify-card .code-row button{padding:10px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-family:var(--font-mono);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s}
.verify-card .code-row button:hover{border-color:var(--cyan);color:var(--cyan)}
.verify-card .btn-primary{width:100%;padding:12px;font-family:var(--font-display);font-size:14px;margin-top:8px}
.verify-card .note{font-size:12px;color:var(--text-mute);margin-top:16px;text-align:center;line-height:1.6}
.success-msg{display:none;text-align:center;padding:20px 0}
.success-msg .icon{font-size:48px;margin-bottom:12px}
.success-msg h3{font-family:var(--font-display);color:var(--green);margin-bottom:8px}
.error-msg{display:none;color:var(--magenta);font-size:13px;margin-top:8px}
.error-msg.show{display:block}
.verified-info{background:rgba(127,255,0,.05);border:1px solid rgba(127,255,0,.15);border-radius:4px;padding:16px;text-align:center;margin-top:16px}
.verified-info .icon{font-size:32px;margin-bottom:8px}
.verified-info h4{color:var(--green);font-family:var(--font-display);font-size:14px;margin-bottom:4px}
.verified-info p{color:var(--text-dim);font-size:12px}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-scanlines"></div>
<div class="bg-glow"></div>

<div class="auth-page">
  <div class="verify-card">
    <div id="stepMessage"></div>

    <!-- Already verified -->
    <div id="alreadyVerified" style="display:none">
      <div class="verified-info">
        <div class="icon">✅</div>
        <h4>已完成实名认证</h4>
        <p>您的手机号已验证通过</p>
      </div>
      <a href="../index.html" class="btn-primary" style="display:block;text-align:center;margin-top:16px;text-decoration:none">返回首页</a>
    </div>

    <!-- Verify form -->
    <div id="verifyForm">
      <h2>实名认证</h2>
      <p class="sub">根据国家法律法规，请完成手机号验证</p>

      <div class="form-group">
        <label>手机号</label>
        <input type="tel" id="phone" placeholder="请输入11位手机号" maxlength="11">
      </div>

      <div class="form-group">
        <label>短信验证码</label>
        <div class="code-row">
          <input type="text" id="smsCode" placeholder="6位验证码" maxlength="6">
          <button id="sendBtn">获取验证码</button>
        </div>
      </div>

      <div class="cf-turnstile" data-sitekey="" id="identityTurnstile" style="margin-bottom:12px"></div>
      <p class="error-msg" id="errorMsg"></p>
      <button class="btn-primary" id="verifyBtn">提交验证</button>
      <p class="note">您的手机号仅用于实名认证，经 SHA-256 哈希后存储，<br>不会被公开或用于其他用途。</p>
    </div>

    <!-- Success -->
    <div class="success-msg" id="successMsg">
      <div class="icon">🎉</div>
      <h3>实名认证完成</h3>
      <p>您已成功完成手机号验证。</p>
      <a href="../index.html" class="btn-primary" style="display:block;text-align:center;margin-top:16px;text-decoration:none">返回首页</a>
    </div>
  </div>
</div>

<script>
let smsToken = null;
let countdown = 0;

// Load Turnstile
fetch('/api/site-config/public').then(r=>r.json()).then(json=>{
  if(json.code===0&&json.data.turnstile_site_key){
    document.getElementById('identityTurnstile').dataset.sitekey=json.data.turnstile_site_key;
  }
}).catch(()=>{});

// Check current verification status
async function checkStatus() {
  try {
    const res = await fetch('/api/account/me');
    const json = await res.json();
    if (json.code === 0 && json.data.phone_verified) {
      document.getElementById('verifyForm').style.display = 'none';
      document.getElementById('alreadyVerified').style.display = '';
    }
  } catch(e) { /* offline */ }
}
checkStatus();

// Send SMS
document.getElementById('sendBtn').addEventListener('click', async () => {
  const phone = document.getElementById('phone').value.trim();
  const errEl = document.getElementById('errorMsg');
  errEl.classList.remove('show');
  if (!/^\d{11}$/.test(phone)) { errEl.textContent = '请输入正确的手机号'; errEl.classList.add('show'); return; }
  if (countdown > 0) return;

  const ttoken = turnstile.getResponse(document.getElementById('identityTurnstile'));
  if (!ttoken) { errEl.textContent = '请完成人机验证'; errEl.classList.add('show'); return; }

  try {
    const res = await fetch('/api/account/send-sms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, turnstile_token: ttoken }),
    });
    const json = await res.json();
    if (json.code !== 0) { errEl.textContent = json.msg; errEl.classList.add('show'); return; }
    smsToken = json.data.token;
    countdown = 60;
    updateSendBtn();
  } catch(e) { errEl.textContent = '网络错误'; errEl.classList.add('show'); }
});

function updateSendBtn() {
  const btn = document.getElementById('sendBtn');
  if (countdown > 0) {
    btn.textContent = countdown + 's';
    btn.disabled = true;
    countdown--;
    setTimeout(updateSendBtn, 1000);
  } else {
    btn.textContent = '获取验证码';
    btn.disabled = false;
  }
}

// Verify
document.getElementById('verifyBtn').addEventListener('click', async () => {
  const code = document.getElementById('smsCode').value.trim();
  const errEl = document.getElementById('errorMsg');
  errEl.classList.remove('show');
  if (!smsToken) { errEl.textContent = '请先获取验证码'; errEl.classList.add('show'); return; }
  if (!/^\d{6}$/.test(code)) { errEl.textContent = '请输入6位验证码'; errEl.classList.add('show'); return; }

  try {
    const res = await fetch('/api/account/verify-phone', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: smsToken, code }),
    });
    const json = await res.json();
    if (json.code !== 0) { errEl.textContent = json.msg; errEl.classList.add('show'); return; }
    document.getElementById('verifyForm').style.display = 'none';
    document.getElementById('successMsg').style.display = '';
  } catch(e) { errEl.textContent = '网络错误'; errEl.classList.add('show'); }
});
</script>
</body>
</html>
