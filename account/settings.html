<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人设置 // NodeWeave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
.settings-page{max-width:820px;margin:0 auto;padding:88px 24px 100px}
.settings-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-end;margin-bottom:24px}
.settings-head h2{font-family:var(--font-display);font-size:22px;color:var(--cyan);text-shadow:var(--glow-cyan);margin:0}
.settings-head p{margin:8px 0 0;color:var(--text-mute);font-size:13px}
.tabs-row{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border);overflow:auto}
.tabs-row button{padding:11px 18px;background:none;border:none;color:var(--text-dim);font-family:var(--font-mono);font-size:13px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tabs-row button.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.page-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:20px;box-shadow:0 18px 60px rgba(0,0,0,.18)}
.page-section h3{font-family:var(--font-display);font-size:16px;color:var(--text);margin:0 0 16px}
.page-section p{color:var(--text-dim);font-size:13px;line-height:1.8}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.form-group{margin-bottom:14px}
.form-group.full{grid-column:1/-1}
.form-group label{display:block;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none}
.form-group textarea{min-height:110px;resize:vertical;font-family:var(--font-mono);font-size:12px;line-height:1.6}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,240,255,.08)}
.form-group input[type="color"]{width:58px;height:38px;padding:2px;cursor:pointer}
.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.btn-primary,.btn-ghost,.btn-danger{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:5px;font-family:var(--font-display);font-size:14px;text-decoration:none;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--cyan);border:1px solid var(--cyan);color:var(--bg);font-weight:700}
.btn-primary:hover{box-shadow:var(--glow-cyan)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-danger{background:transparent;border:1px solid var(--magenta);color:var(--magenta)}
.btn-danger:hover{background:var(--magenta);color:#fff}
.msg{display:none;padding:8px 12px;border-radius:5px;font-size:13px;margin-top:12px}
.msg.show{display:block}
.msg-ok{background:rgba(127,255,0,.1);color:var(--green);border:1px solid rgba(127,255,0,.2)}
.msg-err{background:rgba(255,0,60,.1);color:var(--magenta);border:1px solid rgba(255,0,60,.2)}
.help-text{font-size:11px;color:var(--text-mute);margin-top:5px;line-height:1.7}
.help-text code{background:var(--bg);padding:1px 4px;border-radius:2px;font-family:var(--font-mono);font-size:10px}
.bg-preview{height:132px;border-radius:10px;border:1px solid var(--border);margin:12px 0 16px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:var(--bg)}
.bg-preview canvas{position:absolute;inset:0}
.bg-preview .label{font-family:var(--font-display);font-size:16px;color:var(--text);text-shadow:0 0 20px rgba(0,0,0,.9);position:relative;z-index:1}
.status-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:16px}
.status-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px}
.status-card span{display:block;font-family:var(--font-mono);font-size:11px;color:var(--text-mute);margin-bottom:6px}
.status-card strong{font-size:16px;color:var(--text)}
@media(max-width:720px){.settings-head{display:block}.form-grid,.status-grid{grid-template-columns:1fr}.settings-page{padding-left:16px;padding-right:16px}}
</style>
</head>
<body>
<div class="bg-grid"></div><div class="bg-scanlines"></div><div class="bg-glow"></div>
<header class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo"><span class="logo-mark">◈</span><span class="logo-text">Node<span class="x">Weave</span></span><span class="logo-sub">// SETTINGS</span></a>
    <div class="nav-actions"><a href="../index.html" class="btn-ghost">返回首页</a></div>
  </div>
</header>

<main class="settings-page">
  <div class="settings-head">
    <div>
      <h2>个人设置</h2>
      <p>管理资料、主页装扮、手机绑定与账号安全。</p>
    </div>
    <a href="../profile.html" class="btn-ghost">查看主页</a>
  </div>

  <div class="tabs-row">
    <button class="active" data-tab="profile">基本资料</button>
    <button data-tab="appearance">个人装扮</button>
    <button data-tab="security">账号安全</button>
  </div>

  <div class="tab-panel active" id="tabProfile">
    <div class="page-section">
      <h3>基本资料</h3>
      <div class="status-grid">
        <div class="status-card"><span>账号</span><strong id="statusUser">--</strong></div>
        <div class="status-card"><span>邮箱验证</span><strong id="statusEmail">--</strong></div>
        <div class="status-card"><span>手机绑定</span><strong id="statusPhone">--</strong></div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>昵称</label>
          <input type="text" id="displayName" maxlength="24" placeholder="显示在帖子和个人主页中">
        </div>
        <div class="form-group">
          <label>头像颜色</label>
          <input type="color" id="avatarColor" value="#00f0ff">
        </div>
        <div class="form-group full">
          <label>个人简介</label>
          <textarea id="bio" maxlength="500" placeholder="介绍一下你自己，最多 500 字。"></textarea>
        </div>
      </div>
      <div class="actions">
        <button class="btn-primary" type="button" onclick="saveProfile()">保存资料</button>
        <a class="btn-ghost" href="verify-identity.html">绑定手机</a>
      </div>
      <div class="msg" id="profileMsg"></div>
    </div>
  </div>

  <div class="tab-panel" id="tabAppearance">
    <div class="page-section">
      <h3>主页装扮</h3>
      <p>支持纯色、渐变、图片、视频、Matrix、粒子、星空背景，也可以添加限定在个人主页内的 CSS。</p>
      <div class="form-grid">
        <div class="form-group">
          <label>背景类型</label>
          <select id="bgType" onchange="updateBgOptions();updateBgPreview()">
            <option value="">默认背景</option>
            <option value="color">纯色背景</option>
            <option value="gradient">渐变背景</option>
            <option value="image">图片背景</option>
            <option value="video">视频背景</option>
            <option value="matrix">代码雨 Matrix</option>
            <option value="particles">动态粒子</option>
            <option value="stars">星空背景</option>
          </select>
        </div>
        <div id="bgOptions" class="form-group"></div>
        <div class="form-group full">
          <label>自定义 CSS</label>
          <textarea id="customCss" placeholder="/* 建议把选择器限制在 .custom-page 内 */
.custom-page .card {
  border-color: var(--cyan);
}"></textarea>
          <div class="help-text">可用变量：<code>--bg</code> <code>--surface</code> <code>--cyan</code> <code>--magenta</code> <code>--text</code> <code>--border</code></div>
        </div>
      </div>
      <div class="bg-preview" id="bgPreview"><span class="label" id="previewLabel">默认背景</span></div>
      <div class="actions">
        <button class="btn-primary" type="button" onclick="saveAppearance()">保存装扮</button>
        <button class="btn-ghost" type="button" onclick="previewLive()">预览主页</button>
      </div>
      <div class="msg" id="appearanceMsg"></div>
    </div>
  </div>

  <div class="tab-panel" id="tabSecurity">
    <div class="page-section">
      <h3>修改密码</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>旧密码</label>
          <input type="password" id="oldPassword" autocomplete="current-password">
        </div>
        <div class="form-group">
          <label>新密码</label>
          <input type="password" id="newPassword" minlength="8" maxlength="72" autocomplete="new-password">
        </div>
      </div>
      <button class="btn-primary" type="button" onclick="changePassword()">修改密码</button>
      <div class="msg" id="pwdMsg"></div>
    </div>
    <div class="page-section">
      <h3>危险区域</h3>
      <p>注销账号后，账号会被标记为已注销，相关数据按站点规则处理。论坛币、徽章与装扮权益不会退回。</p>
      <a href="delete.html" class="btn-danger">申请注销账号</a>
    </div>
  </div>
</main>

<script>
let currentUser = null;

document.querySelectorAll('.tabs-row button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs-row button').forEach(item => item.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab' + btn.dataset.tab.charAt(0).toUpperCase() + btn.dataset.tab.slice(1)).classList.add('active');
  });
});

function showMsg(id, json, fallback) {
  const msg = document.getElementById(id);
  msg.textContent = json.msg || fallback;
  msg.className = 'msg show ' + (json.code === 0 ? 'msg-ok' : 'msg-err');
  setTimeout(() => msg.classList.remove('show'), 2600);
}

function requireLogin(json) {
  if (json.code === 4011) {
    location.href = '../login.html?redirect=' + encodeURIComponent(location.pathname);
    return true;
  }
  return false;
}

async function loadProfile() {
  try {
    const res = await fetch('/api/account/me', { credentials: 'include' });
    const json = await res.json();
    if (requireLogin(json) || json.code !== 0) return;
    currentUser = json.data;
    document.getElementById('displayName').value = currentUser.display_name || '';
    document.getElementById('bio').value = currentUser.bio || '';
    document.getElementById('avatarColor').value = currentUser.avatar_color || '#00f0ff';
    document.getElementById('statusUser').textContent = currentUser.username || '--';
    document.getElementById('statusEmail').textContent = currentUser.email_verified ? '已验证' : '未验证';
    document.getElementById('statusPhone').textContent = currentUser.phone_verified ? '已绑定' : '未绑定';
  } catch(e) {}
}

async function loadAppearance() {
  try {
    const res = await fetch('/api/account/customize', { credentials: 'include' });
    const json = await res.json();
    if (requireLogin(json) || json.code !== 0) return;
    const custom = json.data || {};
    document.getElementById('bgType').value = custom.profile_bg_type || '';
    document.getElementById('customCss').value = custom.profile_css || '';
    updateBgOptions();
    if (custom.profile_bg_value) {
      const parts = custom.profile_bg_value.split('|||');
      if (custom.profile_bg_type === 'color') document.getElementById('bgColorVal').value = parts[0] || '#0a0a0f';
      if (custom.profile_bg_type === 'gradient') {
        document.getElementById('bgGrad1').value = parts[0] || '#0a0a0f';
        document.getElementById('bgGrad2').value = parts[1] || '#1a0033';
      }
      if (custom.profile_bg_type === 'image' || custom.profile_bg_type === 'video') {
        document.getElementById('bgMediaUrl').value = parts[0] || '';
      }
    }
    updateBgPreview();
  } catch(e) {}
}

function updateBgOptions() {
  const type = document.getElementById('bgType').value;
  const container = document.getElementById('bgOptions');
  if (type === 'color') {
    container.innerHTML = '<label>背景颜色</label><input type="color" id="bgColorVal" value="#0a0a0f" oninput="updateBgPreview()">';
  } else if (type === 'gradient') {
    container.innerHTML = '<label>渐变颜色</label><div style="display:flex;gap:10px;align-items:center"><input type="color" id="bgGrad1" value="#0a0a0f" oninput="updateBgPreview()"><span style="color:var(--text-mute)">→</span><input type="color" id="bgGrad2" value="#1a0033" oninput="updateBgPreview()"></div>';
  } else if (type === 'image') {
    container.innerHTML = '<label>图片 URL</label><input type="text" id="bgMediaUrl" placeholder="https://example.com/bg.webp" oninput="updateBgPreview()"><div class="help-text">支持 jpg/png/gif/webp，动态 GIF 也可用。</div>';
  } else if (type === 'video') {
    container.innerHTML = '<label>视频 URL</label><input type="text" id="bgMediaUrl" placeholder="https://example.com/bg.mp4" oninput="updateBgPreview()"><div class="help-text">支持 mp4/webm，建议使用静音循环视频。</div>';
  } else if (['matrix','particles','stars'].includes(type)) {
    container.innerHTML = '<label>动态背景</label><p class="help-text">该特效无需额外配置，保存后生效。</p>';
  } else {
    container.innerHTML = '';
  }
}

function updateBgPreview() {
  const type = document.getElementById('bgType').value;
  const preview = document.getElementById('bgPreview');
  const label = document.getElementById('previewLabel');
  const oldCanvas = preview.querySelector('canvas');
  if (oldCanvas) oldCanvas.remove();
  if (preview._animId) clearInterval(preview._animId);
  preview.style.background = 'var(--bg)';

  if (type === 'color') {
    const color = document.getElementById('bgColorVal')?.value || '#0a0a0f';
    preview.style.background = color;
    label.textContent = color;
  } else if (type === 'gradient') {
    const first = document.getElementById('bgGrad1')?.value || '#0a0a0f';
    const second = document.getElementById('bgGrad2')?.value || '#1a0033';
    preview.style.background = 'linear-gradient(135deg,' + first + ',' + second + ')';
    label.textContent = first + ' → ' + second;
  } else if (type === 'image') {
    const url = document.getElementById('bgMediaUrl')?.value || '';
    preview.style.background = url ? 'url("' + url + '") center/cover' : 'var(--bg)';
    label.textContent = url ? '图片背景' : '未设置图片';
  } else if (type === 'video') {
    label.textContent = '视频背景';
  } else if (type === 'matrix') {
    label.textContent = '代码雨 Matrix';
    initMatrix(preview);
  } else if (type === 'particles') {
    label.textContent = '动态粒子';
    initParticles(preview);
  } else if (type === 'stars') {
    preview.style.background = '#050510';
    label.textContent = '星空背景';
    initStars(preview);
  } else {
    label.textContent = '默认背景';
  }
}

function initCanvas(el) {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:absolute;inset:0;z-index:0';
  el.appendChild(canvas);
  canvas.width = el.offsetWidth;
  canvas.height = el.offsetHeight;
  return { canvas, ctx: canvas.getContext('2d') };
}

function initMatrix(el) {
  const { canvas, ctx } = initCanvas(el);
  const chars = 'NodeWeave_01001010';
  const drops = Array(Math.floor(canvas.width / 14)).fill(0);
  el._animId = setInterval(() => {
    ctx.fillStyle = 'rgba(0,0,0,.08)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00f0ff';
    ctx.font = '12px monospace';
    drops.forEach((drop, index) => {
      ctx.fillText(chars[Math.floor(Math.random() * chars.length)], index * 14, drop * 14);
      if (drop * 14 > canvas.height && Math.random() > .975) drops[index] = 0;
      drops[index]++;
    });
  }, 50);
}

function initParticles(el) {
  const { canvas, ctx } = initCanvas(el);
  const particles = Array.from({ length: 42 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - .5) * .6,
    vy: (Math.random() - .5) * .6,
    r: Math.random() * 2 + 1,
  }));
  el._animId = setInterval(() => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00f0ff55';
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height;
      if (p.y > canvas.height) p.y = 0;
    });
  }, 33);
}

function initStars(el) {
  const { canvas, ctx } = initCanvas(el);
  const stars = Array.from({ length: 64 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + .4,
    a: Math.random(),
    speed: Math.random() * .02 + .005,
  }));
  el._animId = setInterval(() => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.a += s.speed;
      ctx.fillStyle = 'rgba(255,255,255,' + (.35 + Math.sin(s.a) * .55) + ')';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    });
  }, 50);
}

function getBgValue() {
  const type = document.getElementById('bgType').value;
  if (type === 'color') return document.getElementById('bgColorVal')?.value || '#0a0a0f';
  if (type === 'gradient') return (document.getElementById('bgGrad1')?.value || '#0a0a0f') + '|||' + (document.getElementById('bgGrad2')?.value || '#1a0033');
  if (type === 'image' || type === 'video') return document.getElementById('bgMediaUrl')?.value || '';
  return '';
}

async function saveProfile() {
  try {
    const res = await fetch('/api/account/me', {
      method: 'PUT',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        display_name: document.getElementById('displayName').value.trim(),
        bio: document.getElementById('bio').value.trim(),
        avatar_color: document.getElementById('avatarColor').value,
      }),
    });
    const json = await res.json();
    if (requireLogin(json)) return;
    showMsg('profileMsg', json, '资料已保存');
    if (json.code === 0) loadProfile();
  } catch(e) {
    showMsg('profileMsg', { code: 1, msg: '网络错误，请稍后重试' }, '');
  }
}

async function saveAppearance() {
  try {
    const res = await fetch('/api/account/customize', {
      method: 'PUT',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        profile_css: document.getElementById('customCss').value,
        profile_bg_type: document.getElementById('bgType').value,
        profile_bg_value: getBgValue(),
      }),
    });
    const json = await res.json();
    if (requireLogin(json)) return;
    showMsg('appearanceMsg', json, '装扮已保存');
  } catch(e) {
    showMsg('appearanceMsg', { code: 1, msg: '网络错误，请稍后重试' }, '');
  }
}

function previewLive() {
  saveAppearance().then(() => window.open('../profile.html?preview=1', '_blank'));
}

async function changePassword() {
  try {
    const res = await fetch('/api/account/change-password', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        old_password: document.getElementById('oldPassword').value,
        new_password: document.getElementById('newPassword').value,
      }),
    });
    const json = await res.json();
    if (requireLogin(json)) return;
    showMsg('pwdMsg', json, '操作完成');
    if (json.code === 0) {
      document.getElementById('oldPassword').value = '';
      document.getElementById('newPassword').value = '';
    }
  } catch(e) {
    showMsg('pwdMsg', { code: 1, msg: '网络错误，请稍后重试' }, '');
  }
}

updateBgOptions();
loadProfile();
loadAppearance();
</script>
</body>
</html>
