<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>账号设置 // NodeWeave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
.settings-page{max-width:900px;margin:0 auto;padding:84px 24px 110px}
.settings-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-end;margin-bottom:22px}
.settings-head h1{font-family:var(--font-display);font-size:24px;color:var(--cyan);text-shadow:var(--glow-cyan);margin:0}
.settings-head p{margin:8px 0 0;color:var(--text-mute);font-size:13px}
.tabs-row{display:flex;gap:0;margin-bottom:22px;border-bottom:1px solid var(--border);overflow:auto}
.tabs-row button{padding:11px 18px;background:none;border:none;color:var(--text-dim);font-family:var(--font-mono);font-size:13px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tabs-row button.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:18px;box-shadow:0 18px 60px rgba(0,0,0,.18)}
.panel h3{font-family:var(--font-display);font-size:16px;color:var(--text);margin:0 0 16px}
.panel p{color:var(--text-dim);font-size:13px;line-height:1.8}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.form-group{margin-bottom:14px}
.form-group.full{grid-column:1/-1}
.form-group label{display:block;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none}
.form-group textarea{min-height:112px;resize:vertical;font-family:var(--font-mono);font-size:12px;line-height:1.6}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,240,255,.08)}
.status-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:16px}
.status-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px}
.status-card span{display:block;font-family:var(--font-mono);font-size:11px;color:var(--text-mute);margin-bottom:6px}
.status-card strong{font-size:16px;color:var(--text)}
.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.msg{display:none;padding:9px 12px;border-radius:8px;font-size:13px;margin-top:12px}
.msg.show{display:block}
.msg.ok{background:rgba(127,255,0,.1);color:var(--green);border:1px solid rgba(127,255,0,.22)}
.msg.err{background:rgba(255,0,60,.1);color:var(--magenta);border:1px solid rgba(255,0,60,.22)}
.preview-box{height:130px;border-radius:10px;border:1px solid var(--border);margin:12px 0 16px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:var(--bg)}
.preview-box .label{font-family:var(--font-display);font-size:16px;color:var(--text);text-shadow:0 0 20px rgba(0,0,0,.9);position:relative;z-index:1}
@media(max-width:720px){.settings-head{display:block}.form-grid,.status-grid{grid-template-columns:1fr}.settings-page{padding-left:16px;padding-right:16px}}
</style>
</head>
<body>
<div class="bg-grid"></div><div class="bg-scanlines"></div><div class="bg-glow"></div>
<header class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo"><span class="logo-mark">◈</span><span class="logo-text">Node<span class="x">Weave</span></span><span class="logo-sub">// SETTINGS</span></a>
    <div class="nav-actions"><a class="btn-ghost" href="../index.html">返回首页</a></div>
  </div>
</header>

<main class="settings-page">
  <div class="settings-head">
    <div>
      <h1>账号设置</h1>
      <p>管理资料、主页装扮、手机绑定与账号安全。</p>
    </div>
    <a href="../profile.html" class="btn-ghost">查看主页</a>
  </div>

  <div class="tabs-row">
    <button class="active" data-tab="profile">基本资料</button>
    <button data-tab="appearance">个人装扮</button>
    <button data-tab="security">账号安全</button>
  </div>

  <section class="tab-panel active" id="tabProfile">
    <div class="panel">
      <h3>基本资料</h3>
      <div class="status-grid">
        <div class="status-card"><span>账号</span><strong id="statusUser">--</strong></div>
        <div class="status-card"><span>邮箱验证</span><strong id="statusEmail">--</strong></div>
        <div class="status-card"><span>手机绑定</span><strong id="statusPhone">--</strong></div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label for="displayName">昵称</label>
          <input type="text" id="displayName" maxlength="24" placeholder="显示在帖子和个人主页中">
        </div>
        <div class="form-group">
          <label for="avatarColor">头像颜色</label>
          <input type="color" id="avatarColor" value="#00f0ff">
        </div>
        <div class="form-group full">
          <label for="bio">个人简介</label>
          <textarea id="bio" maxlength="500" placeholder="介绍一下你自己，最多 500 字。"></textarea>
        </div>
      </div>
      <div class="actions">
        <button class="btn-primary" type="button" onclick="saveProfile()">保存资料</button>
        <a class="btn-ghost" href="verify-identity.html">绑定手机</a>
      </div>
      <div class="msg" id="profileMsg"></div>
    </div>
  </section>

  <section class="tab-panel" id="tabAppearance">
    <div class="panel">
      <h3>主页装扮</h3>
      <p>支持纯色、渐变、图片背景、Matrix、粒子与星空，也可以添加限定在个人主页内的 CSS。</p>
      <div class="form-grid">
        <div class="form-group">
          <label for="bgType">背景类型</label>
          <select id="bgType" onchange="updateBgOptions();updateBgPreview()">
            <option value="">默认背景</option>
            <option value="color">纯色背景</option>
            <option value="gradient">渐变背景</option>
            <option value="image">图片背景</option>
            <option value="matrix">代码雨 Matrix</option>
            <option value="particles">动态粒子</option>
            <option value="stars">星空背景</option>
          </select>
        </div>
        <div class="form-group" id="bgOptions"></div>
        <div class="form-group full">
          <label for="customCss">自定义 CSS</label>
          <textarea id="customCss" placeholder="/* 建议把选择器限定在 .profile-page 内 */"></textarea>
        </div>
      </div>
      <div class="preview-box" id="bgPreview"><span class="label" id="previewLabel">默认背景</span></div>
      <div class="actions">
        <button class="btn-primary" type="button" onclick="saveAppearance()">保存装扮</button>
        <button class="btn-ghost" type="button" onclick="previewLive()">预览主页</button>
      </div>
      <div class="msg" id="appearanceMsg"></div>
    </div>
  </section>

  <section class="tab-panel" id="tabSecurity">
    <div class="panel">
      <h3>修改密码</h3>
      <div class="form-grid">
        <div class="form-group">
          <label for="oldPassword">旧密码</label>
          <input type="password" id="oldPassword" autocomplete="current-password">
        </div>
        <div class="form-group">
          <label for="newPassword">新密码</label>
          <input type="password" id="newPassword" minlength="8" maxlength="72" autocomplete="new-password">
        </div>
      </div>
      <button class="btn-primary" type="button" onclick="changePassword()">修改密码</button>
      <div class="msg" id="pwdMsg"></div>
    </div>
    <div class="panel">
      <h3>危险区域</h3>
      <p>注销账号后，账号会被标记为已注销，相关数据按站点规则处理。论坛币、徽章与装扮权益不会退回。</p>
      <a href="delete.html" class="btn-ghost" style="border:1px solid var(--magenta);color:var(--magenta)">申请注销账号</a>
    </div>
  </section>
</main>

<script src="../script.js"></script>
<script>
let currentUser = null;

document.querySelectorAll('.tabs-row button').forEach(button => {
  button.addEventListener('click', () => {
    document.querySelectorAll('.tabs-row button').forEach(item => item.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
    button.classList.add('active');
    document.getElementById('tab' + button.dataset.tab.charAt(0).toUpperCase() + button.dataset.tab.slice(1)).classList.add('active');
  });
});

function showMsg(id, json, fallback) {
  const el = document.getElementById(id);
  el.textContent = json.msg || fallback;
  el.className = 'msg show ' + (json.code === 0 ? 'ok' : 'err');
  setTimeout(() => el.classList.remove('show'), 2600);
}

function redirectLoginIfNeeded(json) {
  if (json.code === 4011) {
    location.href = '../login.html?redirect=' + encodeURIComponent('account/settings.html');
    return true;
  }
  return false;
}

async function loadProfile() {
  const json = await window.NodeWeave.apiJson('/api/account/me').catch(() => null);
  if (!json || redirectLoginIfNeeded(json) || json.code !== 0) return;
  currentUser = json.data;
  document.getElementById('displayName').value = currentUser.display_name || '';
  document.getElementById('bio').value = currentUser.bio || '';
  document.getElementById('avatarColor').value = currentUser.avatar_color || '#00f0ff';
  document.getElementById('statusUser').textContent = currentUser.username || '--';
  document.getElementById('statusEmail').textContent = currentUser.email_verified ? '已验证' : '未验证';
  document.getElementById('statusPhone').textContent = currentUser.phone_verified ? '已绑定' : '未绑定';
}

async function loadAppearance() {
  const json = await window.NodeWeave.apiJson('/api/account/customize').catch(() => null);
  if (!json || redirectLoginIfNeeded(json) || json.code !== 0) return;
  const data = json.data || {};
  document.getElementById('bgType').value = data.profile_bg_type || '';
  document.getElementById('customCss').value = data.profile_css || '';
  updateBgOptions();
  const parts = String(data.profile_bg_value || '').split('|||');
  if (data.profile_bg_type === 'color' && document.getElementById('bgColorVal')) document.getElementById('bgColorVal').value = parts[0] || '#0a0a0f';
  if (data.profile_bg_type === 'gradient') {
    if (document.getElementById('bgGrad1')) document.getElementById('bgGrad1').value = parts[0] || '#0a0a0f';
    if (document.getElementById('bgGrad2')) document.getElementById('bgGrad2').value = parts[1] || '#1a0033';
  }
  if (data.profile_bg_type === 'image' && document.getElementById('bgMediaUrl')) document.getElementById('bgMediaUrl').value = parts[0] || '';
  updateBgPreview();
}

function updateBgOptions() {
  const type = document.getElementById('bgType').value;
  const box = document.getElementById('bgOptions');
  if (type === 'color') box.innerHTML = '<label>背景颜色</label><input type="color" id="bgColorVal" value="#0a0a0f" oninput="updateBgPreview()">';
  else if (type === 'gradient') box.innerHTML = '<label>渐变颜色</label><div style="display:flex;gap:10px"><input type="color" id="bgGrad1" value="#0a0a0f" oninput="updateBgPreview()"><input type="color" id="bgGrad2" value="#1a0033" oninput="updateBgPreview()"></div>';
  else if (type === 'image') box.innerHTML = '<label>图片 URL</label><input type="text" id="bgMediaUrl" placeholder="https://example.com/bg.webp" oninput="updateBgPreview()">';
  else if (['matrix','particles','stars'].includes(type)) box.innerHTML = '<label>动态背景</label><p style="color:var(--text-mute);font-size:12px">该特效无需额外配置。</p>';
  else box.innerHTML = '';
}

function updateBgPreview() {
  const type = document.getElementById('bgType').value;
  const preview = document.getElementById('bgPreview');
  const label = document.getElementById('previewLabel');
  preview.style.background = 'var(--bg)';
  if (type === 'color') {
    const color = document.getElementById('bgColorVal')?.value || '#0a0a0f';
    preview.style.background = color;
    label.textContent = color;
  } else if (type === 'gradient') {
    const first = document.getElementById('bgGrad1')?.value || '#0a0a0f';
    const second = document.getElementById('bgGrad2')?.value || '#1a0033';
    preview.style.background = `linear-gradient(135deg,${first},${second})`;
    label.textContent = '渐变背景';
  } else if (type === 'image') {
    const url = document.getElementById('bgMediaUrl')?.value || '';
    preview.style.background = url ? `url("${url}") center/cover` : 'var(--bg)';
    label.textContent = url ? '图片背景' : '未设置图片';
  } else if (type === 'matrix') label.textContent = '代码雨 Matrix';
  else if (type === 'particles') label.textContent = '动态粒子';
  else if (type === 'stars') label.textContent = '星空背景';
  else label.textContent = '默认背景';
}

function getBgValue() {
  const type = document.getElementById('bgType').value;
  if (type === 'color') return document.getElementById('bgColorVal')?.value || '#0a0a0f';
  if (type === 'gradient') return (document.getElementById('bgGrad1')?.value || '#0a0a0f') + '|||' + (document.getElementById('bgGrad2')?.value || '#1a0033');
  if (type === 'image') return document.getElementById('bgMediaUrl')?.value || '';
  return '';
}

async function saveProfile() {
  const json = await window.NodeWeave.apiJson('/api/account/me', {
    method: 'PUT',
    body: JSON.stringify({
      display_name: document.getElementById('displayName').value.trim(),
      bio: document.getElementById('bio').value.trim(),
      avatar_color: document.getElementById('avatarColor').value,
    }),
  }).catch(() => ({ code: 1, msg: '网络错误，请稍后重试' }));
  if (redirectLoginIfNeeded(json)) return;
  showMsg('profileMsg', json, '资料已保存');
  if (json.code === 0) loadProfile();
}

async function saveAppearance() {
  const json = await window.NodeWeave.apiJson('/api/account/customize', {
    method: 'PUT',
    body: JSON.stringify({
      profile_css: document.getElementById('customCss').value,
      profile_bg_type: document.getElementById('bgType').value,
      profile_bg_value: getBgValue(),
    }),
  }).catch(() => ({ code: 1, msg: '网络错误，请稍后重试' }));
  if (redirectLoginIfNeeded(json)) return;
  showMsg('appearanceMsg', json, '装扮已保存');
}

function previewLive() {
  saveAppearance().then(() => window.open('../profile.html', '_blank'));
}

async function changePassword() {
  const json = await window.NodeWeave.apiJson('/api/account/change-password', {
    method: 'POST',
    body: JSON.stringify({
      old_password: document.getElementById('oldPassword').value,
      new_password: document.getElementById('newPassword').value,
    }),
  }).catch(() => ({ code: 1, msg: '网络错误，请稍后重试' }));
  if (redirectLoginIfNeeded(json)) return;
  showMsg('pwdMsg', json, '操作完成');
  if (json.code === 0) {
    document.getElementById('oldPassword').value = '';
    document.getElementById('newPassword').value = '';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  updateBgOptions();
  loadProfile();
  loadAppearance();
});
</script>
</body>
</html>
