<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人设置 // NodeWeave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
.settings-page{max-width:780px;margin:0 auto;padding:80px 24px 100px}
.settings-page h2{font-family:var(--font-display);font-size:20px;color:var(--cyan);margin-bottom:24px}
.tabs-row{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border)}
.tabs-row button{padding:10px 20px;background:none;border:none;color:var(--text-dim);font-family:var(--font-mono);font-size:13px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tabs-row button.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.page-section{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px;margin-bottom:20px}
.page-section h3{font-family:var(--font-display);font-size:15px;color:var(--text);margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-bottom:4px;text-transform:uppercase}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none}
.form-group textarea{min-height:100px;resize:vertical;font-family:var(--font-mono);font-size:12px;line-height:1.6}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--cyan)}
.form-group input[type="color"]{width:56px;height:36px;padding:2px;cursor:pointer}
.color-row{display:flex;gap:8px;align-items:center}
.color-row span{font-family:var(--font-mono);font-size:12px;color:var(--text-dim)}
.gradient-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.bg-preview{height:120px;border-radius:8px;border:1px solid var(--border);margin-bottom:12px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.bg-preview canvas{position:absolute;inset:0}
.bg-preview .label{font-family:var(--font-display);font-size:16px;color:var(--text);text-shadow:0 0 20px rgba(0,0,0,.8);position:relative;z-index:1}
.btn-primary{padding:10px 24px;background:var(--cyan);color:var(--bg);border:none;border-radius:4px;font-family:var(--font-display);font-size:14px;cursor:pointer;font-weight:700}
.btn-primary:hover{box-shadow:var(--glow-cyan)}
.msg{display:none;padding:8px 12px;border-radius:4px;font-size:13px;margin-top:8px}
.msg.show{display:block}
.msg-ok{background:rgba(127,255,0,.1);color:var(--green);border:1px solid rgba(127,255,0,.2)}
.msg-err{background:rgba(255,0,60,.1);color:var(--magenta);border:1px solid rgba(255,0,60,.2)}
.help-text{font-size:11px;color:var(--text-mute);margin-top:4px}
.help-text code{background:var(--bg);padding:1px 4px;border-radius:2px;font-family:var(--font-mono);font-size:10px}
</style>
</head>
<body>
<div class="bg-grid"></div><div class="bg-scanlines"></div><div class="bg-glow"></div>
<header class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo"><span class="logo-mark">◈</span><span class="logo-text">NE<span class="x">X</span>US</span><span class="logo-sub">// SETTINGS</span></a>
    <div class="nav-actions"><a href="../index.html" class="btn-ghost" style="border:1px solid var(--border);padding:8px 16px">返回首页</a></div>
  </div>
</header>

<main class="settings-page">
  <h2>个人设置</h2>
  <div class="tabs-row">
    <button class="active" data-tab="profile">基本资料</button>
    <button data-tab="appearance">个人装扮</button>
    <button data-tab="security">账户安全</button>
  </div>

  <!-- Tab: Basic Profile -->
  <div class="tab-panel active" id="tabProfile">
    <div class="page-section">
      <h3>基本资料</h3>
      <div class="form-group"><label>昵称</label><input type="text" id="displayName" maxlength="24"></div>
      <div class="form-group"><label>个人简介</label><textarea id="bio" maxlength="500" placeholder="介绍一下你自己..."></textarea></div>
      <div class="form-group"><label>头像颜色</label><input type="color" id="avatarColor" value="#00f0ff"></div>
      <button class="btn-primary" onclick="saveProfile()">保存资料</button>
      <div class="msg" id="profileMsg"></div>
    </div>
  </div>

  <!-- Tab: Appearance (Customization) -->
  <div class="tab-panel" id="tabAppearance">
    <div class="page-section">
      <h3>🎨 背景特效</h3>
      <div class="form-group">
        <label>背景类型</label>
        <select id="bgType" onchange="updateBgPreview()">
          <option value="">无特效</option>
          <option value="color">纯色背景</option>
          <option value="gradient">渐变背景</option>
          <option value="image">图片背景</option>
          <option value="video">视频背景</option>
          <option value="matrix">代码雨 (Matrix)</option>
          <option value="particles">粒子特效</option>
          <option value="stars">星空背景</option>
        </select>
      </div>

      <div id="bgOptions"></div>

      <div class="bg-preview" id="bgPreview">
        <span class="label" id="previewLabel">背景预览</span>
      </div>

      <div class="form-group">
        <label>自定义 CSS（高级）</label>
        <textarea id="customCss" placeholder="/* 自定义样式 */
.profile-page { }
.card { border-color: var(--cyan); }
" oninput="updateBgPreview()"></textarea>
        <div class="help-text">
          可用 CSS 变量：<code>--bg</code> <code>--surface</code> <code>--cyan</code> <code>--magenta</code> <code>--text</code> <code>--border</code>
          · 选择器限定在 <code>.custom-page</code> 作用域内
        </div>
      </div>

      <button class="btn-primary" onclick="saveAppearance()">保存装扮</button>
      <button class="btn-ghost" style="margin-left:8px;padding:10px 24px;background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:var(--font-display);font-size:14px;cursor:pointer;border-radius:4px" onclick="previewLive()">预览效果</button>
      <div class="msg" id="appearanceMsg"></div>
    </div>
  </div>

  <!-- Tab: Security -->
  <div class="tab-panel" id="tabSecurity">
    <div class="page-section">
      <h3>修改密码</h3>
      <div class="form-group"><label>旧密码</label><input type="password" id="oldPassword"></div>
      <div class="form-group"><label>新密码</label><input type="password" id="newPassword" minlength="8" maxlength="72"></div>
      <button class="btn-primary" onclick="changePassword()">修改密码</button>
      <div class="msg" id="pwdMsg"></div>
    </div>
    <div class="page-section">
      <h3>危险区域</h3>
      <p style="font-size:13px;color:var(--text-dim);margin-bottom:12px">注销账号后数据将在90天后清除，此操作不可逆。</p>
      <a href="delete.html" style="color:var(--magenta);font-family:var(--font-mono);font-size:13px;text-decoration:none">→ 申请注销账号</a>
    </div>
  </div>
</main>

<script>
// ======== Tab switching ========
document.querySelectorAll('.tabs-row button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs-row button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab' + btn.dataset.tab.charAt(0).toUpperCase() + btn.dataset.tab.slice(1)).classList.add('active');
  });
});

// ======== Load profile ========
async function loadProfile() {
  try {
    const res = await fetch('/api/account/me');
    const json = await res.json();
    if (json.code !== 0) return;
    const u = json.data;
    document.getElementById('displayName').value = u.display_name || '';
    document.getElementById('bio').value = u.bio || '';
    document.getElementById('avatarColor').value = u.avatar_color || '#00f0ff';
  } catch(e) {}
}

async function loadAppearance() {
  try {
    const res = await fetch('/api/account/customize');
    const json = await res.json();
    if (json.code !== 0) return;
    const c = json.data;
    document.getElementById('bgType').value = c.profile_bg_type || '';
    document.getElementById('customCss').value = c.profile_css || '';
    updateBgOptions();
    if (c.profile_bg_value) {
      const parts = c.profile_bg_value.split('|||');
      if (c.profile_bg_type === 'color') { document.getElementById('bgColorVal').value = parts[0] || '#0a0a0f'; }
      if (c.profile_bg_type === 'gradient') {
        document.getElementById('bgGrad1').value = parts[0] || '#0a0a0f';
        document.getElementById('bgGrad2').value = parts[1] || '#1a0033';
      }
      if (c.profile_bg_type === 'image' || c.profile_bg_type === 'video') {
        document.getElementById('bgMediaUrl').value = parts[0] || '';
      }
    }
    updateBgPreview();
  } catch(e) {}
}

// ======== Background Options ========
function updateBgOptions() {
  const type = document.getElementById('bgType').value;
  const container = document.getElementById('bgOptions');
  switch(type) {
    case 'color':
      container.innerHTML = '<div class="form-group"><label>背景颜色</label><div class="color-row"><input type="color" id="bgColorVal" value="#0a0a0f" onchange="updateBgPreview()"><span id="bgColorHex">#0a0a0f</span></div></div>';
      break;
    case 'gradient':
      container.innerHTML = '<div class="form-group"><label>渐变颜色（两个颜色间过渡）</label><div class="gradient-row"><input type="color" id="bgGrad1" value="#0a0a0f" onchange="updateBgPreview()"><span>→</span><input type="color" id="bgGrad2" value="#1a0033" onchange="updateBgPreview()"></div></div>';
      break;
    case 'image':
      container.innerHTML = '<div class="form-group"><label>图片 URL</label><input type="text" id="bgMediaUrl" placeholder="https://example.com/bg.jpg" oninput="updateBgPreview()"><div class="help-text">支持 jpg/png/gif/webp，推荐 1920x1080</div></div>';
      break;
    case 'video':
      container.innerHTML = '<div class="form-group"><label>视频 URL</label><input type="text" id="bgMediaUrl" placeholder="https://example.com/bg.mp4" oninput="updateBgPreview()"><div class="help-text">支持 mp4/webm，静音自动循环播放</div></div>';
      break;
    case 'matrix':
    case 'particles':
    case 'stars':
      container.innerHTML = '<p style="font-size:13px;color:var(--text-dim)">特效背景无需额外配置，保存后即可生效。</p>';
      break;
    default:
      container.innerHTML = '';
  }
}

// ======== Background Preview ========
function updateBgPreview() {
  const type = document.getElementById('bgType').value;
  const preview = document.getElementById('bgPreview');
  const label = document.getElementById('previewLabel');

  // 清除之前的 canvas
  const oldCanvas = preview.querySelector('canvas');
  if (oldCanvas) oldCanvas.remove();

  let bgStyle = '';
  switch(type) {
    case 'color':
      const c = document.getElementById('bgColorVal')?.value || '#0a0a0f';
      bgStyle = 'background:' + c;
      label.textContent = c;
      break;
    case 'gradient':
      const g1 = document.getElementById('bgGrad1')?.value || '#0a0a0f';
      const g2 = document.getElementById('bgGrad2')?.value || '#1a0033';
      bgStyle = 'background:linear-gradient(135deg,' + g1 + ',' + g2 + ')';
      label.textContent = g1 + ' → ' + g2;
      break;
    case 'image':
      const img = document.getElementById('bgMediaUrl')?.value || '';
      bgStyle = img ? 'background:url(' + img + ') center/cover' : 'background:var(--bg)';
      label.textContent = img ? '图片背景' : '未设置图片';
      break;
    case 'video':
      label.textContent = '视频背景';
      bgStyle = 'background:var(--bg)';
      break;
    case 'matrix':
      bgStyle = 'background:#000';
      label.textContent = '代码雨';
      initMatrix(preview);
      break;
    case 'particles':
      bgStyle = 'background:var(--bg)';
      label.textContent = '粒子特效';
      initParticles(preview);
      break;
    case 'stars':
      bgStyle = 'background:#050510';
      label.textContent = '星空';
      initStars(preview);
      break;
    default:
      bgStyle = 'background:var(--bg)';
      label.textContent = '默认';
  }
  preview.style.cssText = bgStyle + ';height:120px;border-radius:8px;border:1px solid var(--border);margin-bottom:12px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden';
}

// Canvas effects
function initMatrix(el) {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:absolute;inset:0;z-index:0';
  el.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  canvas.width = el.offsetWidth; canvas.height = el.offsetHeight;
  const chars = 'NodeWeave_サイバー01001010';
  const drops = Array(Math.floor(canvas.width / 14)).fill(0);
  function draw() {
    ctx.fillStyle = 'rgba(0,0,0,.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#0f0'; ctx.font = '12px monospace';
    for (let i = 0; i < drops.length; i++) {
      ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * 14, drops[i] * 14);
      if (drops[i] * 14 > canvas.height && Math.random() > .975) drops[i] = 0;
      drops[i]++;
    }
  }
  const id = setInterval(draw, 50);
  el._animId = id;
}

function initParticles(el) {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:absolute;inset:0;z-index:0';
  el.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  canvas.width = el.offsetWidth; canvas.height = el.offsetHeight;
  const particles = Array.from({length: 40}, () => ({
    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
    vx: (Math.random() - .5) * .5, vy: (Math.random() - .5) * .5, r: Math.random() * 2 + 1,
  }));
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00f0ff33';
    for (const p of particles) {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
    }
  }
  const id = setInterval(draw, 33);
  el._animId = id;
}

function initStars(el) {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:absolute;inset:0;z-index:0';
  el.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  canvas.width = el.offsetWidth; canvas.height = el.offsetHeight;
  const stars = Array.from({length: 60}, () => ({
    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + .5, a: Math.random(), speed: Math.random() * .02 + .005,
  }));
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      s.a += s.speed; const alpha = .3 + Math.sin(s.a) * .7;
      ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
    }
  }
  const id = setInterval(draw, 50);
  el._animId = id;
}

// ======== Save ========
async function saveProfile() {
  const msg = document.getElementById('profileMsg');
  try {
    const res = await fetch('/api/account/me', {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        display_name: document.getElementById('displayName').value.trim(),
        bio: document.getElementById('bio').value.trim(),
        avatar_color: document.getElementById('avatarColor').value,
      }),
    });
    const json = await res.json();
    msg.textContent = json.msg || '已保存';
    msg.className = 'msg show ' + (json.code === 0 ? 'msg-ok' : 'msg-err');
    setTimeout(() => msg.classList.remove('show'), 2000);
  } catch(e) { msg.textContent = '网络错误'; msg.className = 'msg show msg-err'; }
}

async function saveAppearance() {
  const type = document.getElementById('bgType').value;
  let bgValue = '';
  if (type === 'color') bgValue = (document.getElementById('bgColorVal')?.value || '#0a0a0f');
  if (type === 'gradient') bgValue = (document.getElementById('bgGrad1')?.value || '#0a0a0f') + '|||' + (document.getElementById('bgGrad2')?.value || '#1a0033');
  if (type === 'image' || type === 'video') bgValue = document.getElementById('bgMediaUrl')?.value || '';

  const msg = document.getElementById('appearanceMsg');
  try {
    const res = await fetch('/api/account/customize', {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        profile_css: document.getElementById('customCss').value,
        profile_bg_type: type, profile_bg_value: bgValue,
      }),
    });
    const json = await res.json();
    msg.textContent = json.msg || '装扮已保存';
    msg.className = 'msg show ' + (json.code === 0 ? 'msg-ok' : 'msg-err');
    setTimeout(() => msg.classList.remove('show'), 2000);
  } catch(e) { msg.textContent = '网络错误'; msg.className = 'msg show msg-err'; }
}

function previewLive() {
  const userId = new URLSearchParams(location.search).get('id');
  if (userId) { window.open('../profile.html?id=' + userId + '&preview=1', '_blank'); return; }
  saveAppearance().then(() => { window.open('../profile.html?preview=1', '_blank'); });
}

async function changePassword() {
  const msg = document.getElementById('pwdMsg');
  try {
    const res = await fetch('/api/account/change-password', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        old_password: document.getElementById('oldPassword').value,
        new_password: document.getElementById('newPassword').value,
      }),
    });
    const json = await res.json();
    msg.textContent = json.msg || '操作完成';
    msg.className = 'msg show ' + (json.code === 0 ? 'msg-ok' : 'msg-err');
    setTimeout(() => msg.classList.remove('show'), 2000);
  } catch(e) { msg.textContent = '网络错误'; msg.className = 'msg show msg-err'; }
}

updateBgOptions();
loadProfile(); loadAppearance();
</script>
</body>
</html>
