name = "nodeweave"
main = "api/index.js"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "nodeweave-db"
database_id = "9c7b4a51-db3e-45f3-b2fd-8b58be0dc236"

[vars]
ENV = "production"
TURNSTILE_SITE_KEY = ""
SITE_URL = "https://nodeweave.xyz"

[assets]
directory = "./public/"
binding = "ASSETS"
run_worker_first = true
html_handling = "none"
not_found_handling = "none"
